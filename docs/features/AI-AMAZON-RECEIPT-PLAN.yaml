# =============================================================================
# PHASE 10: Testing & Polish
# =============================================================================
phase_10_testing:
  status: completed
  description: |
    Manual testing with real Amazon PDFs, edge case handling, error states,
    and UX polish. No automated tests planned for V1 — this is a UI-heavy
    feature where manual verification against real PDFs is more valuable.

  tasks:
    - id: "10.1"
      task: Manual testing — upload and parsing
      status: completed
      details: |
        Test with real Amazon PDFs:
        - [ ] Orders page PDF (3-month view) parses correctly
        - [ ] Orders page PDF (single year) parses correctly
        - [ ] Payments > Transactions PDF parses correctly
        - [ ] Both PDFs uploaded together cross-reference on order number
        - [ ] Multi-page PDF (10+ pages) processes without issues
        - [ ] Non-Amazon PDF shows clear error message
        - [ ] Corrupted/empty PDF shows clear error message
        - [ ] File too large (>20MB) rejected at upload
        - [ ] Non-PDF file rejected at upload
        - [ ] Cost tracked correctly in shared cost tracker

    - id: "10.2"
      task: Manual testing — matching
      status: completed
      details: |
        - [ ] Exact amount match within 3 days → high confidence
        - [ ] Exact amount match within 7 days → medium confidence
        - [ ] Multiple matches for same amount → ambiguous with candidates
        - [ ] No match → shown in unmatched section
        - [ ] Previously processed orders are skipped (deduplication)
        - [ ] Already-categorized transactions flagged correctly
        - [ ] Manual ambiguous resolution works
        - [ ] Cross-reference with both PDFs improves match confidence

    - id: "10.3"
      task: Manual testing — categorization and splits
      status: completed
      details: |
        - [ ] Single-item order gets category recommendation
        - [ ] Multi-item order with different categories gets split recommendation
        - [ ] Multi-item order with same category gets simple recategorization
        - [ ] Confidence scores are reasonable (high for obvious items)
        - [ ] Estimated prices clearly marked
        - [ ] Split amounts are editable
        - [ ] Split amounts validation (must sum to original)
        - [ ] Applying categorization updates transaction correctly
        - [ ] Applying split creates child transactions correctly
        - [ ] Skipping a recommendation persists the decision

    - id: "10.4"
      task: Manual testing — rules and summary
      status: completed
      details: |
        - [ ] Rule suggestions appear for recurring items
        - [ ] Rules don't duplicate existing auto-categorize rules
        - [ ] Creating a rule works via existing API
        - [ ] Summary shows correct counts
        - [ ] Dollar amount recategorized is accurate
        - [ ] Closing modal refreshes transaction list
        - [ ] Cost cap prevents processing when budget exhausted

    - id: "10.5"
      task: Security verification
      status: completed
      details: |
        - [ ] SEC-001: Raw PDFs not persisted (verify no temp files, no S3 objects)
        - [ ] SEC-002: PDF sent as document content block, not interpolated into prompt
        - [ ] SEC-002+: Tool output schemas enforce strict types/enums/patterns
        - [ ] SEC-003: Can only modify own transactions (test with 2 users)
        - [ ] SEC-003+: IDOR test — attempt to access sessionId belonging to
              another user via all endpoints (match, categorize, apply, delete).
              All must return 403, not 404 with data leakage.
        - [ ] SEC-004: Only categoryId and splits modified, no other fields
        - [ ] SEC-005: Cost tracked against shared $20/month cap
        - [ ] SEC-006: No PDF content in logs, no card numbers in parsed data
        - [ ] SEC-006+: Card numbers stripped via sanitizeParsedData() before
              any logging or persistence — verify no full card numbers in
              debug logs, session storage, or error messages
        - [ ] SEC-007: File validation (MIME type, size, page count)
        - [ ] SEC-007+: Magic byte validation — upload a .txt file renamed
              to .pdf (spoofed MIME type) and verify it is rejected
        - [ ] Rate limiting works: 3 req/min for upload, 5 req/min for
              categorize, 10 req/min for match/apply/suggest-rules/delete
        - [ ] Claude output validation: craft a test PDF with adversarial
              product names (e.g., extremely long strings, injection
              attempts) and verify Zod validation rejects malformed output
              while processing valid orders from the same PDF
        - [ ] Session pruning: verify old completed sessions are stripped
              to dedup-only data, abandoned sessions are cleaned up
        - [ ] CSRF: confirm JWT is sent via Authorization header (not
              cookies) for the upload endpoint

# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Mostly linear with the backend built first, then frontend. Phases 2–6
    are the backend (upload → parse → match → categorize → apply). Phases
    7–9 are the frontend. Phase 1 (types) unblocks everything.

    The matching algorithm (Phase 4) is pure logic with no AI dependency,
    so it can be developed and tested independently of the parsing and
    categorization phases.

  sequence:
    - phase: 1 — Shared Types
      reason: Types needed by all other phases
    - phase: 2 — PDF Upload Infrastructure
      reason: Introduces multer, creates route shell
    - phase: 3 — PDF Parsing Service
      reason: Core AI integration — Claude vision for PDF extraction
    - phase: 4 — Transaction Matching Algorithm
      reason: Pure logic, testable independently of AI
    - phase: 5 — Categorization & Split Recommendations
      reason: Second AI integration — item classification
    - phase: 6 — Apply Changes & Rule Suggestions
      reason: Write path — applies results via existing APIs
    - phase: 7 — Frontend API Client
      reason: Frontend needs typed methods before UI
    - phase: 8 — Upload & Match Review UI
      reason: First half of user-facing flow
    - phase: 9 — Categorization & Split Review UI
      reason: Second half of user-facing flow
    - phase: 10 — Testing & Polish
      reason: End-to-end verification with real PDFs

# =============================================================================
# RISK REGISTER
# =============================================================================
risks:
  - id: R1
    risk: Claude vision may not reliably parse Amazon's print-to-PDF format
    likelihood: low
    impact: high
    mitigation: |
      Amazon's order page has a relatively consistent layout. Claude's vision
      capabilities are strong for structured document extraction. If parsing
      quality is poor, we can add format-specific prompt tuning or fall back
      to asking the user to verify/correct parsed data before matching.

  - id: R2
    risk: Amount-based matching may produce too many ambiguous matches
    likelihood: medium
    impact: medium
    mitigation: |
      The BRD estimates ~80% exact-match rate. Cross-referencing with the
      transactions PDF (when provided) significantly reduces ambiguity by
      adding exact charge dates. The UI handles ambiguous matches gracefully
      with manual resolution. We can tune the date window after real-world
      testing.

  - id: R3
    risk: Multi-item order price estimation may be inaccurate
    likelihood: medium
    impact: low
    mitigation: |
      Estimates are clearly labeled in the UI. The user must confirm or
      adjust split amounts before applying. The system validates that
      amounts sum to the original total. Inaccurate estimates are
      inconvenient but not dangerous — the user always has final say.

  - id: R4
    risk: 20MB in-memory buffer per PDF could cause memory pressure
    likelihood: low
    impact: medium
    mitigation: |
      Max 2 files × 20MB = 40MB worst case per request. This is well
      within Node.js default memory limits. Rate limiting (3 req/min)
      prevents concurrent uploads from the same user. If memory becomes
      an issue, we can stream the PDF to Claude's API instead of buffering.
