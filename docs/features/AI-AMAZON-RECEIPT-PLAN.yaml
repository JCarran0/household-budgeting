      task: Create frontend/src/lib/api/amazonReceipts.ts
      status: completed
      details: |
        Following the pattern in frontend/src/lib/api/chatbot.ts:

        Methods (bound in constructor):
        - uploadReceipts(files: File[]): Promise<AmazonReceiptUploadResponse>
          Uses FormData with 'pdfs' field for multipart upload
        - matchOrders(sessionId: string): Promise<AmazonReceiptMatchResponse>
        - resolveAmbiguous(sessionId, resolutions): Promise<void>
        - categorizeMatches(sessionId, matchIds): Promise<AmazonCategorizationResponse>
        - applyActions(sessionId, actions): Promise<AmazonApplyResponse>
        - suggestRules(sessionId): Promise<SuggestRulesResponse>
        - deleteSession(sessionId): Promise<void>

        The uploadReceipts method is the only one that uses FormData
