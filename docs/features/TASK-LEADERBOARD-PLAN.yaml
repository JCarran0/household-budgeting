# =============================================================================
# Task Leaderboard (streaks + badges) — Implementation Plan
# =============================================================================
# BRD: docs/features/TASK-LEADERBOARD-BRD.md (v1.0 — 2026-04-19)
# Extends: docs/features/TASK-MANAGEMENT-BRD.md §5 (shipped leaderboard)
# Status: Implementation Complete — All 5 phases shipped, manual UAT pending
# Last Updated: 2026-04-19
# =============================================================================

overview:
  description: |
    Two motivational layers added on top of the shipped leaderboard panel on
    the Tasks page:

    1. Streaks — Two new columns (Current, Best) measuring consecutive calendar
       days on which a family member was credited with ≥1 family-task
       completion. "Today-is-grace" semantics: a user whose last completion was
       yesterday sees their streak hold steady all day today; it only breaks
       at local midnight when today closes with zero completions.

    2. Badges — A flat catalog of 13 earned-for-life achievements across 4
       categories (Volume 5/10/20, Consistency 4/5/7, Streak 7/30/100, Lifetime
       10/50/100/500/1000). Unearned badges render as ghost ???? placeholders
       with no tooltip; category is visible so users see direction without
       the threshold. Clicking a member row opens a detail modal showing the
       full 13-badge grid grouped by category.

    All computation is stateless — derived from existing `Task.completedAt` +
    `SubTask.completedAt` on every `/api/v1/tasks/leaderboard` request. No
    new persistence, no schema change, no migration script. First leaderboard
    load after deploy retroactively surfaces historical badges; a
    `lastSeenBadgeEarnedAt` marker seeded to `now` on first post-deploy load
    suppresses the cascade of celebration toasts.

    Celebration on a newly earned badge: distinct higher-fanfare audio cue
    (separate from the task-done chime from commit 39c2245), short confetti
    animation, and a Mantine toast naming the badge.

  key_files:
    brd: docs/features/TASK-LEADERBOARD-BRD.md
    shared_types: shared/types/index.ts
    shared_streaks_util: shared/utils/leaderboardStreaks.ts   # new
    shared_badges_util: shared/utils/leaderboardBadges.ts     # new
    task_service: backend/src/services/taskService.ts
    task_routes: backend/src/routes/tasks.ts
    task_service_test: backend/src/__tests__/integration/taskService.test.ts
    frontend_tasks_page: frontend/src/pages/Tasks.tsx
    frontend_leaderboard_panel: frontend/src/pages/Tasks.tsx   # LeaderboardPanel lives here
    frontend_completion_sound: frontend/src/utils/completionSound.ts  # add playBadgeFanfare
    frontend_badge_slot: frontend/src/components/tasks/BadgeSlotArea.tsx     # new
    frontend_badge_modal: frontend/src/components/tasks/BadgeDetailModal.tsx # new
    frontend_badge_catalog: frontend/src/components/tasks/badgeCatalog.ts    # new (copy/labels/icons)

# =============================================================================
# DECISIONS LOG — settled during BRD drafting + plan drafting
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-19
    decision: Badges computed server-side in `getLeaderboard`, returned in the response
    rationale: |
      Stateless does not mean client-computed. Server is the single source of
      truth for attribution (family scope, assignee-else-completer, subtask
      credit). Client computes nothing; it just renders what the server says
      is earned and compares `earnedAt` timestamps against a `lastSeenBadgeEarnedAt`
      marker for celebration detection. Avoids two implementations drifting.

  - id: D2
    date: 2026-04-19
    decision: Badge catalog hardcoded in `shared/types/index.ts` (typed constant)
    rationale: |
      13 badges across 4 categories is small and stable. A BADGE_CATALOG
      constant with `{ id, category, threshold, order }` per badge lets the
      frontend render category headings, tooltips, and grid order without
      round-tripping. Shared types mean backend and frontend cannot disagree
      on badge identity. Artwork labels/icons live on the frontend only
      (badgeCatalog.ts) since they're UI-only.

  - id: D3
    date: 2026-04-19
    decision: Streak math lives in a pure shared util (`shared/utils/leaderboardStreaks.ts`)
    rationale: |
      Follows the established shared-utils pattern (transactionCalculations,
      budgetCalculations, taskSnooze, taskSortOrder). Pure function taking a
      list of credit events (userId, timestampMs) + timezone + `now` and
      returning `{ currentStreak, bestStreak, bestStreakAchievedAt }` per
      user. Unit-testable in isolation; callable from the backend.

  - id: D4
    date: 2026-04-19
    decision: "Today-is-grace anchor algorithm — anchor = today if has ≥1 credit else yesterday; current = consecutive days back from anchor"
    rationale: |
      Matches Duolingo / Apple Fitness. Implementation: bucket credit events
      by local calendar day → set of ISO YYYY-MM-DD strings. If today ∈ set,
      anchor = today; else anchor = today - 1. Walk back one day at a time
      while the day is in the set; count = number of consecutive days. Best
      streak = longest run across all days (unrelated to anchor).

  - id: D5
    date: 2026-04-19
    decision: "Badge `earnedAt` = `completedAt` of the credit event that first tipped the threshold"
    rationale: |
      For Volume/Lifetime/Consistency, the tipping event is the earliest
      `completedAt` in the qualifying window. For streak badges, it is the
      `completedAt` of the first day whose running streak reached the
      threshold. All computable in a single sort-and-sweep over credit
      events, no backtracking. Closes BRD Open Q §9 #3.

  - id: D6
    date: 2026-04-19
    decision: Consistency badges earn the moment the threshold tips during a live ISO week (not end-of-week)
    rationale: |
      Closes BRD Open Q §9 #4. A Wednesday-earning-consistency_4 is fine —
      once 4 distinct days in the Mon-Sun week have credits, the badge
      earns. The `earnedAt` is the `completedAt` of the credit on the 4th
      distinct day. This matches the feel-good tone: award on accomplishment,
      not on week close.

  - id: D7
    date: 2026-04-19
    decision: Row slot selection — highest tier per category, up to 3, drop Consistency first on overflow, tie-break by recency
    rationale: |
      Direct from BRD §5.1. Implementation is a deterministic pure function:
      groupBy category → take max-tier per category → if length > 3, drop
      Consistency → sort by `earnedAt` DESC → take first 3. Fill remaining
      slots with ghost ???? placeholders in category order (Volume, Streak,
      Lifetime, Consistency) for categories where the user has 0 earned.

  - id: D8
    date: 2026-04-19
    decision: "Celebration detection uses `localStorage['tasks.leaderboard.lastSeenBadgeEarnedAt']` keyed to the viewing user"
    rationale: |
      Dot-prefixed key follows the newer convention (tasks.view,
      tasks.kanban.showSnoozed). The existing `tasks-leaderboard` key (used
      for panel open/closed) is the outlier — we do not change it in this
      plan. First-load seed: if key is absent, set to `now` ISO string
      BEFORE diffing earnedAt values, so historical badges appear silently.
      Celebrations fire only for the viewing user's own badges
      (`entry.userId === currentUser.userId`), per BRD Open Q #6.

  - id: D9
    date: 2026-04-19
    decision: "`playBadgeFanfare()` added to existing `frontend/src/utils/completionSound.ts` — Web Audio, no assets"
    rationale: |
      Reuse the in-house synth pattern — zero asset pipeline, zero bundle
      bloat. Fanfare is distinct from the task-done chime via:
        • longer duration (~900ms vs ~380ms)
        • wider interval (major triad ascending + octave leap + sustained
          major 6th top note) vs the chime's simple C arpeggio
        • heavier harmonic content (brass-ish saw partials layered over sine)
      Decision heuristic: chime = soft chirp, fanfare = "you did a thing."
      Settles BRD Open Q §9 #1.

  - id: D10
    date: 2026-04-19
    decision: Confetti via `canvas-confetti` (new dev-dep), configured with source point = badge slot position
    rationale: |
      Search confirmed no existing confetti library. `canvas-confetti` is
      tiny (~6KB gzipped), has no runtime deps, supports `origin: {x, y}`
      in viewport coords — perfect for emitting from the badge slot. One
      palette for all badges v1 (closes BRD Open Q §9 #2 — per-category
      palettes deferred). Install as runtime dep (not devDep) since it's
      called from production code.

  - id: D11
    date: 2026-04-19
    decision: Badge detail modal = Mantine `Modal` with 4-section grid (Volume / Consistency / Streak / Lifetime)
    rationale: |
      Reuses existing Mantine Modal wiring already present in TaskDetailModal.
      Grid layout with 4 horizontal rows (one per category), tiers in
      ascending threshold order within each row. Earned = full artwork +
      tooltip with `earnedAt` date; unearned = ???? with category chip but
      no tooltip. Header shows member avatar, name, and "N of 13 earned."

  - id: D12
    date: 2026-04-19
    decision: No badge artwork ships in v1 — unearned is literal `????`, earned is an emoji glyph per badge
    rationale: |
      Keeps the ship small. Emoji glyphs map naturally: 🔥 for streak,
      📅 for consistency, ⚡ for volume, 🏆 for lifetime, with tier indicated
      by count badge or number suffix. Mantine `<ThemeIcon>` frame gives a
      consistent circular presentation. Real custom artwork is a Nice-to-Have
      follow-up with zero code change — swap the glyph map.

  - id: D13
    date: 2026-04-19
    decision: Streak values + badges are included in the existing `GET /api/v1/tasks/leaderboard` response (no new endpoint)
    rationale: |
      Same computation source (scan of family tasks), same cache invalidation
      triggers (any task mutation). Splitting into a second endpoint would
      double the task scan. Adding fields is contract-additive — existing
      clients ignore unknown fields. No bump of the path or version.

  - id: D14
    date: 2026-04-19
    decision: Streak cells have no hover preview (unlike Today/Week/Month cells)
    rationale: |
      Direct from BRD REQ-L-006 / §3.4. There is nothing analogous to
      enumerate for a summary stat. The `LeaderboardCountCell` component is
      NOT reused for streak columns — streak cells use a simpler
      non-interactive `<Text>` with the flame glyph.

  - id: D15
    date: 2026-04-19
    decision: "Badges are data-driven, not earned-for-life — a change to the underlying task completion affects badge awarding"
    rationale: |
      BRD draft originally said "never revoked even if the user drops below
      threshold." Updated 2026-04-19 after plan review: badges mirror the
      current dataset on every leaderboard load. If the sole qualifier for
      a threshold is reverted, the badge disappears. Reasons:
        • Keeps computation fully stateless (REQ-L-010) — no new collection,
          no backfill override.
        • Matches the shipped leaderboard's existing principle that current
          task state drives current numbers.
        • Consistent with the mental model users already have for the
          Today/Week/Month counts (uncompleting a task removes it from
          those counts too).
        • The "revoke a badge by uncompleting" case is vanishingly rare in
          practice — the reverted completion has to be the user's only
          qualifier across the entire history. For any user with a
          meaningful completion count, the badge survives.
      BRD §1.2, §4.2, §10, and REQ-L-008 rewritten in the same pass to
      match this decision.

# =============================================================================
# PHASE 1: Shared Types & Utilities
# =============================================================================
phase_1_shared:
  status: complete
  description: |
    Define the badge catalog, streak computation, and badge computation as
    pure shared utilities. Unit-testable in isolation; imported by the
    backend's `getLeaderboard` and returned in the response.

  tasks:
    - id: "1.1"
      task: Extend `LeaderboardEntry` + `LeaderboardResponse` types
      status: complete
      details: |
        File: shared/types/index.ts (around the existing LeaderboardEntry at
        line 1261).

        Add to LeaderboardEntry:
          currentStreak: number;          // today-is-grace
          bestStreak: number;
          earnedBadges: EarnedBadge[];    // earned-for-life list, not all 13

        New types:
          export type BadgeCategory =
            | 'volume'
            | 'consistency'
            | 'streak'
            | 'lifetime';

          export type BadgeId =
            | 'volume_3' | 'volume_5' | 'volume_10'
            | 'consistency_4' | 'consistency_5' | 'consistency_7'
            | 'streak_7' | 'streak_30' | 'streak_100'
            | 'lifetime_10' | 'lifetime_50' | 'lifetime_100'
            | 'lifetime_500' | 'lifetime_1000';

          export interface BadgeDefinition {
            id: BadgeId;
            category: BadgeCategory;
            threshold: number;        // e.g. 3 for volume_3, 7 for streak_7
            order: number;             // display order within category
            label: string;             // e.g. "3 in a day"
            description: string;       // tooltip copy
          }

          export interface EarnedBadge {
            id: BadgeId;
            earnedAt: string;          // ISO datetime
          }

          export const BADGE_CATALOG: readonly BadgeDefinition[] = [
            // Volume
            { id: 'volume_3',      category: 'volume',      threshold: 3,   order: 1, label: '3 in a day',  description: '3 tasks completed in a single day' },
            { id: 'volume_5',      category: 'volume',      threshold: 5,   order: 2, label: '5 in a day',  description: '5 tasks completed in a single day' },
            { id: 'volume_10',     category: 'volume',      threshold: 10,  order: 3, label: '10 in a day', description: '10 tasks completed in a single day' },
            // Consistency
            { id: 'consistency_4', category: 'consistency', threshold: 4,   order: 1, label: '4 days/week', description: 'At least 1 task on 4 days in a single week' },
            { id: 'consistency_5', category: 'consistency', threshold: 5,   order: 2, label: '5 days/week', description: 'At least 1 task on 5 days in a single week' },
            { id: 'consistency_7', category: 'consistency', threshold: 7,   order: 3, label: 'Perfect week',description: 'At least 1 task on all 7 days in a single week' },
            // Streak
            { id: 'streak_7',      category: 'streak',      threshold: 7,   order: 1, label: '7-day streak' ,   description: '7 consecutive days with at least 1 completion' },
            { id: 'streak_30',    category: 'streak',       threshold: 30,  order: 2, label: '30-day streak',   description: '30 consecutive days with at least 1 completion' },
            { id: 'streak_100',    category: 'streak',      threshold: 100, order: 3, label: '100-day streak',  description: '100 consecutive days with at least 1 completion' },
            // Lifetime
            { id: 'lifetime_10',   category: 'lifetime',    threshold: 10,    order: 1, label: '10 delivered',    description: '10 total family-task completions' },
            { id: 'lifetime_50',   category: 'lifetime',    threshold: 50,    order: 2, label: '50 delivered',    description: '50 total family-task completions' },
            { id: 'lifetime_100',  category: 'lifetime',    threshold: 100,   order: 3, label: '100 delivered',   description: '100 total family-task completions' },
            { id: 'lifetime_500',  category: 'lifetime',    threshold: 500,   order: 4, label: '500 delivered',   description: '500 total family-task completions' },
            { id: 'lifetime_1000', category: 'lifetime',    threshold: 1000,  order: 5, label: '1000 delivered',  description: '1000 total family-task completions' },
          ] as const;

        Verify nothing imports `LeaderboardEntry` expecting a closed shape —
        the additions are contract-additive.

    - id: "1.2"
      task: Create `shared/utils/leaderboardStreaks.ts` — pure streak math
      status: complete
      details: |
        New file: shared/utils/leaderboardStreaks.ts

        Export:
          export interface CreditEvent {
            userId: string;
            completedAt: string;        // ISO datetime from task or subtask
          }

          export interface StreakSummary {
            currentStreak: number;
            bestStreak: number;
            bestStreakAchievedAt: string | null;  // completedAt of 1st credit on the day that tipped best streak
            streakMilestones: Partial<Record<7 | 30 | 100, string>>;
            // ^ earnedAt timestamps for each streak-badge threshold the user has ever hit;
            //   absent keys mean the threshold was never reached
          }

          export function computeStreaksForUser(
            events: CreditEvent[],       // events for ONE user
            timezone: string,            // IANA
            now: Date,
          ): StreakSummary

        Algorithm:
          1. Bucket `events` by local calendar day using
             `new Date(completedAt).toLocaleDateString('en-CA', { timeZone })`
             → keyed set of YYYY-MM-DD strings, plus a map of
             `day -> earliest completedAt ISO` for the `earnedAt` lookup.
          2. Sort days ascending.
          3. Walk the sorted days, maintaining a `runLength` counter that
             resets when the gap between consecutive days > 1. At each step:
               - Update `bestStreak = max(best, runLength)` and stamp
                 `bestStreakAchievedAt` = earliest completedAt on that day
                 when best is newly advanced.
               - If runLength first reaches 7/30/100 on this day, record
                 that day's earliest completedAt into `streakMilestones`.
          4. Current streak: compute anchor = today (local) if todaySet
             contains it, else yesterday (local). If anchor not in day set
             → currentStreak = 0. Else walk back consecutive days.

        Edge cases:
          - Empty events → {current: 0, best: 0, achievedAt: null, milestones: {}}
          - All events on the same day → current = 1 (if today or yesterday);
            best = 1; no streak milestones.
          - DST transitions: rely on `toLocaleDateString('en-CA', …)` which
            is DST-aware at the IANA TZ level. Spot-check in tests.

        Do NOT import from shared/types to avoid cycles; keep this module
        self-contained.

    - id: "1.3"
      task: Create `shared/utils/leaderboardBadges.ts` — pure badge derivation
      status: complete
      details: |
        New file: shared/utils/leaderboardBadges.ts

        Export:
          export function computeEarnedBadges(
            events: CreditEvent[],         // events for ONE user
            streakMilestones: Partial<Record<7 | 30 | 100, string>>,
            timezone: string,
            now: Date,
          ): EarnedBadge[]

        Algorithm (single pass over sorted events):
          VOLUME (single-day bursts):
            Group events by local calendar day. For each day, find the Nth
            credit (N = 3, 5, 10). The `earnedAt` is that Nth credit's
            `completedAt`. Use the EARLIEST day on which threshold is first
            reached (monotonic first-tip semantics — D5). If never reached,
            omit.

          CONSISTENCY (weekly rhythm):
            Group events by ISO week (Mon-Sun) in local TZ. For each week,
            count distinct days with ≥1 credit. The `earnedAt` for
            consistency_4/5/7 is the completedAt of the event that first
            pushed the distinct-day count to 4/5/7 within some week. Use
            the earliest qualifying week globally (first-tip).

          STREAK (all-time best):
            Already provided via `streakMilestones` param. Map
            `{7: ISO, 30: ISO, 100: ISO}` → earned badges streak_7/30/100.

          LIFETIME (cumulative):
            Sort events ascending by `completedAt`. The 10th event's
            completedAt = `earnedAt` for `lifetime_10`; likewise for 50, 100,
            500, 1000. If total < N, omit.

        Return only earned badges. Unearned = absent. Sort by `earnedAt` ASC
        for stability.

        Pure function; no I/O.

    - id: "1.4"
      task: Unit tests for streak math
      status: complete
      details: |
        File: shared/utils/__tests__/leaderboardStreaks.test.ts

        Coverage:
          - Empty events → 0/0
          - Single event today → current 1, best 1
          - Single event yesterday → current 1 (grace), best 1
          - Single event 2 days ago → current 0, best 1
          - 3 consecutive days ending today → current 3, best 3
          - 3 consecutive days ending yesterday + none today → current 3 (grace),
            best 3, achievedAt = earliest completedAt on day 3
          - 5 consecutive ending yesterday, gap, 2 consecutive ending today →
            current 2, best 5
          - 7-day streak → streakMilestones[7] set
          - 30-day streak → both [7] and [30] set; [7].earnedAt < [30].earnedAt
          - DST boundary week (America/New_York spring forward) — no off-by-one
          - Timezone shift (UTC vs America/Los_Angeles) — events at 23:30 UTC
            on day X count as day X-1 in LA on the right side of midnight
          - Multiple events on the same day all count as ONE streak day (don't
            double-advance)

    - id: "1.5"
      task: Unit tests for badge derivation
      status: complete
      details: |
        File: shared/utils/__tests__/leaderboardBadges.test.ts

        Coverage per category:
          VOLUME
          - 2 in a day → no badges
          - 3 in a day → volume_3 earned; earnedAt = 3rd event's completedAt
          - 10 in a day → volume_3, volume_5, volume_10 all earned, each
            with earnedAt = 3rd/5th/10th event's completedAt of that day
          - 10 in a day spread across multiple days such that no single day
            reaches 5 → only volume_3
          - First-tip semantics: if user has a 3-in-a-day on Mon AND a
            10-in-a-day on Tue, volume_3.earnedAt is Mon's 3rd completedAt,
            volume_5 is Tue's 5th, volume_10 is Tue's 10th

          CONSISTENCY
          - Credits on Mon, Wed, Fri → 3 distinct days → no badges
          - Credits on Mon, Tue, Wed, Thu → consistency_4 earnedAt = Thu's
            first completedAt
          - Credits on all 7 days of a week → all three earned
          - Week boundary: credits on Sun + next Mon are in different ISO
            weeks

          STREAK (inputs come from streakMilestones param — test the mapping)
          - {7: '2026-01-10T...'} → streak_7 earned with that earnedAt
          - {7, 30, 100} → all three earned

          LIFETIME
          - 9 events total → no badges
          - 10 events → lifetime_10 earnedAt = 10th event's completedAt
          - 1001 events → all five tiers earned
          - Events sorted ascending regardless of input order

        Parameterize tests to hit each category without lots of boilerplate.

# =============================================================================
# PHASE 2: Backend — extend getLeaderboard
# =============================================================================
phase_2_backend:
  status: complete
  description: |
    Extend `taskService.getLeaderboard` to produce a per-user credit-event
    stream once, then feed it through the streak + badge utilities. Return
    the extended response shape. No new endpoint.

  tasks:
    - id: "2.1"
      task: Refactor `getLeaderboard` to build per-user credit-event streams
      status: complete
      details: |
        File: backend/src/services/taskService.ts (getLeaderboard at line 432).

        The existing loop at lines 473-494 scans tasks, attributes credit,
        and bumps today/week/month counters. Refactor to ALSO collect a
        per-user array of CreditEvent records in the same pass:

          const eventsByUser = new Map<string, CreditEvent[]>();
          const pushEvent = (userId: string, completedAt: string) => {
            if (!eventsByUser.has(userId)) eventsByUser.set(userId, []);
            eventsByUser.get(userId)!.push({ userId, completedAt });
          };

          // Inside the existing task/subtask loop, after the creditCount
          // call, also pushEvent(creditedUserId, task.completedAt)
          // (or st.completedAt for subtasks).

        Keep the existing today/week/month `creditCount` call — the BRD is
        explicit that those columns are unchanged.

        After the loop, for each member:
          const streaks = computeStreaksForUser(events, timezone, now);
          const earnedBadges = computeEarnedBadges(
            events,
            streaks.streakMilestones,
            timezone,
            now,
          );

          entries.push({
            ...existing,
            currentStreak: streaks.currentStreak,
            bestStreak: streaks.bestStreak,
            earnedBadges,
          });

        Members with zero events still get an entry with 0/0/[] — don't skip.

    - id: "2.2"
      task: Keep sort order by monthly completions DESC (unchanged)
      status: complete
      details: |
        Line 513 — `entries.sort((a, b) => b.completedThisMonth - a.completedThisMonth)`
        stays as-is. The BRD does not change leaderboard sort.

    - id: "2.3"
      task: Integration tests — extended leaderboard response
      status: complete
      details: |
        File: backend/src/__tests__/integration/taskService.test.ts

        Add to the "GET /api/v1/tasks/leaderboard" suite (around line 718):

        New cases:
          - Response includes currentStreak, bestStreak, earnedBadges per entry
          - User with 0 completions: currentStreak=0, bestStreak=0, earnedBadges=[]
          - User with 1 completion today: currentStreak=1, bestStreak=1
          - User with 1 completion yesterday (no today): currentStreak=1 (grace),
            bestStreak=1
          - User with 3 completions today: volume_3 present in earnedBadges
          - User with 10 completions today: volume_3, volume_5, volume_10 all
            present (cumulative-across-tiers rule)
          - User with 10 lifetime: lifetime_10 present
          - User with 1 personal task completed today: does NOT appear in
            earnedBadges (family-scope only — regression guard)
          - Uncompleted-then-recompleted task (done→started→done): counts once,
            earnedAt reflects MOST RECENT completedAt (D5)
          - Data-driven revoke semantics (D15): if a user has exactly one
            family-task completion and it qualified them for volume_3
            (e.g., 3 subtask credits on that one task), then the task is
            reverted from done → started → subtask completions cleared →
            volume_3 drops from `earnedBadges` on the next leaderboard load
          - Common-case invariant: a user with many qualifying completions
            who reverts one of them keeps their badge (the remaining
            completions still qualify)

        Timezone handling: use the existing pattern of setting `timezone=America/New_York`
        in the query and asserting the same IANA TZ is applied.

    - id: "2.4"
      task: Verify data-driven revoke behavior via a dedicated test
      status: complete
      details: |
        Per D15 (settled), badges mirror the current dataset — if the
        sole-qualifier completion is reverted, the badge disappears on the
        next load. The computation requires no special handling; the pure
        `computeEarnedBadges` function naturally produces the correct
        output from whatever credit events currently exist.

        The only work here is a regression-guard integration test (also
        listed in 2.3's case list):
          - Seed a user with exactly enough completions to qualify for
            `volume_3` on a single day (3 subtask credits on one family
            task).
          - Assert `volume_3` is present in `earnedBadges`.
          - Revert the parent task (done → started), which clears the
            subtask `completedAt` stamps via the existing reconcile logic.
          - Assert `volume_3` is ABSENT from the next leaderboard response.

