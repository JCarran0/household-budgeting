# =============================================================================
# PHASE 4: Frontend — celebration UX (fanfare + confetti + toast)
# =============================================================================
phase_4_frontend_celebration:
  status: complete
  description: |
    Detect newly-earned badges for the viewing user, fire celebration assets,
    and advance the `lastSeenBadgeEarnedAt` marker. First-load-after-deploy
    is suppressed via the `now`-seed trick.

  tasks:
    - id: "4.1"
      task: Create `useNewBadgeCelebrations` hook
      status: complete
      details: |
        New file: frontend/src/hooks/useNewBadgeCelebrations.ts

        Signature:
          export function useNewBadgeCelebrations(
            leaderboard: LeaderboardResponse | undefined,
            currentUserId: string | undefined,
          ): void;

        Behavior:
          1. On every change to leaderboard?.entries, find the entry where
             `entry.userId === currentUserId`.
          2. Read `localStorage['tasks.leaderboard.lastSeenBadgeEarnedAt']`:
               - If absent (first load post-deploy): set it to `new Date().toISOString()`
                 IMMEDIATELY, return (no celebration). REQ-L-016.
               - If present: parse as ISO, use as `lastSeen` cutoff.
          3. Filter `entry.earnedBadges` to badges with `earnedAt > lastSeen`.
          4. For each new badge (in chronological order):
               - Fire celebration (see 4.2).
          5. After all celebrations fire, set the marker to the
             maxEarnedAt = the newest `earnedAt` in the batch — NOT to `now`.
             This prevents re-celebration on refresh if the user reloads
             before the marker would have advanced to `now`.

        Dependencies:
          - `currentUserId` from useAuth() or wherever session user is exposed
          - React useEffect on [leaderboard, currentUserId]

        Edge cases:
          - No currentUserId (not logged in / race) → no-op
          - leaderboard undefined (still loading) → no-op
          - Other members earning badges → never fires (entry.userId filter)
          - Rapid successive earns in one response → fire sequentially with
            ~900ms stagger between confetti+fanfare (one fanfare at a time,
            but toasts can stack via Mantine)

    - id: "4.2"
      task: Create `celebrateBadgeUnlock` helper
      status: complete
      details: |
        New file: frontend/src/utils/celebrateBadgeUnlock.ts

        Signature:
          export function celebrateBadgeUnlock(
            badge: BadgeDefinition,
            earnedBadge: EarnedBadge,
            origin?: { x: number; y: number } // optional viewport coords for confetti
          ): void;

        Body:
          import confetti from 'canvas-confetti';
          import { playBadgeFanfare } from './completionSound';
          import { notifications } from '@mantine/notifications';
          import { BADGE_DISPLAY } from '../components/tasks/badgeCatalog';

          // 1. Fanfare
          playBadgeFanfare();

          // 2. Confetti — emit from badge slot position if provided, else center
          confetti({
            particleCount: 80,
            spread: 60,
            startVelocity: 35,
            origin: origin ?? { x: 0.5, y: 0.35 },
            // one palette v1 (D10)
          });

          // 3. Toast
          notifications.show({
            title: `${BADGE_DISPLAY[badge.id].glyph} ${badge.label} unlocked!`,
            message: badge.description,
            color: BADGE_DISPLAY[badge.id].color,
            autoClose: 6000,
          });

        Origin coordinate capture (optional enhancement):
          In `BadgeSlotArea`, when earnedBadges list changes, compute the
          DOMRect of the newly-earned badge icon and pass its center to
          celebrateBadgeUnlock via a callback. If too much wiring, default
          center-top works fine for v1.

    - id: "4.3"
      task: Wire `useNewBadgeCelebrations` into the Tasks page
      status: complete
      details: |
        File: frontend/src/pages/Tasks.tsx

        At the top-level Tasks component, after fetching the leaderboard
        (already there via useQuery(['tasks','leaderboard'])) and auth user:

          useNewBadgeCelebrations(leaderboardData, authUser?.userId);

        No other wiring required — the hook is self-contained.

    - id: "4.4"
      task: Manual testing — celebration behavior
      status: pending_manual_test
      details: |
        Requires two scenarios: a "fresh install" (post-deploy first load) and
        a "new unlock" (earning a badge after the marker is set).

        Fresh-install scenarios (BRD REQ-L-016):
          - [ ] Clear localStorage key `tasks.leaderboard.lastSeenBadgeEarnedAt`
          - [ ] Load Tasks page as a user with ≥1 earned historical badge
          - [ ] Verify NO fanfare, NO confetti, NO toast fires on this load
          - [ ] Verify localStorage key now exists, value is close to `now`
          - [ ] Reload page → still no celebration

        New-unlock scenarios:
          - [ ] With a warmed marker, complete a 3rd family task today on a
                user who has never earned volume_3 → fanfare + confetti +
                toast fires once
          - [ ] After refresh, no re-celebration for the same badge
          - [ ] Earn 2 badges in rapid succession (e.g., go from 2 to 5
                completions in a day → earn volume_3 then volume_5) →
                BOTH celebrations fire, staggered
          - [ ] Toasts are color-matched to BADGE_DISPLAY[id].color

        Other-member scenarios:
          - [ ] Partner earns a badge in the same family → viewing user
                sees their badge list update but NO celebration

        Cross-device:
          - [ ] Earn on phone → open on laptop → badge appears in detail
                modal but NO celebration (acceptable per BRD §4.5)

