# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Ship in two slices that minimize blast radius:

    SLICE A — Streaks + badges visible, NO celebration UX (phases 1, 2, 3).
      Gets us streak columns, badge slot area, and detail modal live. Users
      see their achievements and the retroactive backfill just works. No
      fanfare yet, so the "first-load cascade" concern is moot — there is
      nothing to celebrate silently. Ship this first and soak for a few days.

    SLICE B — Celebration UX (phase 4).
      Layer fanfare + confetti + toast on top. At this point, every user
      loading the app already has the server returning correct `earnedBadges`
      with historical `earnedAt`s. The first Phase-4 load seeds the
      `lastSeenBadgeEarnedAt` marker to `now`, suppressing the historical
      cascade per REQ-L-016. From that load forward, new unlocks celebrate.

    Phase 5 tests land alongside the phase they cover (5.1 with Phase 3; 5.2
    with Phase 2; 5.3 before Phase 4 merge).

  sequence:
    - slice: A
      phases:
        - phase: 1 — Shared types + pure utilities (streaks, badges)
          reason: Types + helpers are dependency roots; unit tests prove correctness before the server calls them
        - phase: 2 — Backend getLeaderboard extension
          reason: Returns the fields the frontend needs; integration tests guard response shape
        - phase: 3 — Frontend columns + slot area + detail modal
          reason: First user-visible slice; no celebration sharp edges yet
    - slice: B
      phases:
        - phase: 4 — Celebration UX (fanfare, confetti, toast, localStorage marker)
          reason: Additive; cannot fire false positives because the marker seeds to `now` on first load
        - phase: 5 — Remaining tests + bundle check
          reason: Regression guard + bundle-size discipline at slice boundary

