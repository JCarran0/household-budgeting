  description: Add task and template methods to the frontend API client.

  tasks:
    - id: "4.1"
      task: Create frontend/src/lib/api/tasks.ts
      status: not_started
      details: |
        Methods:
        - createTask(data: CreateTaskDto): Promise<StoredTask>
        - getTasks(): Promise<StoredTask[]>
        - getBoardTasks(): Promise<StoredTask[]>
        - getTask(id: string): Promise<StoredTask>
        - updateTask(id: string, data: UpdateTaskDto): Promise<StoredTask>
        - updateTaskStatus(id: string, status: TaskStatus): Promise<StoredTask>
        - deleteTask(id: string): Promise<void>
        - getLeaderboard(timezone: string): Promise<LeaderboardResponse>

    - id: "4.2"
      task: Create frontend/src/lib/api/taskTemplates.ts
      status: not_started
      details: |
        Methods:
        - createTemplate(data: CreateTaskTemplateDto): Promise<StoredTaskTemplate>
        - getTemplates(): Promise<StoredTaskTemplate[]>
        - updateTemplate(id: string, data: UpdateTaskTemplateDto): Promise<StoredTaskTemplate>
        - deleteTemplate(id: string): Promise<void>
        - reorderTemplates(orderedIds: string[]): Promise<StoredTaskTemplate[]>

    - id: "4.3"
      task: Register in main API client and bind methods
      status: not_started
      details: |
        Follow existing pattern in frontend/src/lib/api.ts or api/index.ts.
        Ensure all methods are properly bound to prevent context loss
        (lesson learned from existing codebase).

# =============================================================================
# PHASE 5: Frontend — Kanban Board
# =============================================================================
phase_5_kanban:
  status: not_started
  description: |
    The core UI: a four-column Kanban board with drag-and-drop. This is the
    most complex frontend phase and should be built incrementally.

  tasks:
    - id: "5.1"
      task: Add Tasks to sidebar navigation
      status: not_started
      details: |
        In frontend/src/components/MantineLayout.tsx, add to navItems:
        { label: 'Tasks', icon: IconChecklist, path: '/tasks' }

        Place after Projects in the nav order (or wherever feels natural).
        Import IconChecklist from @tabler/icons-react.

    - id: "5.2"
      task: Add /tasks route to frontend/src/App.tsx
      status: not_started
      details: |
        Add protected route for the Tasks page component.
        Follow existing route pattern with RouteErrorBoundary wrapper.

    - id: "5.3"
      task: Install and configure @hello-pangea/dnd
      status: not_started
      details: |
        npm install @hello-pangea/dnd

        If the project already has a DnD library installed, evaluate whether
        to use that instead. @hello-pangea/dnd is the recommendation per D7
        but avoid adding a second DnD library.

    - id: "5.4"
      task: Create TaskBoard component
      status: not_started
      details: |
        File: frontend/src/pages/Tasks.tsx (main page)
        File: frontend/src/components/tasks/TaskBoard.tsx (board component)

        Tasks.tsx is the page shell: title bar, split button, filter bar,
        leaderboard panel, and the board itself.

        TaskBoard.tsx renders the four-column Kanban:
        - Uses @hello-pangea/dnd DragDropContext, Droppable, Draggable
        - Four Droppable columns: todo, started, done, cancelled
        - Each column header shows status name and task count
        - Cards are Draggable within and between columns

        Data fetching:
        - useQuery(['tasks', 'board']) → getBoardTasks()
        - queryClient.invalidateQueries(['tasks']) on mutations

        Drag handler (onDragEnd):
        - Extract source column (fromStatus) and destination column (toStatus)
        - If same column, reorder only (optional, P2)
        - If different column, call updateTaskStatus mutation
        - Optimistic update: move card in local state immediately,
          revert on error

    - id: "5.5"
      task: Create TaskCard component
      status: not_started
      details: |
        File: frontend/src/components/tasks/TaskCard.tsx

        Mantine Card (compact) displaying:
        - Task title (bold, truncated with ellipsis if long)
        - Assignee avatar or name badge (if assigned)
        - Due date with overdue styling (red text/badge if past due)
        - Personal scope badge (only shown for personal tasks; family
          tasks show no badge since family is the default)

        Visual distinction for personal tasks:
        - Slightly dimmed background or a subtle left border color
        - Small "Personal" badge or icon

        Clicking the card opens a TaskDetailModal (Phase 6).

    - id: "5.6"
      task: Create KanbanColumn component
      status: not_started
      details: |
        File: frontend/src/components/tasks/KanbanColumn.tsx

        Wraps a Droppable zone for one status column.
        - Column header: status label + count badge
        - Scrollable card list (vertical overflow for many cards)
        - Visual feedback on drag-over (highlight border/background)
        - Done and Cancelled columns: consider lighter background to
          visually de-emphasize

    - id: "5.7"
      task: Implement auto-assignment on drag
      status: not_started
      details: |
        In the onDragEnd handler within TaskBoard:

        When a task is dragged to the "started" column:
        1. Check if task.assigneeId is null
        2. If null: call updateTaskStatus AND updateTask (set assigneeId
           to current user) — or handle server-side in updateTaskStatus
           (preferred, see Phase 2 task 2.1)
        3. If already assigned: only call updateTaskStatus

        The server-side auto-assignment in updateTaskStatus (Phase 2)
        handles this automatically when status changes to 'started' and
        assigneeId is null. The frontend just needs to refetch/invalidate
        to show the updated assignee.

    - id: "5.8"
      task: Add board filter bar
      status: not_started
      details: |
        Filter controls above the board:
        - Assignee filter: Select dropdown with family members + "Unassigned"
          + "All" (default)
        - Scope filter: Segmented control or select — "All" | "Family" | "Personal"

        Filtering is client-side on the board data (dataset is small).
        Store filter state in URL params for bookmarkability.

# =============================================================================
# PHASE 6: Frontend — Task CRUD Modals
# =============================================================================
phase_6_task_crud:
  status: not_started
  description: |
    Task creation, editing, and detail views. Includes the split button
    with template dropdown.

  tasks:
    - id: "6.1"
      task: Create TaskFormModal (create/edit)
      status: not_started
      details: |
        File: frontend/src/components/tasks/TaskFormModal.tsx

        Mantine Modal with form fields:
        - Title (TextInput, required, max 200)
        - Description (Textarea, optional, max 2000)
        - Assignee (Select, populated from family members, optional)
        - Due date (DatePickerInput, optional)
        - Scope (SegmentedControl: Family | Personal, default Family)

        On submit:
        - Create: POST /api/v1/tasks
        - Edit: PUT /api/v1/tasks/:id
        - useMutation with invalidateQueries(['tasks'])

        Status is NOT editable in this form — status changes happen
        via drag-and-drop or the detail view.

    - id: "6.2"
      task: Create TaskDetailModal
      status: not_started
      details: |
        File: frontend/src/components/tasks/TaskDetailModal.tsx

        Opened by clicking a task card on the board or in history.

        Displays:
        - All task fields (editable inline or via edit button → TaskFormModal)
        - Current status with manual status change buttons
          (e.g., "Mark as Done", "Cancel", "Restart")
        - Assignee with reassign capability
        - Full transition log as a timeline:
          - Each entry: "{User} changed status from {from} to {to} — {timestamp}"
          - Sorted newest first
        - Delete button (with confirmation)

    - id: "6.3"
      task: Create split button with template dropdown
      status: not_started
      details: |
        File: frontend/src/components/tasks/CreateTaskButton.tsx

        Mantine Button.Group with Menu:
        - Left side: "Create Task" button → opens TaskFormModal
        - Right side: dropdown chevron → opens Menu

        Menu contents:
        - Section header: "Quick Add"
        - List of task templates (from useQuery(['taskTemplates']))
          - Each item: template name, click → instant task creation
            via POST /api/v1/tasks with template defaults
            - Show brief success notification (Mantine notifications)
        - Divider
        - "Manage Templates..." → opens TemplateManagementModal

        If no templates exist, show a helpful empty state:
        "No templates yet. Create one to enable one-tap task creation."
        with a "Create Template" action.

    - id: "6.4"
      task: Create TemplateManagementModal
      status: not_started
      details: |
        File: frontend/src/components/tasks/TemplateManagementModal.tsx

        Mantine Modal with:
        - List of existing templates (name, default assignee, default scope)
        - Drag to reorder (or up/down arrow buttons for simplicity)
        - Inline edit or edit button per template
        - Delete button per template (with confirmation)
        - "Add Template" button at bottom → inline form or sub-modal

        Template form fields:
        - Name (TextInput, required)
        - Default assignee (Select, optional)
        - Default scope (SegmentedControl, default Family)

# =============================================================================
# PHASE 7: Frontend — Leaderboard
# =============================================================================
phase_7_leaderboard:
  status: not_started
  description: |
    Collapsible leaderboard panel on the Tasks page showing completion
    counts per family member across three time windows.

  tasks:
    - id: "7.1"
      task: Create Leaderboard component
      status: not_started
      details: |
        File: frontend/src/components/tasks/Leaderboard.tsx

        Collapsible panel (Mantine Collapse or Accordion) at the top of
        the Tasks page, above the board. Default: expanded.

        Layout:
        - Three columns or tabs: Today | This Week | This Month
        - Each shows family members ranked by completion count
        - Highlight the leader with a visual indicator (crown icon,
          bold text, colored background — keep it fun)
        - Show the count next to each name

        Data: useQuery(['tasks', 'leaderboard'], () =>
          api.tasks.getLeaderboard(Intl.DateTimeFormat().resolvedOptions().timeZone)
        )

        Refetch on task status changes (invalidate alongside board queries).

        Collapsed state stored in localStorage so the user's preference
        persists across page loads.

    - id: "7.2"
      task: Add motivational touches
      status: not_started
      details: |
        Keep this lightweight — no over-engineering.

        Ideas (pick what feels right during implementation):
        - Fire emoji or star next to someone with 5+ tasks today
        - "On a roll!" text when someone completes 3+ in a row
        - Streak counter if someone has completed tasks every day this week

        These are nice-to-have. The core leaderboard with counts and
        highlighting is the P0. Celebratory touches are P2.

# =============================================================================
# PHASE 8: Frontend — Task History
# =============================================================================
phase_8_history:
  status: not_started
  description: |
    Archive/history view for all tasks, accessible from the Tasks page.

  tasks:
    - id: "8.1"
      task: Create TaskHistory component
      status: not_started
      details: |
        File: frontend/src/components/tasks/TaskHistory.tsx

        Accessible via a tab or toggle on the Tasks page:
        - "Board" view (default) — Kanban board
        - "History" view — filterable list

        Alternatively, a "View History" button/link on the Tasks page
        that opens a modal or navigates to /tasks/history.

        Uses: useQuery(['tasks']) → getTasks() (full list, not board-filtered)

        Mantine Table or list view showing:
        - Task title
        - Status (badge with color)
        - Assignee
        - Created date
        - Completed/cancelled date (if applicable)

        Click a row → opens TaskDetailModal with full transition log.

    - id: "8.2"
      task: Add history filters
      status: not_started
      details: |
        Filter controls:
        - Status: multi-select (todo, started, done, cancelled, or all)
        - Assignee: select with family members + unassigned + all
        - Scope: family / personal / all
        - Date range: DateRangePicker filtering on createdAt, completedAt,
          or cancelledAt (selectable)

        Filtering is client-side (task volume is low for a household).
        Store filter state in URL params.

# =============================================================================
# PHASE 9: Testing
# =============================================================================
phase_9_testing:
  status: not_started
  description: |
    Risk-based testing focused on the areas most likely to break:
    status transitions, auto-assignment, leaderboard counting, and
    the transition log integrity.

  tasks:
    - id: "9.1"
      task: Integration tests for TaskService
      status: not_started
      details: |
        File: backend/src/__tests__/integration/taskService.test.ts

        Critical test cases:

        Status transitions:
        - Create task → status is 'todo', transitions has one entry
        - Move to started → startedAt set, transition logged
        - Move to done → completedAt set, transition logged
        - Move to cancelled → cancelledAt set, transition logged
        - Move back to todo → startedAt/completedAt/cancelledAt cleared
        - Move to done, then back to started, then to done again →
          completedAt reflects the second completion, transition log has
          all entries, leaderboard counts it once

        Auto-assignment:
        - Move unassigned task to started → assigneeId set to userId
        - Move assigned task to started → assigneeId unchanged

        Leaderboard:
        - Tasks completed today counted correctly
        - Tasks completed by different users attributed correctly
        - Task moved done→started→done counted once (not twice)
        - Personal task only counted for owner

        Board query:
        - Done task within 14 days → included
        - Done task older than 14 days → excluded
        - Todo and started tasks → always included

