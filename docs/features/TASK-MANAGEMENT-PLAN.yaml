# =============================================================================
# Household Task Management — Implementation Plan
# =============================================================================
# BRD: docs/features/TASK-MANAGEMENT-BRD.md
# Status: Not Started
# Last Updated: 2026-04-11
# =============================================================================

overview:
  description: |
    Implementation plan for a Kanban-style task management board for household
    chores, errands, and to-dos. This is a standalone feature with no connection
    to financial data. Tasks are family-scoped (like other entities) with an
    additional personal/family visibility distinction.

    Unlike Trips/Projects which are tag-based wrappers around transactions,
    Tasks are a fully independent entity with their own storage, status workflow,
    transition logging, and a Kanban drag-and-drop UI.

  key_files:
    brd: docs/features/TASK-MANAGEMENT-BRD.md
    shared_types: shared/types/index.ts
    backend_services: backend/src/services/index.ts
    backend_routes: backend/src/routes/
    frontend_pages: frontend/src/pages/
    sidebar_nav: frontend/src/components/MantineLayout.tsx
    api_client: frontend/src/lib/api/
    app_routes: frontend/src/App.tsx
    trip_service_reference: backend/src/services/tripService.ts

  dependency:
    feature: "Family & Multi-User Support"
    brd: docs/features/FAMILY-MULTI-USER-BRD.md
    reason: |
      Tasks require individual user identity for assignment, transition
      attribution, and leaderboard tracking. The familyId scoping pattern
      established by the Family feature is used for task storage.

# =============================================================================
# DECISIONS LOG — Capture key decisions as they're made during implementation
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-11
    decision: Tasks are a fully independent entity, not tag-based
    rationale: |
      Unlike Trips and Projects which wrap existing transactions via tags,
      Tasks have no relationship to financial data. They need their own
      storage key, their own CRUD, and their own UI. No tag system involvement.

  - id: D2
    date: 2026-04-11
    decision: Storage key pattern is tasks_{familyId}
    rationale: |
      Follows the established familyId scoping pattern. All family members
      share one task board. Personal tasks use a scope field on the task
      entity, not separate storage.

  - id: D3
    date: 2026-04-11
    decision: Task templates are family-scoped, stored as templates_{familyId}
    rationale: |
      All family members should see and use the same set of quick-add
      templates. No per-user template lists.

  - id: D4
    date: 2026-04-11
    decision: Transition log is an embedded array on the task, not a separate entity
    rationale: |
      A household task board will have low volume (tens to hundreds of tasks,
      not thousands). Embedding the log on the task keeps reads simple —
      one fetch gets the full history. No need for a separate log store.

  - id: D5
    date: 2026-04-11
    decision: 14-day archiving is a frontend filter, not a backend cron
    rationale: |
      Tasks in done/cancelled for >14 days are simply filtered out of the
      board query. They remain in storage and appear in Task History.
      No background cleanup job, no soft-delete flag — just a date check.

  - id: D6
    date: 2026-04-11
    decision: Leaderboard is computed server-side from transition logs
    rationale: |
      The transition log contains completedAt timestamps and userId for
      each transition. The backend computes counts by scanning tasks with
      done transitions in the requested time window. No separate leaderboard
      store — it's a derived view.

  - id: D7
    date: 2026-04-11
    decision: Use @hello-pangea/dnd for Kanban drag-and-drop
    rationale: |
      Community fork of react-beautiful-dnd (which is unmaintained). Mature,
      well-documented, works well with Mantine. If the project already uses
      a different DnD library, use that instead.

# =============================================================================
# PHASE 1: Shared Types
# =============================================================================
phase_1_types:
  status: not_started
  description: |
    Define all Task-related TypeScript interfaces in shared/types/index.ts.
    These types are consumed by backend services, routes, and the frontend.

  tasks:
    - id: "1.1"
      task: Define Task entity types in shared/types/index.ts
      status: not_started
      details: |
        Core types:

        type TaskStatus = 'todo' | 'started' | 'done' | 'cancelled';
        type TaskScope = 'family' | 'personal';

        interface TaskTransition {
          fromStatus: TaskStatus | null;  // null for initial creation
          toStatus: TaskStatus;
          timestamp: string;              // ISO datetime
          userId: string;                 // who made the change
        }

        interface Task {
          id: string;                     // UUID
          title: string;
          description: string;            // empty string default
          status: TaskStatus;
          scope: TaskScope;
          assigneeId: string | null;      // userId of assignee, null if unassigned
          dueDate: string | null;         // ISO date, null if no deadline
          createdAt: string;              // ISO datetime
          createdBy: string;              // userId
          startedAt: string | null;       // most recent transition to started
          completedAt: string | null;     // most recent transition to done
          cancelledAt: string | null;     // most recent transition to cancelled
          assignedAt: string | null;      // most recent assignment change
          transitions: TaskTransition[];  // append-only log
        }

        interface StoredTask extends Task {
          familyId: string;
        }

    - id: "1.2"
      task: Define Task DTO types
      status: not_started
      details: |
        interface CreateTaskDto {
          title: string;
          description?: string;
          scope?: TaskScope;              // default: 'family'
          assigneeId?: string | null;
          dueDate?: string | null;
        }

        interface UpdateTaskDto {
          title?: string;
          description?: string;
          scope?: TaskScope;
          assigneeId?: string | null;
          dueDate?: string | null;
        }

        interface UpdateTaskStatusDto {
          status: TaskStatus;
        }

    - id: "1.3"
      task: Define Task Template types
      status: not_started
      details: |
        interface TaskTemplate {
          id: string;                     // UUID
          name: string;                   // template name = default task title
          defaultAssigneeId: string | null;
          defaultScope: TaskScope;        // default: 'family'
          sortOrder: number;              // display order in dropdown
        }

        interface StoredTaskTemplate extends TaskTemplate {
          familyId: string;
          createdAt: string;
          updatedAt: string;
        }

        interface CreateTaskTemplateDto {
          name: string;
          defaultAssigneeId?: string | null;
          defaultScope?: TaskScope;
        }

        interface UpdateTaskTemplateDto {
          name?: string;
          defaultAssigneeId?: string | null;
          defaultScope?: TaskScope;
          sortOrder?: number;
        }

    - id: "1.4"
      task: Define Leaderboard response type
      status: not_started
      details: |
        interface LeaderboardEntry {
          userId: string;
          displayName: string;
          completedToday: number;
          completedThisWeek: number;
          completedThisMonth: number;
        }

        interface LeaderboardResponse {
          entries: LeaderboardEntry[];
          // The time boundaries used for computation (so frontend knows
          // the exact windows, accounting for timezone)
          boundaries: {
            todayStart: string;
            weekStart: string;
            monthStart: string;
          };
        }

# =============================================================================
# PHASE 2: Backend — Task Service
# =============================================================================
phase_2_task_service:
  status: not_started
  description: |
    Core task CRUD and status management. This is the largest backend phase.
    Follow the singleton service pattern used by TripService, ProjectService, etc.

  tasks:
    - id: "2.1"
      task: Create TaskService in backend/src/services/taskService.ts
      status: not_started
      details: |
        Constructor dependencies: DataService (for persistence)
        Storage key: tasks_{familyId}

        Methods:

        --- CRUD ---
        createTask(data: CreateTaskDto, userId: string, familyId: string): Promise<StoredTask>
          - Generate UUID
          - Set status to 'todo', createdAt/createdBy
          - Initialize transitions array with creation entry: { from: null, to: 'todo', timestamp, userId }
          - If assigneeId provided, set assignedAt

        getTask(taskId: string, familyId: string): Promise<StoredTask | null>

        getAllTasks(familyId: string): Promise<StoredTask[]>

        updateTask(taskId: string, data: UpdateTaskDto, userId: string, familyId: string): Promise<StoredTask>
          - Update mutable fields (title, description, scope, dueDate)
          - If assigneeId changes, update assignedAt
          - Does NOT change status (use updateTaskStatus for that)

        deleteTask(taskId: string, familyId: string): Promise<void>
          - Hard delete. No confirmation logic here — that's a frontend concern.

        --- STATUS ---
        updateTaskStatus(taskId: string, newStatus: TaskStatus, userId: string, familyId: string): Promise<StoredTask>
          - Append to transitions array: { from: currentStatus, to: newStatus, timestamp, userId }
          - Update convenience timestamps based on newStatus:
            - 'started' → set startedAt, clear completedAt and cancelledAt
            - 'done' → set completedAt, clear cancelledAt
            - 'cancelled' → set cancelledAt, clear completedAt
            - 'todo' → clear startedAt, completedAt, cancelledAt
          - If moving from todo to started AND assigneeId is null:
            auto-assign to userId, set assignedAt
          - Return updated task

        --- BOARD QUERY ---
        getBoardTasks(familyId: string): Promise<StoredTask[]>
          - Returns all tasks EXCEPT those in done/cancelled for > 14 days
          - Filter: if status is done/cancelled, include only if
            completedAt or cancelledAt is within the last 14 days

        --- LEADERBOARD ---
        getLeaderboard(familyId: string, timezone: string): Promise<LeaderboardResponse>
          - Compute time boundaries (today start, week start, month start) in
            the given timezone
          - Scan all tasks for transitions to 'done' within each window
          - Count by the userId on the transition entry (who completed it),
            not by assigneeId
          - For tasks moved to done multiple times, count only the most recent
            completedAt (same logic as convenience timestamp)
          - Look up display names from family member data

        Private helpers:
        - loadTasks(familyId): Read from storage
        - saveTasks(tasks, familyId): Write to storage
        - isArchived(task): Check if done/cancelled > 14 days ago

    - id: "2.2"
      task: Create TaskTemplateService in backend/src/services/taskTemplateService.ts
      status: not_started
      details: |
        Constructor dependencies: DataService
        Storage key: task_templates_{familyId}

        Methods:
        - createTemplate(data: CreateTaskTemplateDto, familyId: string): Promise<StoredTaskTemplate>
          - Auto-assign sortOrder as max(existing) + 1
        - getTemplates(familyId: string): Promise<StoredTaskTemplate[]>
          - Return sorted by sortOrder
        - updateTemplate(id: string, data: UpdateTaskTemplateDto, familyId: string): Promise<StoredTaskTemplate>
        - deleteTemplate(id: string, familyId: string): Promise<void>
        - reorderTemplates(orderedIds: string[], familyId: string): Promise<StoredTaskTemplate[]>
          - Accept array of template IDs in desired order
          - Reassign sortOrder based on array index

    - id: "2.3"
      task: Register services in backend/src/services/index.ts
      status: not_started
      details: |
        Instantiate TaskService and TaskTemplateService singletons with
        DataService dependency. Export for use in routes.

# =============================================================================
# PHASE 3: Backend — Routes
# =============================================================================
phase_3_routes:
  status: not_started
  description: |
    API routes for tasks and task templates. Follow existing route patterns
    with authMiddleware and Zod validation.

  tasks:
    - id: "3.1"
      task: Create task routes in backend/src/routes/tasks.ts
      status: not_started
      details: |
        All endpoints protected by authMiddleware.
        familyId and userId extracted from req.user (set by auth middleware).

        Endpoints:

        POST   /api/v1/tasks                    — Create task
        GET    /api/v1/tasks                    — Get all tasks (full list, for history)
        GET    /api/v1/tasks/board              — Get board tasks (filtered, excludes archived)
        GET    /api/v1/tasks/leaderboard        — Get leaderboard
          Query params: timezone (required, e.g., "America/New_York")
        GET    /api/v1/tasks/:id                — Get single task with full transition log
        PUT    /api/v1/tasks/:id                — Update task fields (not status)
        PATCH  /api/v1/tasks/:id/status         — Update task status
        DELETE /api/v1/tasks/:id                — Delete task

        Zod schemas:
        - createTaskSchema:
            title: z.string().min(1).max(200)
            description: z.string().max(2000).optional()
            scope: z.enum(['family', 'personal']).optional()
            assigneeId: z.string().uuid().nullable().optional()
            dueDate: z.string().date().nullable().optional()
        - updateTaskSchema: all fields optional, same constraints
        - updateStatusSchema:
            status: z.enum(['todo', 'started', 'done', 'cancelled'])
        - leaderboardQuerySchema:
            timezone: z.string().min(1)

    - id: "3.2"
      task: Create task template routes in backend/src/routes/taskTemplates.ts
      status: not_started
      details: |
        POST   /api/v1/task-templates              — Create template
        GET    /api/v1/task-templates              — List all templates (sorted)
        PUT    /api/v1/task-templates/:id          — Update template
        DELETE /api/v1/task-templates/:id          — Delete template
        PUT    /api/v1/task-templates/reorder      — Reorder templates

        Zod schemas:
        - createTemplateSchema:
            name: z.string().min(1).max(100)
            defaultAssigneeId: z.string().uuid().nullable().optional()
            defaultScope: z.enum(['family', 'personal']).optional()
        - updateTemplateSchema: all fields optional
        - reorderSchema:
            orderedIds: z.array(z.string().uuid())

    - id: "3.3"
      task: Register routes in backend app
      status: not_started
      details: |
        Mount task routes at /api/v1/tasks
        Mount template routes at /api/v1/task-templates
        Follow existing route registration pattern.

# =============================================================================
