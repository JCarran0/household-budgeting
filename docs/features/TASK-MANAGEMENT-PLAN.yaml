implementation_order:
  description: |
    Phases 1-4 are the backend foundation. Phase 5 (Kanban board) is the
    core frontend deliverable. Phases 6-8 layer on task CRUD, leaderboard,
    and history. Phase 9 testing runs alongside development.

    Phase 5 is the most complex phase due to drag-and-drop. Recommend
    getting a basic board working early (even with placeholder data)
    before wiring up the full API integration.

  sequence:
    - phase: 1 — Shared Types
      reason: Types are consumed by all other phases
    - phase: 2 — Task Service & Template Service
      reason: Business logic before routes
    - phase: 3 — Routes
      reason: API endpoints must exist before frontend can consume them
    - phase: 4 — API Client
      reason: Frontend methods needed for UI development
    - phase: 5 — Kanban Board (core drag-and-drop)
      reason: Primary user-facing deliverable. Get this working first.
    - phase: 6 — Task CRUD Modals (create, edit, detail, templates)
      reason: Adds full task management on top of the board
    - phase: 7 — Leaderboard
      reason: Independent panel, can be built in parallel with Phase 6
    - phase: 8 — Task History
      reason: Archive view, lowest priority frontend piece
    - phase: 9 — Testing
      reason: Write integration tests during Phases 2-3; manual testing after Phase 8
