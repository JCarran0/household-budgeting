# =============================================================================
# Trip Itineraries — Implementation Plan
# =============================================================================
# BRD: docs/features/TRIP-ITINERARIES-BRD.md
# Test Plan: docs/features/TRIP-ITINERARIES-TEST-PLAN.md
# Extends: docs/features/TRAVEL-TAGGING-PLAN.yaml (completed)
# Status: Implementation complete (phases 1-8); release pending
# Last Updated: 2026-04-18
# =============================================================================

overview:
  description: |
    Implementation plan for the Trip Itineraries feature. Extends the existing
    Trip entity with a collection of Stops (Stay, Eat, Play, Transit) and a new
    Trip Detail view at /trips/:tripId rendered as a day-by-day agenda.

    The existing /trips accordion list view is preserved for retrospective
    budget review (unchanged financial behavior). Stops do not modify
    transaction tags — link-to-transaction is an explicit V2 item.

  key_files:
    brd: docs/features/TRIP-ITINERARIES-BRD.md
    extends_plan: docs/features/TRAVEL-TAGGING-PLAN.yaml
    shared_types: shared/types/index.ts
    trip_service: backend/src/services/tripService.ts
    trip_routes: backend/src/routes/trips.ts
    trips_page: frontend/src/pages/Trips.tsx
    api_client: frontend/src/lib/api/trips.ts
    app_routes: frontend/src/App.tsx

# =============================================================================
# DECISIONS LOG — Capture key decisions as they're made during implementation
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-18
    decision: Stop is a first-class typed entity, not a union of loosely related records
    rationale: |
      Stay/Eat/Play/Transit share a spine (date, location, notes) but diverge
      enough (Stay has endDate, Transit has mode + from/to) that modeling as a
      discriminated union on `type` keeps the rest of the system honest. TypeScript
      discriminated unions + Zod discriminated unions both support this cleanly.

  - id: D2
    date: 2026-04-18
    decision: Stay dates are night-based, not day-based
    rationale: |
      A Stay's startDate is the first night slept there; endDate is the last night.
      Check-out morning is implicit (endDate + 1) and not represented in data. This
      dissolves the overlapping-stays question — two stays can be adjacent but never
      cover the same night. Matches how humans think about hotels ("3 nights").

  - id: D3
    date: 2026-04-18
    decision: No-overlap rule for Stays is enforced server-side with a clear error
    rationale: |
      REQ-014. Two Stays whose [startDate, endDate] ranges intersect on any night
      are rejected on create/update. Frontend validates pre-submit for UX; backend
      is the source of truth. Error message must name the conflicting Stay.

  - id: D4
    date: 2026-04-18
    decision: Stops are embedded in the Trip entity, not stored separately
    rationale: |
      Trips are loaded individually for the detail view; stops are always read
      and written with their parent Trip. A trip with 50 stops is still a small
      JSON payload (<100KB). Embedding keeps the storage model simple and
      matches the existing pattern (categoryBudgets embedded). If performance
      becomes an issue (unlikely), splitting into trip_stops_{familyId}.json
      is a backwards-compatible migration.

  - id: D5
    date: 2026-04-18
    decision: Stop create/edit/delete endpoints are nested under trips — /trips/:tripId/stops
    rationale: |
      Clean REST shape, makes the parent-child relationship explicit, and uses
      the existing trip-level auth/family-scoping middleware without change.

  - id: D6
    date: 2026-04-18
    decision: Stops do not modify transaction tags
    rationale: |
      REQ A-02. Link-to-transaction is a V2 item. MVP treats planning and
      financial tracking as two independent lenses on the same Trip. Keeps
      MVP scope contained and avoids bidirectional sync complexity.

  - id: D7
    date: 2026-04-18
    decision: Address verification uses Google Places Autocomplete (V1)
    rationale: |
      De facto standard, generous free tier (first 10k sessions/month free at
      current pricing), matches user expectation for "real addresses" in a
      travel planner. Provider is swappable via a thin adapter interface;
      Mapbox is a viable alternative if billing becomes a concern.

  - id: D8
    date: 2026-04-18
    decision: Trip Detail view is a new route at /trips/:tripId with tabs
    rationale: |
      REQ-017. Tabs (Itinerary | Spending | Notes) keep the information dense
      but unambiguous. The list view at /trips stays as the at-a-glance /
      retrospective surface. React Router nested route; tab state in URL
      via ?tab=itinerary for bookmarkability (matches project convention,
      per CLAUDE.md "URL-Based Page State").

  - id: D9
    date: 2026-04-18
    decision: Agenda rendering is derived, not stored
    rationale: |
      Day sections, Stay chapter banners, "Today" highlighting, and the
      base-change-vs-day-trip Transit distinction are all computed from the
      stop list at render time. No denormalization in storage. Keeps the data
      model minimal; the view layer owns the presentational logic.

  - id: D10
    date: 2026-04-18
    decision: Stop ordering for untimed stops is a persisted field, not derived
    rationale: |
      REQ-025. Untimed stops support manual drag reorder, so each stop needs
      a sortOrder field scoped to its day. Timed stops ignore sortOrder and
      sort by time. A combined sort (time then sortOrder) keeps the logic
      single-pass in the view.

  - id: D11
    date: 2026-04-18
    decision: Templates pre-fill the Stay form's defaults rather than creating scaffolded Stays
    rationale: |
      The original plan (6.2) called for templates to create Stays with placeholder
      names and empty locations. But Stays require a VerifiedLocation per the data
      model (REQ-009 / Zod schema), and there is no honest way to mint a verified
      address without a real Google Places lookup. Rather than weaken the invariant,
      templates now pass `{ defaultDate, defaultNights }` back to the parent, which
      opens the Add Stay sheet pre-filled with template-appropriate nights. User
      fills the address themselves. Multi-city creates only the first Stay; the
      user adds the second base + drive transit manually afterwards.

  - id: D12
    date: 2026-04-18
    decision: Autosave-on-valid from REQ-036 deferred; explicit Save button for V1
    rationale: |
      The plan called for automatic save when required fields become valid.
      Implementing that correctly (debounced create-then-update semantics, optimistic
      UI, error recovery) is fiddly and has a meaningful regression surface. Explicit
      Save is predictable, matches the Trip edit modal pattern already in the app,
      and adds zero UX risk. Autosave can be revisited once the broader flow is
      validated in real use.

  - id: D13
    date: 2026-04-18
    decision: Frontend smoke tests (task 8.3) skipped — no test harness installed
    rationale: |
      The frontend has no test runner configured (no Vitest, Jest, or RTL). Setting
      up a test harness just for a handful of TripDetail smoke tests would be a
      disproportionate lift and conflicts with the project's explicit risk-based
      testing philosophy ("skip unit tests for UI components, prefer integration +
      manual" — CLAUDE.md). Coverage instead comes from: backend integration tests
      (tripStops.test.ts), shared helper unit tests (tripHelpers.test.ts), and the
      manual UAT test plan (docs/features/TRIP-ITINERARIES-TEST-PLAN.md). If/when
      the project adopts a frontend test harness, these smoke tests can be added
      alongside the broader initiative.

# =============================================================================
# PHASE 1: Shared Types & Data Model
# =============================================================================
phase_1_data_model:
  status: completed
  description: |
    Define Stop types as a discriminated union in shared/types/index.ts and
    extend the Trip entity to carry a stops array. Add Zod schemas for CRUD.

  tasks:
    - id: "1.1"
      task: Define Stop discriminated union in shared/types/index.ts
      status: completed
      details: |
        export type StopType = 'stay' | 'eat' | 'play' | 'transit';
        export type TransitMode = 'drive' | 'flight' | 'train' | 'walk' | 'shuttle' | 'other';

        interface StopBase {
          id: string;                 // UUID
          date: string;               // ISO date (required)
          time: string | null;        // "HH:mm" 24h, nullable
          notes: string;              // free text, default ''
          sortOrder: number;          // user-controlled ordering for untimed stops within a day
          createdAt: string;
          updatedAt: string;
        }

        interface StayStop extends StopBase {
          type: 'stay';
          name: string;                       // required
          location: VerifiedLocation;         // required
          endDate: string;                    // ISO date, last night of stay (D2)
        }

        interface EatStop extends StopBase {
          type: 'eat';
          name: string;                       // required
          location: VerifiedLocation | FreeTextLocation | null;
        }

        interface PlayStop extends StopBase {
          type: 'play';
          name: string;                       // required
          location: VerifiedLocation | FreeTextLocation | null;
          durationMinutes: number | null;     // optional
        }

        interface TransitStop extends StopBase {
          type: 'transit';
          mode: TransitMode;                  // required
          fromLocation: VerifiedLocation | FreeTextLocation | null;
          toLocation: VerifiedLocation | FreeTextLocation | null;
          durationMinutes: number | null;
        }

        interface VerifiedLocation {
          kind: 'verified';
          label: string;                // short human display ("Hotel Arts Barcelona")
          address: string;              // full formatted address
          lat: number;
          lng: number;
          placeId: string;              // provider-specific, for dedup/update
        }

        interface FreeTextLocation {
          kind: 'freeText';
          label: string;                // e.g., "Grandma's house"
        }

        export type Stop = StayStop | EatStop | PlayStop | TransitStop;

    - id: "1.2"
      task: Extend Trip interface to carry stops array
      status: completed
      details: |
        In shared/types/index.ts:
        interface Trip { ...existing fields; stops: Stop[]; }

        Default value on existing trips (migration): empty array. Handled in
        TripService.loadTrips() by defaulting missing `stops` to [] rather
        than a migration pass (backwards-compatible read).

    - id: "1.3"
      task: Define Zod schemas for Stop CRUD
      status: completed
      details: |
        Use z.discriminatedUnion('type', [staySchema, eatSchema, playSchema, transitSchema]).

        Shared refinements:
        - date is valid ISO date
        - time matches /^([01]\d|2[0-3]):[0-5]\d$/ when present
        - Stay: endDate >= startDate
        - Stay: location.kind === 'verified' (forced via schema — not FreeText)
        - Transit: mode is a valid TransitMode
        - notes max length 2000

        Two schemas: createStopSchema (all required fields) and updateStopSchema
        (partial, same refinements).

    - id: "1.4"
      task: Add helper utilities in shared/utils/tripHelpers.ts
      status: completed
      details: |
        Functions needed for both backend validation and frontend rendering:

        - stayCoversDate(stay, date): boolean
        - stayOverlapsStay(a, b): boolean  // used for no-overlap validation
        - validateNoStayOverlap(stops, newStop): { ok: boolean; conflictsWith?: StayStop }
        - computeAgendaDayRange(stops, trip): { start: string; end: string }
        - groupStopsByDay(stops): Map<string /*date*/, Stop[]>
        - findActiveStay(stops, date): StayStop | null
        - isTransitBaseChange(transit, stops): boolean
            // true if the transit date is the last day of one Stay AND the
            // next Stay starts on or immediately after the transit date

        Tests: unit test each helper with edge cases (empty stops, adjacent
        stays, single-day trip, multi-day stay, overlapping transit).

# =============================================================================
# PHASE 2: Backend — Service & Routes
# =============================================================================
phase_2_backend:
  status: completed
  description: |
    Extend TripService with stop CRUD operations and add nested routes under
    /trips/:tripId/stops. Enforce the no-overlap rule server-side.

  tasks:
    - id: "2.1"
      task: Extend TripService with stop CRUD methods
      status: completed
      details: |
        Add methods to backend/src/services/tripService.ts:

        - createStop(tripId, familyId, data: CreateStopDto, userId?): Promise<Stop>
        - updateStop(tripId, stopId, familyId, data: UpdateStopDto, userId?): Promise<Stop>
        - deleteStop(tripId, stopId, familyId): Promise<void>
        - reorderStops(tripId, familyId, updates: { id: string; sortOrder: number }[]): Promise<void>

        Each method:
        1. Load the trip (404 if not found)
        2. For create/update of a Stay: run validateNoStayOverlap; throw
           a named error with the conflicting Stay's name (SEC: do not leak
           other trips' data)
        3. Mutate the trip's stops array
        4. Save the trip; bump trip.updatedAt and lastModifiedBy

        All operations are whole-trip writes (simple, consistent with existing
        trip save pattern). Single-user concurrency is acceptable for a 2-user
        family app — last-write-wins matches existing trip edit semantics.

    - id: "2.2"
      task: Add nested stop routes to backend/src/routes/trips.ts
      status: completed
      details: |
        - POST   /api/v1/trips/:tripId/stops        — create
        - PATCH  /api/v1/trips/:tripId/stops/:id    — update
        - DELETE /api/v1/trips/:tripId/stops/:id    — delete
        - POST   /api/v1/trips/:tripId/stops/reorder — batch sortOrder update
                                                      body: { updates: { id, sortOrder }[] }

        All routes:
        - authenticateToken middleware (existing)
        - family-scoping via authenticated user's familyId
        - Zod validation on body using schemas from 1.3
        - Return 400 with stop-overlap error code when validateNoStayOverlap fails

        Reuse existing trip route patterns for error handling, logging, and
        response shape.

    - id: "2.3"
      task: Integration tests for stop CRUD
      status: completed
      details: |
        Add to backend/src/__tests__/integration/tripService.test.ts (or new
        tripStops.test.ts). Cover:

        - Create each stop type; verify persistence and shape
        - Update a stop; verify updatedAt bumps
        - Delete a stop; verify removal
        - Reorder: verify sortOrder updates are applied
        - Stay overlap rejection: adjacent stays allowed, overlapping rejected
        - Stay overlap error names the conflicting stay
        - Deleting a trip also deletes its stops (already covered by existing
          trip deletion; verify stops field too)
        - Permissions: any family member can CRUD (use two user contexts)
        - Stop date outside trip's nominal range: allowed (REQ-012)

# =============================================================================
# PHASE 3: Frontend — Routing & Detail View Skeleton
# =============================================================================
phase_3_routing:
  status: completed
  description: |
    Add the /trips/:tripId route and a skeleton Trip Detail page with three
    tabs. Wire the "View Details" affordance into the existing accordion.

  tasks:
    - id: "3.1"
      task: Add API client methods in frontend/src/lib/api/trips.ts
      status: completed
      details: |
        - getTripSummary(tripId): Promise<TripSummary>
          (full trip with stops + computed spending — extend existing endpoint
          if needed, or add a new /trips/:tripId endpoint)
        - createStop(tripId, data): Promise<Stop>
        - updateStop(tripId, stopId, data): Promise<Stop>
        - deleteStop(tripId, stopId): Promise<void>
        - reorderStops(tripId, updates): Promise<void>

    - id: "3.2"
      task: Add /trips/:tripId route in frontend/src/App.tsx
      status: completed
      details: |
        import { TripDetail } from './pages/TripDetail';
        <Route path="/trips/:tripId" element={<TripDetail />} />

    - id: "3.3"
      task: Create frontend/src/pages/TripDetail.tsx skeleton
      status: completed
      details: |
        Structure:
        - useParams() to get tripId
        - useSearchParams() to sync active tab (?tab=itinerary|spending|notes)
        - React Query: ['trip', tripId] with staleTime 5 min
        - Header: back link, trip name, date range, status badge, rating,
          edit/delete actions (reuse TripFormModal + DeleteTripModal)
        - Mantine <Tabs> with three panels, defaulting to 'itinerary'
        - Loading, error, not-found states

        Defer the actual tab contents to later phases. Use placeholder panels.

    - id: "3.4"
      task: Add "View Details" action to the accordion on /trips
      status: completed
      details: |
        In frontend/src/pages/Trips.tsx TripCard, inside the existing
        Accordion.Panel action group, add a button/link "View Details"
        that navigates to /trips/:id. Place it left of edit/delete so it's
        the primary action on the expanded panel.

    - id: "3.5"
      task: Move the existing category breakdown + notes into Spending and Notes tabs
      status: completed
      details: |
        Lift the table rendering from TripCard.Accordion.Panel into a reusable
        <TripSpendingBreakdown> component used by both the Spending tab and
        the existing accordion panel. Same for the notes text.

        Result: the accordion continues to render the breakdown (REQ-043),
        the detail view's Spending tab shows the same content without drift.

# =============================================================================
# PHASE 4: Frontend — Agenda Rendering (Itinerary Tab)
# =============================================================================
phase_4_agenda:
  status: completed
  description: |
    Render the day-by-day agenda in the Itinerary tab. This is the largest
    frontend phase and the feature's headline surface.

  tasks:
    - id: "4.1"
      task: Create frontend/src/components/trips/Agenda.tsx
      status: completed
      details: |
        Props: { trip: TripSummary; stops: Stop[] }

        Responsibilities:
        - Compute agenda day range via computeAgendaDayRange (stops + trip)
        - Build day list; for each day:
          - Find active Stay (findActiveStay)
          - Partition stops: timed (sorted ascending), untimed (by sortOrder)
          - Classify each Transit as base-change or day-trip
        - Render:
          - Stay chapter banner above the first day of its range (spans visually)
          - Day section (DaySection component)
          - Base-change Transit as a full-width connector tile between chapters
          - "Today" highlight when date === today

        Visual style: match the mockup from the BRD design phase — vertical
        scroll, muted dividers, chapter banners with subtle emphasis.

    - id: "4.2"
      task: Create DaySection.tsx
      status: completed
      details: |
        Props: { date; dayIndex; stops; stay; collapsed; onToggle; isToday; isOutsideNominalRange }

        Renders:
        - Collapsible header: "Sat, Apr 19 · Day 1" + collapse chevron
        - When collapsed: summary line "3 stops · Sagrada Família + 2 more"
        - When expanded: list of Stop cards, ordered per REQ-025

        Default state: expanded. Collapse state persisted per-trip to
        sessionStorage (not server) — cheap, fine for MVP.

        "Today" treatment: accent border or colored date text.
        Out-of-nominal-range: dimmed header.

    - id: "4.3"
      task: Create StopCard.tsx (one component handling all four types)
      status: completed
      details: |
        Props: { stop: Stop; onEdit; onDelete; onDragHandleProps? }

        Renders (horizontal row, mobile-first):
        - Type icon (Stay: IconBed, Eat: IconToolsKitchen2, Play: IconMasksTheater, Transit varies by mode)
        - Time (if set) or "—" for untimed
        - Title/description
        - Secondary line: location label (if set) or derived travel info for Transit
        - Hover actions: edit, delete, drag handle (drag handle only for untimed)

        Stop type → icon mapping lives in a small utility file for reuse.

    - id: "4.4"
      task: Create StayBanner.tsx
      status: completed
      details: |
        Props: { stay: StayStop; nightIndex: number; totalNights: number }

        Renders a sticky/visible chapter header above the day sections its
        Stay covers. Shows "🏨 Hotel Arts Barcelona — night 2 of 3" with
        edit affordance.

        Mechanics: the parent Agenda renders one StayBanner per unique Stay,
        positioned before the first day it covers. Days within the Stay
        don't repeat the banner (REQ-023).

    - id: "4.5"
      task: Create TransitConnectorTile.tsx
      status: completed
      details: |
        Full-width tile used for base-change Transits between two Stay
        chapters. Shows mode icon, duration, from → to labels, edit/delete
        actions.

        Rendered inline in the Agenda's day list — between the last day of
        the outgoing Stay's chapter and the first day of the incoming Stay's
        chapter.

    - id: "4.6"
      task: Wire drag-to-reorder for untimed stops
      status: completed
      details: |
        Use @hello-pangea/dnd — already installed and used by the Task Kanban
        (see frontend/src/components/tasks/KanbanColumn.tsx). Reusing the same
        library keeps the drag implementation consistent across features.

        Scope: drag is allowed only between untimed stops within the same day.
        Timed stops and drags across days are disabled.

        On drop: compute new sortOrder values, call reorderStops mutation,
        optimistically update React Query cache.

        Note: the itinerary's use case is a subset of the kanban's (intra-list
        reorder only, no cross-column moves), so the implementation is simpler.
        See tech debt item #10 (AI-TECHNICAL-DEBT.md) for the broader goal of
        extracting a shared SortableList component across kanban + task edit
        subtasks + itinerary — not in scope for this feature's V1.

    - id: "4.7"
      task: Empty-day placeholder rendering
      status: completed
      details: |
        When a day is expanded but has zero stops, render a soft placeholder
        "Nothing planned" + inline "+ Add stop" button (REQ-042).

    - id: "4.8"
      task: Gap-day Stay nudge
      status: completed
      details: |
        When the agenda has one or more contiguous days not covered by any
        Stay, render "Where are you staying after [date]? + Add Stay" at
        the boundary (REQ-041). Deduplicated per uncovered range.

# =============================================================================
# PHASE 5: Frontend — Stop Creation Flow
# =============================================================================
phase_5_creation:
  status: completed
  description: |
    Type-first bottom sheet, per-type forms, save-on-blur, Google Places
    autocomplete, Transit auto-infer.

  tasks:
    - id: "5.1"
      task: Install Google Places Autocomplete dependency
      status: completed
      details: |
        Add a lightweight wrapper (e.g., react-google-autocomplete or a custom
        hook using the Maps JS API loader). Prefer a solution that exposes
        placeId + lat/lng in the callback — we need all three for
        VerifiedLocation.

        Add VITE_GOOGLE_PLACES_API_KEY to frontend env config.
        Document in deployment docs (key restrictions: HTTP referrers =
        production domains + localhost).

    - id: "5.2"
      task: Create LocationInput.tsx (verified + free-text)
      status: completed
      details: |
        Props: { value: VerifiedLocation | FreeTextLocation | null;
                 onChange; mode: 'verifiedOnly' | 'verifiedOrFreeText' }

        'verifiedOnly' mode: input is a Google Places autocomplete only.
        Used for Stay.

        'verifiedOrFreeText' mode: shows autocomplete with a "Use as typed"
        fallback (fires a FreeTextLocation). Used for Eat/Play/Transit
        endpoints.

    - id: "5.3"
      task: Create AddStopSheet.tsx — bottom sheet with type picker
      status: completed
      details: |
        Props: { opened; onClose; tripId; defaultDate }

        States:
        1. picker — four chips: Stay / Eat / Play / Transit
        2. form — the selected type's form

        Transitions: chip tap → swap chip grid for form. Back arrow in form
        header returns to picker.

        Mobile-first: use Mantine Modal with transitionProps slide-up,
        fullScreen on small viewports.

    - id: "5.4"
      task: Create StayForm.tsx
      status: completed
      details: |
        Fields:
        - Name (required text)
        - Location (LocationInput, verifiedOnly)
        - Start date (DatePickerInput, defaults to sheet's defaultDate)
        - Nights (SegmentedControl with quick picks 1/2/3/7 + NumberInput fallback)
          endDate derived as startDate + (nights - 1)
        - Time of check-in (optional, TimeInput)
        - "More details" disclosure: notes, URL, confirmation code (notes only stored in V1)

        Validation: Zod-based via the shared createStopSchema with type=stay.
        Client-side no-overlap check against the trip's existing Stays for
        fast feedback; server enforces definitively.

        Save: on blur or debounced change, if valid, call createStop or
        updateStop. Show inline "Saved" indicator.

    - id: "5.5"
      task: Create EatForm.tsx and PlayForm.tsx
      status: completed
      details: |
        Small variants of StayForm. Shared component EatPlayForm with a prop
        controlling whether duration is shown (Play: yes, Eat: no).

        Fields:
        - Name (required text)
        - Location (LocationInput, verifiedOrFreeText, optional)
        - Date (required)
        - Time (optional)
        - Duration in minutes (Play only, optional)
        - "More details": notes

    - id: "5.6"
      task: Create TransitForm.tsx
      status: completed
      details: |
        Fields:
        - Mode (SegmentedControl: Drive / Flight / Train / Walk / Shuttle / Other)
        - Date (required)
        - Time (optional)
        - From (LocationInput, verifiedOrFreeText — pre-filled from the
          previous stop's location/toLocation when available)
        - To (LocationInput, verifiedOrFreeText — pre-filled from the next
          stop's location/fromLocation when available)
        - Duration minutes (optional)
        - "More details": notes

        Pre-fill is computed once when the form opens based on the current
        agenda context. User can override.

    - id: "5.7"
      task: Wire "+ Add stop" buttons in DaySection and empty-day placeholder
      status: completed
      details: |
        Both open AddStopSheet with defaultDate = that day's date.

# =============================================================================
# PHASE 6: Frontend — Empty States & Templates
# =============================================================================
phase_6_empty_states:
  status: completed
  description: |
    First-run empty state, three CTAs, basic templates. Gap-day nudge
    already in Phase 4; this phase focuses on the no-stops state.

  tasks:
    - id: "6.1"
      task: Create ItineraryEmptyState.tsx
      status: completed
      details: |
        Rendered inside the Itinerary tab when stops.length === 0.

        Large friendly card:
        "🏨 Where are you staying?
         Adding a place to stay anchors your trip."

        CTAs (in priority order):
        - Primary button: "+ Add a Stay" → opens AddStopSheet with type=stay
          pre-selected and defaultDate = trip.startDate
        - Secondary link: "I'm flying first" → AddStopSheet with type=transit
          + mode=flight pre-selected
        - Tertiary link: "Use template" → opens TripTemplateModal

        Dismisses automatically when any stop is created (driven by the
        stops prop becoming non-empty).

    - id: "6.2"
      task: Create TripTemplateModal.tsx
      status: completed
      details: |
        Three template choices for V1:
        - City break: one Stay spanning nights 1..(tripLength-1).
        - Multi-city: two Stays split roughly evenly across the trip, with
          a Drive Transit between them.
        - Beach week: one Stay spanning all nights of the trip.

        Each template, when applied:
        - Generates the Stays with placeholder names ("Hotel", "City A hotel")
          and empty location (user fills in after)
        - For multi-city: also creates a base-change Transit between them
        - Stops are created via the regular createStop API — no new endpoint

        Templates are simple pre-canned sequences of create calls; no need
        for server-side template definitions in V1.

