# =============================================================================
# PHASE 6: Frontend — Chat Overlay UI
# =============================================================================
phase_6_frontend:
  status: not_started
  description: |
    Build the floating chat overlay accessible from all authenticated pages.
    Uses Mantine components for consistency with the rest of the app.

  tasks:
    - id: "6.1"
      task: Create ChatOverlay component
      status: not_started
      details: |
        File: frontend/src/components/chat/ChatOverlay.tsx

        Structure:
        - Fixed-position panel (bottom-right, 400×600 as per D5)
        - Header: "Budget Bot" title, model selector, cost display, close button,
          "New conversation" button
        - Body: scrollable message list (auto-scroll to bottom on new messages)
        - Footer: text input with send button

        State management:
        - conversationHistory: ChatMessage[] (React state)
        - selectedModel: 'haiku' | 'sonnet' | 'opus' (default 'sonnet' per D1)
        - isOpen: boolean
        - isLoading: boolean (while waiting for response)

        Session persistence:
        - Store conversationHistory and selectedModel in sessionStorage (REQ-006)
        - On mount, restore from sessionStorage if available
        - Clear on page refresh (REQ-007) — sessionStorage handles this naturally

        Page context:
        - Use usePageContext hook (from Phase 0) to capture context at send time
        - Attach pageContext to each ChatRequest

    - id: "6.2"
      task: Create ChatMessage display component
      status: not_started
      details: |
        File: frontend/src/components/chat/ChatMessageBubble.tsx

        Renders a single chat message:
        - User messages: right-aligned, accent color background
        - Assistant messages: left-aligned, subtle background
        - Markdown rendering for assistant messages (use react-markdown or similar)
        - Token usage display (small, muted text under assistant messages — optional toggle)
        - Timestamp display

    - id: "6.3"
      task: Create floating action button (FAB)
      status: not_started
      details: |
        File: frontend/src/components/chat/ChatFAB.tsx

        Mantine ActionIcon or Affix component, fixed bottom-right.
        Icon: IconMessageChatbot or IconRobot from @tabler/icons-react.
        Clicking toggles the chat overlay open/closed.
        Badge indicator if there's an unread response (optional nice-to-have).

    - id: "6.4"
      task: Create model selector component
      status: not_started
      details: |
        Mantine SegmentedControl or Select in the overlay header.
        Options: Haiku (fastest), Sonnet (balanced), Opus (smartest)
        Persists in sessionStorage alongside conversation.

    - id: "6.5"
      task: Create cost usage display
      status: not_started
      details: |
        Small text in overlay header: "~$X.XX / $20.00"
        Fetch from GET /api/v1/chatbot/usage on overlay open.
        Update after each message response (from ChatResponse.usage).
        Color code: green (<50%), yellow (50-80%), red (>80%), with
        a warning message when approaching the cap.

    - id: "6.6"
      task: Create GitHub issue confirmation flow (D13 — structural enforcement)
      status: not_started
      details: |
        When ChatResponse has type: 'issue_confirmation', render the issueDraft
        as a special confirmation card in the chat:
        - Issue title and body preview (formatted markdown)
        - Labels shown as badges
        - "Submit Issue" and "Cancel" buttons

        On submit:
        - Call POST /api/v1/chatbot/confirm-issue with the draft
        - On success: show the issue URL as a clickable link in the chat
        - On error: show error inline

        On cancel:
        - Send a user message like "Never mind, don't submit that" to continue
          the conversation normally.

        This is structurally enforced — the frontend receives structured data
        from the backend (not parsed from markdown). The LLM cannot bypass
        this flow because the backend intercepts the tool call and never
        executes it directly.

    - id: "6.7"
      task: Integrate ChatFAB into MantineLayout
      status: not_started
      details: |
