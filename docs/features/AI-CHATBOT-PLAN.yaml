# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Recommended implementation sequence. Phase 0 is a standalone prerequisite.
    Phases 1-4 are the backend foundation. Phase 5 is the API client bridge.
    Phase 6 is the main frontend deliverable. Phases 7-8 run in parallel.
    Phase 9 is deployment prep. Phase 10 is final verification.
  sequence:
    - phase: 0 — URL-Based Page State (prerequisite)
      reason: Chatbot needs page context from URLs; benefits app independently
    - phase: 1 — Shared Types
      reason: Types are needed by everything else
    - phase: 2 — ChatbotDataService (read-only data layer)
      reason: Security boundary must be established first
    - phase: 3 — ChatbotService (orchestration)
      reason: Core logic must exist before routes expose it
    - phase: 4 — API Routes
      reason: Backend must be callable before frontend can consume it
    - phase: 5 — API Client
      reason: Frontend needs typed methods for the chat overlay
    - phase: 6 — Chat Overlay UI
      reason: Main user-facing deliverable; depends on phases 0-5
    - phase: 7 — System Prompt & Personality (parallel with phase 6)
      reason: Iterate on prompt quality while building UI
    - phase: 8 — Security Hardening (parallel with phases 6-7)
      reason: Verify security boundaries before production
    - phase: 9 — Environment & Deployment
      reason: Prepare production environment
    - phase: 10 — Manual Testing & Polish
      reason: Final end-to-end verification
