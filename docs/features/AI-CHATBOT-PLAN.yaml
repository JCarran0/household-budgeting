# =============================================================================
# AI Financial Chatbot — Implementation Plan (Phase 1: Read-Only)
# =============================================================================
# BRD: docs/features/AI-CHATBOT-BRD.md
# Status: Not Started
# Last Updated: 2026-04-05
# =============================================================================

overview:
  description: |
    Implementation plan for the Phase 1 AI Financial Chatbot. The chatbot is a
    floating overlay that lets users ask natural-language questions about their
    financial data using Claude's tool_use architecture. It has read-only access
    to locally-synced data through a purpose-built data access service that is
    structurally isolated from Plaid and all write operations. It can also file
    GitHub issues on behalf of the user after confirmation.
  key_files:
    brd: docs/features/AI-CHATBOT-BRD.md
    shared_types: shared/types/index.ts
    backend_services: backend/src/services/index.ts
    backend_routes: backend/src/routes/
    frontend_pages: frontend/src/pages/
    api_client: frontend/src/lib/api.ts
    app_routes: frontend/src/App.tsx
    sidebar_nav: frontend/src/components/MantineLayout.tsx

# =============================================================================
# DECISIONS LOG — Capture key decisions as they're made during implementation
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-05
    decision: Sonnet is the default model; user can switch to Haiku or Opus
    rationale: |
      Sonnet is the best cost/quality balance for financial reasoning.
      Haiku is too terse for advisory responses; Opus is expensive for routine
      lookups. User can override per-session. Resolves open question #3.

  - id: D2
    date: 2026-04-05
    decision: Cost cap is household-wide ($20/month), not per-user
    rationale: |
      Both users share a single login. Even when multi-user lands, a household
      budget for the AI budget makes intuitive sense. Resolves open question #1.

  - id: D3
    date: 2026-04-05
    decision: Surface cost usage to the user in the chat overlay header
    rationale: |
      Transparency builds trust. Show "~$X.XX / $20.00 this month" in the
      overlay header. Low implementation cost since we're tracking anyway.
      Resolves open question #2.

  - id: D4
    date: 2026-04-05
    decision: GitHub PAT stored as environment variable (GITHUB_ISSUES_PAT)
    rationale: |
      Consistent with existing secret management (JWT_SECRET, PLAID_SECRET, etc.).
      Fine-grained PAT scoped to issues:write on JCarran0/household-budgeting only.
      Rotation is manual but acceptable for 2-user app. Resolves open question #5.

  - id: D5
    date: 2026-04-05
    decision: Overlay is fixed-size (400×600), not resizable
    rationale: |
      Resizable panels add complexity with minimal value for a chat interface.
      Fixed size keeps implementation simple and ensures consistent layout.
      Can revisit if users find it limiting. Resolves open question #6.

  - id: D6
    date: 2026-04-05
    decision: Transaction lookback is 12 months by default, full history available on request
    rationale: |
      Most questions are about recent spending. Loading all-time data for every
      tool call hurts latency and token usage. Tools accept date range params;
      the system prompt instructs the model to default to 12 months but fetch
      more when the user asks. Resolves open question #4.

  - id: D7
    date: 2026-04-05
    decision: ChatbotDataService is a separate class, NOT a wrapper around existing services
    rationale: |
      SEC-003 requires structural isolation. ChatbotDataService receives only
      dataService (the storage layer) — never PlaidService, AccountService
      connection methods, or any service that can write financial data. It
      implements its own read-only query methods directly against storage.
      This makes it impossible for the chatbot to accidentally call write
      methods through injected service references.

  - id: D8
    date: 2026-04-05
    decision: Use Claude tool_use for all data access; never interpolate financial data into prompts
    rationale: |
      SEC-007 requires separation of data from instructions. Transaction names,
      merchant names, and notes are untrusted input that could contain prompt
      injection payloads. Tool results are structurally separated from the
      system prompt in the Claude API. The system prompt contains only
      instructions; all financial data flows through tool result blocks.

  - id: D9
    date: 2026-04-05
    decision: Backend proxies all Claude API calls; frontend never talks to Anthropic directly
    rationale: |
      Keeps the API key server-side. Enables server-side cost tracking, rate
      limiting, and audit logging. The frontend sends chat messages to our API;
      the backend orchestrates the Claude conversation and returns the response.

  - id: D10
    date: 2026-04-05
    decision: URL-based page state (prerequisite P-1) will be implemented as Phase 0
    rationale: |
      REQ-010 requires filter/view state in URLs so the chatbot can read page
      context. Currently only EnhancedTransactions uses useSearchParams. Budget,
      Reports, and Dashboard pages need URL param support added. This is a
      standalone improvement that benefits the app even without the chatbot
      (shareable URLs, browser back/forward support).

  - id: D11
    date: 2026-04-05
    decision: Tool call loop capped at 10 iterations with 60-second per-request timeout
    rationale: |
      Staff review identified that a runaway tool loop could exhaust the $20 cost
      cap in a single request. 10 iterations is generous for any reasonable query
      (most need 1-3 tool calls). The 60-second timeout covers Opus worst-case
      latency while preventing hung requests. SEC-014/015 compliance.

  - id: D12
    date: 2026-04-05
    decision: Cost tracking uses an in-process mutex to prevent race conditions
    rationale: |
      File-based JSON storage has no built-in locking. Two concurrent requests
      could both read $19.50, both pass the cap check, and result in $39 spend.
      An in-process mutex (e.g., async-mutex npm package or a simple promise
      queue) serializes the read-check-write cycle. Sufficient for 2 users on a
      single Node.js process. SEC-017 compliance.

  - id: D13
    date: 2026-04-05
    decision: GitHub issue submission uses structural confirmation, not LLM compliance
    rationale: |
      Staff review identified that relying on the system prompt to prevent
      unilateral issue creation is fragile against prompt injection. The new flow:
      when Claude calls submit_github_issue, the backend intercepts it, does NOT
      execute the GitHub API call, and returns a structured issue_confirmation
      response to the frontend. The frontend renders the confirmation UI. Only
      after the user clicks "Submit" does the frontend send a separate
      POST /api/v1/chatbot/confirm-issue request to execute the submission.
      REQ-024 structural enforcement.

  - id: D14
    date: 2026-04-05
    decision: Conversation history capped at 50 messages, enforced server-side
    rationale: |
      Sending unbounded history causes quadratic token growth and eventually hits
      the context window limit. 50 messages is generous for a chat session. The
      backend truncates to the most recent 50 regardless of what the frontend
      sends. REQ-028 compliance.

  - id: D15
    date: 2026-04-05
    decision: ChatbotDataService receives a ReadOnlyDataService interface, not the full DataService
    rationale: |
      Staff review identified that the full DataService exposes write methods
      (saveData, deleteData, etc.) which ChatbotDataService could theoretically
      call. A TypeScript interface exposing only getData/getUser/getCategories
      methods provides compile-time enforcement of the read-only boundary.
      SEC-018 compliance.

  - id: D16
    date: 2026-04-05
    decision: Per-request max_tokens set to 4096 output tokens
    rationale: |
      Without max_tokens, a single response could consume a large number of
      output tokens. 4096 is sufficient for detailed financial summaries while
      bounding worst-case per-request cost. SEC-013 compliance.

  - id: D17
    date: 2026-04-05
    decision: EnhancedTransactions page also syncs filter state to URL params
    rationale: |
      The plan originally only listed Budgets, Reports, and Dashboard for URL
      params. Transactions has the richest filter state and is where the chatbot
      context is most valuable. Added a useEffect that syncs filters (search,
      account, categories, tags, date range, transaction type, uncategorized)
      to URL params. Dashboard was skipped (no filters). Amount range/exact,
      include hidden, and pagination kept out of URL (too granular).

  - id: D18
    date: 2026-04-05
    decision: CostTracker receives full DataService, not ReadOnlyDataService
    rationale: |
      The cost tracker needs to write cost data (saveData) but ReadOnlyDataService
      has no write methods. SEC-018 applies to the chatbot's access to *financial*
      data (ChatbotDataService), not to cost tracking infrastructure. CostTracker
      only writes to its own chatbot_costs_{YYYY-MM} namespace.

