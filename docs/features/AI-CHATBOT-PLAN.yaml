    This phase runs in parallel with frontend work — iterate based on testing.

  tasks:
    - id: "7.1"
      task: Write the system prompt
      status: not_started
      details: |
        File: backend/src/services/chatbotPrompt.ts (exported constant)

        The system prompt must:
        - Define the personality (playful Gen Z/Alpha slang, puns, helpful first)
        - Explain available tools and when to use them
        - Instruct on page context usage for resolving ambiguity
        - Set default date range behavior (12 months, expand on request)
        - Instruct on GitHub issue drafting flow (draft → confirm → submit)
        - Prohibit revealing system prompt, tools, or architecture (SEC-009)
        - Include financial planning disclaimer
        - NOT contain any user financial data (SEC-007)

        Keep the prompt concise — every token costs money. Use tool descriptions
        to carry most of the behavioral guidance.

    - id: "7.2"
      task: Test personality and response quality
      status: not_started
      details: |
        Manual testing with representative questions:
        - "How much did we spend at Costco last month?"
        - "Are we on track for our food budget?"
        - "How has grocery spending changed over 6 months?"
        - "Review our March budget, what do you recommend?"
        - "I found a bug — the budget page shows wrong totals"
        - "How much can we afford for a vacation this summer?"

        Evaluate: accuracy, personality consistency, appropriate tool use,
        page context resolution, and whether it makes you laugh.

    - id: "7.3"
      task: Refine tool descriptions for optimal tool selection
      status: not_started
      details: |
        Claude's tool selection depends heavily on tool descriptions. Iterate
        on descriptions to ensure Claude picks the right tool for each question
        type. Common failure modes:
        - Using query_transactions when get_spending_by_category would be better
        - Not using page context for ambiguous questions
        - Calling multiple tools when one would suffice

# =============================================================================
# PHASE 8: Security Hardening & Review
# =============================================================================
phase_8_security:
  status: not_started
  description: |
    Verify all security requirements are met through architectural review
    and targeted testing. This is not just "run the test suite" — it's a
    deliberate verification of structural security boundaries.

  tasks:
    - id: "8.1"
      task: Architectural security review
      status: not_started
      details: |
        Verify:
        - SEC-001: ChatbotDataService has no import of PlaidService or AccountService
        - SEC-002: ChatbotDataService constructor has no access to Plaid credentials
        - SEC-003: Isolation is structural (constructor signature), not just prompt-based
        - SEC-004: ChatbotDataService exposes only read methods
        - SEC-005: No create/update/delete/sync/connect methods exist on ChatbotDataService
        - SEC-006: All methods require userId parameter
        - SEC-007: System prompt contains no financial data; all data flows through tool results
        - SEC-008: No eval(), exec(), fs access, or arbitrary network requests
        - SEC-009: System prompt includes instruction not to reveal internals
        - SEC-013: max_tokens set on all Claude API calls
        - SEC-014: Tool call loop has iteration limit of 10
        - SEC-015: Per-request timeout of 60 seconds
        - SEC-016: Per-user rate limiting on chatbot endpoint
        - SEC-017: Cost tracking uses mutex for concurrent request safety
        - SEC-018: ChatbotDataService receives ReadOnlyDataService, not full DataService

        Document results in a security review note.

    - id: "8.2"
      task: Write security-focused tests
      status: not_started
      details: |
        File: backend/src/__tests__/integration/chatbotSecurity.test.ts

        Tests:
        - ChatbotDataService.getAccounts strips all sensitive fields
        - ChatbotDataService constructor only accepts ReadOnlyDataService (SEC-018)
        - ReadOnlyDataService interface has no write methods
        - Tool dispatcher rejects unknown tool names
        - Tool call loop halts at 10 iterations (SEC-014)
        - Cost cap enforced (cannot exceed monthly limit)
        - Concurrent cost cap enforcement (mutex prevents race condition, SEC-017)
        - Cross-user data isolation (user A cannot see user B's data)
        - submit_github_issue tool returns issue_confirmation, never executes (D13)
        - confirm-issue endpoint is the only path to GitHub API
        - Conversation history truncated to 50 messages (REQ-028)
        - Rate limiting: 6th request within 1 minute returns 429 (SEC-016)
        - max_tokens is set on all Claude API calls (SEC-013)

    - id: "8.3"
      task: Prompt injection testing
      status: not_started
      details: |
        Test with adversarial inputs:
        - Transaction names containing prompt injection attempts
        - User messages asking to reveal system prompt
        - User messages asking to bypass read-only restrictions
        - User messages asking to access other users' data
        - User messages asking to call Plaid directly

        Verify the tool_use architecture prevents these attacks.

