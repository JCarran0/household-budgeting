# =============================================================================
# OPEN QUESTIONS (tracked from BRD, updated as decided)
# =============================================================================
open_questions:
  - id: Q1
    from_brd: true
    question: Tab order on Trip Detail — where does Map slot in?
    proposed: Itinerary / Map / Spending / Notes (narrative → spatial → financial → free-form)
    status: resolved
    resolution: |
      Accepted proposed default. Tab order is Itinerary / Map / Spending /
      Notes. Rationale: Map is the spatial companion to Itinerary — adjacency
      reinforces the planning↔spatial pair that users toggle between during
      planning and active trips. Spending is retrospective (slotted after),
      Notes is catch-all (slotted last). Minor muscle-memory shift for
      existing users on Spending is acceptable at 2-user scale.

  - id: Q2
    from_brd: true
    question: Day affinity visual — color, number, or both?
    proposed: Color-by-day with a small numeric badge on each pin
    status: resolved
    resolution: |
      Accepted proposed default. Pin composition: outer color keyed to day,
      center icon shows type (bed / fork / compass), small numeric badge
      top-right shows day number. Color delivers at-a-glance pattern
      recognition ("day 3 was all in the south of the city"); badge handles
      precision questions and insulates against colorblind palette collapse
      on 7+ day trips. Palette sourced from d3-scale-chromatic schemeTableau10
      (10 hues); longer trips extend with a custom 14-step palette or wrap
      with slight hue shifts — finalized during Phase 5 impl.

  - id: Q3
    from_brd: true
    question: Geocoding nudge for free-text Eat/Play stops on the edit form?
    proposed: Silent omit + footer count in V2; revisit after usage data
    status: resolved
    resolution: |
      Accepted proposed default (base variant, no clickable drill-down).
      Free-text locations are a deliberate V1 design choice (REQ-010);
      an edit-form banner would imply suboptimal input and risk nag fatigue.
      The map footer "N stops without map locations" is informational,
      visible only when the user is already looking at the map, and
      discoverable for the curious. Option to make the footer clickable
      (revealing the unpinned stop list) deferred — cheap to add in V3
      if usage indicates demand.

  - id: Q4
    from_brd: true
    question: Photo field name — `photoAlbumUrl` (generic) or `googlePhotosAlbumUrl` (provider-specific)?
    proposed: Generic `photoAlbumUrl` for forward-compat with non-Google providers
    status: resolved
    resolution: |
      Resolved in D2. Field shipped as `photoAlbumUrl`. UI label may surface
      "Google Photos album" as helper text without coupling the schema.

  - id: Q5
    from_brd: true
    question: Does the `?stop=<id>` deep-link param also work for external direct links?
    proposed: Yes — trivial and useful; strip from URL after scroll-and-highlight arrival
    status: resolved
    resolution: |
      Resolved in D8. The param is universal: the Map popup link-out and
      externally shared direct links both use it; the Itinerary tab strips
      it after arrival to keep reload URLs clean.

  - id: Q6
    from_brd: true
    question: Map tab suppressed entirely when zero geocoded stops, or rendered as empty-state prompt?
    proposed: Hide entirely — an empty spatial tab is chrome without content
    status: resolved
    resolution: |
      Resolved in D10. Tab visibility keys on stops.some(hasVerifiedCoords).
      Deep links to ?tab=map on trips without coords silently fall back to
      the Itinerary tab.
