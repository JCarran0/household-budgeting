# =============================================================================
# v2.1 — Post-ship decisions (captured mid-implementation, after user feedback)
# =============================================================================
v2_1_post_ship_decisions:
  - id: D25
    date: 2026-04-19
    decision: "Action button label is 'Done' (not 'Complete')"
    rationale: |
      Shorter, matches the existing Done column / Completed accordion / Task
      History vocabulary. BRD §3.2.2, REQ-029, and Phase 6 test checklist
      updated in the same pass.

  - id: D26
    date: 2026-04-19
    decision: "Top-level draft renders AFTER parent's subtree (not above its subtasks)"
    rationale: |
      BRD §3.2.3 initially specified 'directly below the current task (above
      that task's subtasks, if any)'. In practice this put the cursor visually
      between a parent and its own subtasks when the user clicked the ghost
      row at the bottom — awkward enough that the user flagged it on first
      try. New rule: draft renders after the parent + all its subtasks, so
      clicking at the bottom keeps the cursor at the bottom. sortOrder math
      is unchanged (still midpoint between T and T's next top-level sibling).
      BRD §3.2.3 and REQ-030 rewritten to match.

  - id: D27
    date: 2026-04-19
    decision: "Snoozed column renders to the LEFT of Todo in Kanban"
    rationale: |
      Shipping order ended up right-of-Done (appended). User prefers it on
      the left — snoozed tasks read as 'pre-todo' (queued for later), which
      matches their mental model. Toggle gating behavior unchanged.

  - id: D28
    date: 2026-04-19
    decision: "Show-snoozed toggle defaults ON for new users"
    rationale: |
      First-time users see the snoozed column immediately so the feature is
      discoverable. localStorage logic treats only an explicit 'false' as off,
      so anyone who previously toggled it off keeps their preference.

  - id: D29
    date: 2026-04-19
    decision: "Checklist gains a 'Snoozed (N)' accordion above 'Completed (N)'"
    rationale: |
      Matches the Kanban Snoozed column's discoverability in the Checklist
      view. Collapsed by default; state persisted to
      localStorage['tasks.checklist.snoozedExpanded']. Rows render as normal
      TaskRows (not draggable) — sorted by snoozedUntil ASC like Kanban. A
      'Wake now' kebab item was added to TaskKebabMenu when
      task.snoozedUntil is set, providing the unsnooze path from within the
      accordion without the full Edit modal.

