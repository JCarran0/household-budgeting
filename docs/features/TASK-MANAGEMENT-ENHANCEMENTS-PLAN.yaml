  description: |
    Risk-based additions. Unit tests for the two shared utils (snooze-date
    resolver, sortOrder helpers). Integration tests already covered in 2.9.
    Frontend component tests are low-leverage for this amount of UI — rely on
    manual testing checklists in phases 3.6 and 4.7.

  tasks:
    - id: "5.1"
      task: Unit tests for shared/utils/taskSnooze.ts
      status: completed
      details: |
        Cover resolveSnoozeDate across:
          - Each option (tomorrow, next_week, next_month, custom)
          - Day-of-week matrix for next_week (Sun-Sat; Monday → +7)
          - Day-of-month matrix for next_month (1st → +1 month; 28th → Feb; leap Feb 29)
