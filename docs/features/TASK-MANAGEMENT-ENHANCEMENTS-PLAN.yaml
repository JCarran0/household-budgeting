# =============================================================================
# PHASE 4: Frontend — Checklist View
# =============================================================================
phase_4_frontend_checklist:
  status: completed
  description: |
    New Checklist view as an alternate presentation. View toggle at the top of
    the Tasks page (e.g., segmented control: [Kanban | Checklist]). View
    preference persisted per user.

  tasks:
    - id: "4.1"
      task: Add view toggle (Kanban / Checklist) on Tasks page
      status: completed
      details: |
        File: frontend/src/pages/Tasks.tsx

        - Segmented control in the page header with two options
        - Persist selection in localStorage: `tasks.view` = 'kanban' | 'checklist'
        - Render different subtree based on selection
        - Default: 'kanban' for existing users; 'checklist' optional

    - id: "4.2"
      task: Build ChecklistView component
      status: completed
      details: |
        New file: frontend/src/components/tasks/ChecklistView.tsx

        Layout:
          - Sticky "+ Add task" input at top (see 4.3)
          - Active tasks list (status todo + started), ordered by sortOrder ASC
          - Collapsed accordion below: "Completed (N)"
            - When expanded: done tasks sorted by completedAt DESC
            - Subject to 14-day archive window (reuse existing filter logic)
            - Accordion state persisted: `tasks.checklist.completedExpanded`
          - Cancelled tasks NOT surfaced
          - Snoozed tasks NOT surfaced

        Data source: existing useQuery(['tasks']) — same data as Kanban.
        Client-side filters split active / completed.

    - id: "4.3"
      task: ChecklistRow component — two checkboxes, inline edit, kebab, subtasks indented
      status: completed
      details: |
        New file: frontend/src/components/tasks/ChecklistRow.tsx

        Row layout (left to right):
          1. Started checkbox
             - Checked when status ∈ {'started', 'done'}
             - Disabled/locked when status === 'done'
             - On toggle: PATCH status between todo ↔ started
          2. Done checkbox
             - Checked when status === 'done'
             - On check:
                if task.startedAt == null, include startedAt = now in the
                PATCH body (synthetic start stamp — see D2); backend honors
                this via a new optional startedAt field on UpdateTaskStatusDto
             - On uncheck: PATCH status to 'started'
          3. Title — click/tap to edit inline; on blur or Enter, PATCH title
          4. Metadata chips: assignee avatar, due date, project chip (if tagged)
          5. Kebab menu: Snooze ▸, Cancel, Edit (same as TaskCard kebab)

        Subtasks:
          - Render indented beneath parent, 1.5rem left padding
          - Each has a single done checkbox + title + drag handle
          - Subtask reorder updates parent.subTasks[] order

        Synthetic startedAt stamp (backend contract):
          Extend UpdateTaskStatusDto to accept an optional startedAt string.
          When provided alongside status='done', the service writes both
          startedAt and completedAt if startedAt was previously null.
          (Only used by the Checklist done-checkbox path.)

    - id: "4.4"
      task: Quick-entry input with Enter/Tab/Shift-Tab/Escape handling
      status: completed
      details: |
        Sticky input rendered at the top of the active list.

        Keyboard handling:
          - Enter on top-level input with non-empty value:
              POST /api/v1/tasks { title, status: 'todo' }
              Clear input; keep focus; cursor in new top-level input below
          - Enter on subtask input with non-empty value:
              PATCH parent task, appending subtask to subTasks[]
              Clear input; keep focus; cursor in new subtask input under same parent
          - Tab on empty new-task line:
              Convert to subtask-creation mode under the task above
          - Shift-Tab on empty subtask line:
              Convert back to top-level input
          - Escape on empty line:
              Exit quick-entry mode (blur)

        Mobile fallback (no Tab on soft keyboard):
          - Render indent/outdent buttons next to the focused input
          - `useMediaQuery('(max-width: 768px)')` or touch-device detection

        Debounce: if the user mashes Enter repeatedly on an empty line, no-op.

        New tasks go to top-of-column via the backend's create path (phase 2.1).
        After save, React Query cache is updated optimistically so the new
        row renders without waiting for refetch.

    - id: "4.5"
      task: Drag-to-reorder top-level tasks + subtasks in Checklist
      status: completed
      details: |
        Reuse @hello-pangea/dnd (same library as Kanban).

        Top-level reorder:
          - Drag handle on row hover (desktop) or long-press (mobile)
          - On drop, compute newSortOrder from neighbors
          - POST /api/v1/tasks/:id/reorder (same endpoint as Kanban)

        Subtask reorder:
          - Drag handle on subtask row
          - On drop, update parent.subTasks[] array order
          - PATCH /api/v1/tasks/:id with full subTasks array

        Reorder disabled in:
          - The "Completed" accordion (auto-sorted by completedAt DESC)

    - id: "4.6"
      task: Inline metadata chip edit (assignee, due date, project)
      status: completed
      details: |
        Each metadata chip on the row is clickable:
          - Assignee chip → Mantine Popover with a small assignee picker
          - Due date chip → DatePicker popover
          - Project chip → project picker popover (reuse from Kanban task form)

        On change: PATCH /api/v1/tasks/:id with the changed field.
        Autosave; no explicit save button.

        Empty slots (no assignee, no due date, no project): show a small
        "+" placeholder chip that opens the same picker.

    - id: "4.7"
      task: Manual testing — Checklist view
      status: pending_manual_test
      details: |
        - [ ] Toggle switches between Kanban and Checklist; selection persists
        - [ ] Active tasks list sorted by sortOrder
        - [ ] Completed accordion collapsed by default; count visible
        - [ ] Expanding accordion shows done tasks sorted by completedAt DESC
        - [ ] Accordion state persists across reloads
        - [ ] Cancelled tasks never appear
        - [ ] Snoozed tasks never appear (verify by snoozing a task and
              switching to Checklist — it's gone)
        - [ ] Check started checkbox → task moves to started status
        - [ ] Check done checkbox on todo task → status → done, startedAt
              stamped, started checkbox appears checked and locked
        - [ ] Uncheck done on same task → moves to started (preserves stamped
              startedAt)
        - [ ] Uncheck started checkbox on started task → back to todo
        - [ ] Click title → edit inline; Enter or blur saves
        - [ ] Quick entry: type "Task A" + Enter → saved + new input below
              focused
        - [ ] Tab on empty new-task line → becomes subtask of task above
        - [ ] Shift-Tab on empty subtask → back to top-level
        - [ ] Escape → exits entry mode
        - [ ] Subtasks render indented under parent
        - [ ] Subtask done checkbox toggles completed state
        - [ ] Drag to reorder top-level tasks — order persists
        - [ ] Drag to reorder subtasks within parent — order persists
        - [ ] Kanban view reflects same order (shared sortOrder)
        - [ ] Kebab menu Snooze / Cancel / Edit works on a checklist row
        - [ ] Mobile: indent/outdent buttons render next to focused input
        - [ ] Mobile long-press initiates drag

