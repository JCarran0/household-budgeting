# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Ship in two slices that minimize blast radius:

    SLICE A — Data model + Kanban changes (phases 1, 2, 3).
      Gets us: family-only leaderboard, cancelled-column removal, snooze, and
      Kanban reorder. All user-visible wins without the larger Checklist UI.
      Ship this first and use it for a week before starting Slice B.

    SLICE B — Checklist view (phase 4).
      Builds on the data model + endpoints from Slice A. New UI surface only,
      no backend changes. Can be developed in parallel with the post-ship
      soak of Slice A.

    Phase 5 tests land alongside the phase they cover.

  sequence:
    - slice: A
      phases:
        - phase: 1 — Shared Types & migration helper
          reason: Types, DTOs, shared utils land first — all downstream depends on them
        - phase: 2 — Backend endpoints + leaderboard scope + cancel archiving
          reason: Required before frontend can save reorders or snoozes
        - phase: 3 — Frontend Kanban updates
          reason: First user-visible slice; tight feedback loop before Checklist
    - slice: B
      phases:
        - phase: 4 — Frontend Checklist view
          reason: All backend capabilities already present; pure UI build
        - phase: 5 — Remaining unit tests + backfill smoke test
          reason: Alongside the phase they cover; consolidated listing here

