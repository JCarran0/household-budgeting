# =============================================================================
# v2.1 — CHECKLIST REDESIGN (Google Keep–style)
# =============================================================================
# Driven by user feedback after using v2.0 Checklist:
#   • "The design is a bit cluttered and clunky to interact with."
#   • Targets Google Keep parity for entry fluency.
#   • Two-checkbox pattern replaced with single forward-only button.
#   • Placeholder +assignee / +due chips removed; metadata lives in kebab.
# Status: Not Started
# =============================================================================

v2_1_decisions:
  - id: D18
    date: 2026-04-19
    decision: "Done-state → row moves to the Completed (N) accordion immediately"
    rationale: |
      Matches Keep's "checking a list item removes it from the active section."
      Eliminates the "two checkboxes both checked on a sitting row" clutter.
      Revert (done → started) happens via kebab ("Reopen"), not by unchecking.

  - id: D19
    date: 2026-04-19
    decision: "Action button is forward-only (todo → started → done); no back via button"
    rationale: |
      One control, one direction, zero ambiguity. Reversal is a deliberate
      action via the kebab menu ("Move to todo" / "Reopen"). Avoids the
      checkbox paradox where unchecking could mean "undo start" or "undo done."

  - id: D20
    date: 2026-04-19
    decision: "Subtasks stay binary (SubTask[] inside parent); no promotion to full Task entities"
    rationale: |
      Keeps data model unchanged from v2.0. Subtasks visually = indented
      checklist items, but with a simple checkbox (no kebab, no status, no
      assignee/due/snooze). If a subtask needs rich state, user promotes it
      to a top-level task (out of scope for v2.1 — D21).

  - id: D21
    date: 2026-04-19
    decision: "Tab/Shift-Tab work on EMPTY new-entry rows only, not on existing non-empty tasks"
    rationale: |
      Full Keep parity (Tab to demote an existing task to a subtask) requires
      moving data between Task.subTasks[] and standalone Task entities — bigger
      blast radius. Current approach: Tab on empty new row → demote; Shift-Tab
      on empty subtask new row → promote. Existing tasks reparent via delete
      + retype or drag.

  - id: D22
    date: 2026-04-19
    decision: "Remove sticky '+ Add task' input; use trailing ghost-row pattern"
    rationale: |
      Google Keep doesn't have a separate add input — every row is live. The
      faint bottom "ghost row" becomes active on focus/click. After Enter on a
      real task row, a new empty row appears directly below. After saving a
      task via ghost row, a fresh ghost row regenerates. Total keyboard flow.

  - id: D23
    date: 2026-04-19
    decision: "Enter mid-title inserts empty row below; does NOT split the title text"
    rationale: |
      Splitting requires diffing intent (did the user want to split or just
      insert below?). Always inserting blank below is predictable and matches
      most flat checklist apps. Users who want to split can cut/paste.

  - id: D24
    date: 2026-04-19
    decision: "Remove '+assignee' and '+due' placeholder chips; metadata set via kebab menu"
    rationale: |
      Placeholder chips add visual noise on every empty-metadata row (most
      rows at creation). Kebab is a familiar per-row menu pattern and already
      hosts Snooze/Cancel/Edit. Absence of a chip = no value, which is
      clearer than "+assignee" buttons inviting clicks on every row.

# =============================================================================
# PHASE 6: Frontend — Checklist V2.1 rebuild
# =============================================================================
phase_6_checklist_v2_1:
  status: completed
  description: |
    Rewrite the Checklist view to match the Google Keep–style BRD §3.2
    redesign. No backend or shared/types changes — this phase is purely a
    frontend refactor of ChecklistView.tsx and ChecklistRow.tsx.

  key_files:
    rewrite: frontend/src/components/tasks/ChecklistView.tsx
    rewrite: frontend/src/components/tasks/ChecklistRow.tsx
    modify: frontend/src/pages/Tasks.tsx  # view toggle already exists; no new wiring

  tasks:
    - id: "6.1"
      task: Rewrite ChecklistRow with single action button + no metadata placeholders
      status: completed
      details: |
        Row layout (active state):
          [ActionButton]  [inline title input]        [chips if set]  [kebab]

        Action button:
          - task.status === 'todo'   → label "Start",    color neutral, onClick → status='started'
          - task.status === 'started'→ label "Done", color success, onClick → status='done' (+synthetic startedAt if null)
          - task.status === 'done'   → small checkmark glyph (no button), strikethrough title
          - task.status === 'cancelled' → row not rendered (filtered out at parent)
        Button never moves status backward. Backwards paths are in the kebab.

        Title:
          - Always an inline <TextInput variant="unstyled"> (no click-to-edit ceremony).
          - Autosave on blur, Enter (also inserts new row below — see 6.2), or after a debounce during typing.

        Chips:
          - Render assignee avatar ONLY if task.assigneeId.
          - Render due-date badge ONLY if task.dueDate (with overdue color when past due).
          - Render project chip ONLY if task.tags has a project tag.
          - **Remove** the "+assignee" / "+due" placeholder chips from v2.0.

        Kebab menu (all metadata + status-reversal paths live here):
          - Assign to… (submenu of members + "Unassigned")
          - Due date… (opens date picker popover)
          - Snooze ▸ (Tomorrow / Next week / Next month / Custom…)
          - Move to todo   — visible when status === 'started'
          - Reopen         — visible when status === 'done'
          - Cancel task    — visible when status !== 'cancelled' and !== 'done' (confirm dialog)
          - Edit…          — opens existing full detail modal

        Subtask row (unchanged model, simplified UI):
          [Checkbox]  [inline title input]  [× delete on hover]
          - Checkbox toggles SubTask.completed (binary). No kebab.
          - Title inline-editable; Enter creates new subtask below (see 6.2).
          - Indent visually (1.5rem left pad + faint vertical guide line).

    - id: "6.2"
      task: Rewrite ChecklistView quick-entry model — inline Enter + ghost row
      status: completed
      details: |
        Eliminate the sticky "+ Add task" input from v2.0.

        Data structure for rendering:
          - Render active tasks in sortOrder ASC, each followed by its subtasks.
          - Append a single "ghost row" at the end of the active list.

        Ghost row:
          - Rendered with faint styling ("Add a task…" placeholder, low-contrast border).
          - Becomes a real editable row on click/focus/Tab-into.
          - On Enter with non-empty value → call createTask, then a fresh ghost row
            regenerates automatically. Focus stays in the new row (which was the
            ghost but now has been replaced by a real row + new ghost below).

        Enter key behavior on a real row:
          - Cursor at END of a TOP-LEVEL task title → save title; insert new empty
            top-level row **after the current task's entire subtree** (below its
            subtasks, not above them — see D26 below). Focus moves to new row.
          - Cursor at END of a SUBTASK title → save title; insert new empty subtask
            row below, under the same parent.
          - Cursor MID-title → save current title as-is; insert new empty row below.
            **Do not split** the title text.
          - On an empty row → auto-promote empty subtask to top-level; no-op on
            empty top-level.

        Tab / Shift-Tab behavior (EMPTY new-row lines only):
          - Tab on empty top-level new row → demote to subtask of task above.
          - Shift-Tab on empty subtask new row → promote to top-level below parent.
          - On non-empty rows: Tab/Shift-Tab do nothing special (per D21).

        Escape: blur current input, save whatever is typed (if non-empty),
        discard empty new rows.

        Implementation decisions:
          - Single `draft` state in ChecklistView: { kind: 'top' | 'subtask', anchor }.
          - DraftRow is keyed by an incrementing `draftNonce` so remount-on-bump
            re-fires its autofocus useEffect — no imperative ref map needed.
          - Creates are optimistic: client generates a temp id, onMutate inserts
            the task into the ['tasks','board'] cache with the computed sortOrder;
            onSuccess swaps temp id → server id (including the draft anchor if
            it still references the temp id).
          - Backend change: CreateTaskDto gained an optional `sortOrder` field
            so the client can place the new task at the cursor position instead
            of top-of-column. taskService.createTask honors it when present.

    - id: "6.3"
      task: Completed section behavior
      status: completed
      details: |
        When a task transitions to 'done':
          - statusMutation.onMutate optimistically patches the ['tasks','board']
            query cache with the new status → the row disappears from the active
            list immediately and re-appears inside the Completed accordion
            (since completed's memo partitions by status).
          - Accordion count updates in real time via the partition memo.
          - No explicit animation wrapper — the default React reconciliation is
            fast enough that the transition feels instant. Revisit (O6) only if
            the instant move turns out to be disorienting in practice.

        Completed accordion rows:
          - CompletedRow variant: strikethrough title, static check glyph in
            the action-button slot, kebab retained (Reopen / Cancel / Edit).

        Reopen (kebab → Reopen on a done task):
          - PATCH status = 'started'.
          - Row moves back into active list at TOP of the started sortOrder range
            (the existing non-drag top-of-column rule from REQ-043 applies).

    - id: "6.4"
      task: Kebab metadata editors (assignee + due date + snooze submenu)
      status: completed
      details: |
        Implement via Mantine Menu + nested Popover for pickers.

        Assign to… submenu:
          - Members list (current assignee highlighted), plus "Unassigned" option.
          - Click → PATCH /api/v1/tasks/:id { assigneeId }.

        Due date…:
          - Click opens DatePickerInput inside a Popover.
          - Change → PATCH /api/v1/tasks/:id { dueDate }.
          - Clear affordance sets dueDate=null.

        Snooze submenu (reuse existing resolveSnoozeDate + api.snoozeTask):
          - Tomorrow / Next week / Next month → resolveSnoozeDate + POST /snooze.
          - Custom… → small date-picker modal, then POST /snooze.

        Reuse Mantine components already imported elsewhere in Tasks.tsx to
        keep bundle size stable.

    - id: "6.5"
      task: Drag-to-reorder preserved (no regression)
      status: completed
      details: |
        Keep the existing @hello-pangea/dnd wiring from v2.0:
          - Drag handle on hover (desktop) / long-press (mobile) — may need to
            re-evaluate handle affordance since row chrome changes.
          - Top-level task reorder → computeSortOrder → POST /reorder.
          - Subtask reorder within parent → update parent.subTasks[] array →
            PUT /tasks/:id.

        Reconcile with the pangea "drop animation race" fix from the v2.0
        drag-reorder work: optimistic query-cache patch on drop, rollback on
        error, no render-time re-sort.

    - id: "6.6"
      task: Mobile indent/outdent buttons next to focused ghost/empty row
      status: completed
      details: |
        When the focused row is empty and the device is touch-only (no Tab
        key on soft keyboard):
          - Render a small ◀  ▶ button pair near the input.
          - ▶ = Tab (demote empty new row to subtask).
          - ◀ = Shift-Tab (promote empty subtask new row to top-level).
        Detect via useMediaQuery('(max-width: 768px)') or pointer-coarse media query.

    - id: "6.7"
      task: Delete v2.0 Checklist artifacts not carried forward
      status: completed
      details: |
        - Remove the v2.0 two-checkbox ChecklistRow implementation.
        - Remove the v2.0 sticky "+ Add task" TextInput block in ChecklistView.
        - Remove the inline assignee / due-date Popover pickers from the row
          (now in kebab per D24).
        - Keep the existing api.updateTaskStatus / api.reorderTask /
