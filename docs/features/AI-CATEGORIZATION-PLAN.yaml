# =============================================================================
# PHASE 5: Frontend — Categorization Flow UI
# =============================================================================
phase_5_frontend:
  status: completed
  description: |
    The main UI: trigger button, classification loading, bucket review modal,
    rule suggestions, and summary. Uses Mantine components.

  tasks:
    - id: "5.1"
      task: Create AI Categorize button on Transactions page
      status: completed
      details: |
        Add to EnhancedTransactions.tsx near the filter controls:
        - Button with IconSparkles or IconRobot icon
        - Badge showing uncategorized count (from existing uncategorizedData query)
        - Disabled when count is 0
        - onClick opens the categorization flow

    - id: "5.2"
      task: Create CategorizationFlowModal component
      status: completed
      details: |
        File: frontend/src/components/transactions/CategorizationFlowModal.tsx

        Top-level modal managing the multi-step flow:
        - Step 1: Loading ("Analyzing N transactions...")
        - Step 2: Bucket review (iterates through buckets)
        - Step 3: Rule suggestions
        - Step 4: Summary

        State:
        - currentStep: 'loading' | 'review' | 'rules' | 'summary'
        - buckets: ClassificationBucket[]
        - currentBucketIndex: number
        - appliedCount: number
        - skippedCount: number
        - createdRules: number

    - id: "5.3"
      task: Create BucketReviewStep component
      status: completed
      details: |
        File: frontend/src/components/transactions/BucketReviewStep.tsx

        Renders one bucket at a time:
        - Header: "Suggestion: Categorize these N transactions as [Category]?"
        - Progress: "Bucket 3 of 8"
        - Table with columns: Date, Name/Merchant, Amount, Category (dropdown)
        - Each row's category dropdown pre-selected to AI suggestion
        - "Apply All" button: calls PUT /transactions/bulk with selected categories
        - "Skip" button: advances to next bucket

        The category dropdown uses the existing useCategoryOptions hook.
        Rows where user changed the category are visually indicated.

    - id: "5.4"
      task: Create RuleSuggestionsStep component
      status: completed
      details: |
        File: frontend/src/components/transactions/RuleSuggestionsStep.tsx

        After all buckets processed, shows rule suggestions:
        - Card per suggestion: pattern, category, example transactions
        - Each card has: "Create Rule" button, "Edit" button, "Dismiss" button
        - Edit opens inline editing of pattern and category
        - "Create Rule" calls POST /autocategorize/rules
        - "Skip All" button to dismiss all and go to summary

    - id: "5.5"
      task: Create SummaryStep component
      status: completed
      details: |
        File: frontend/src/components/transactions/SummaryStep.tsx

        Final screen:
        - "Done! Categorized X of Y transactions."
        - "Created Z new auto-categorization rules."
        - "Skipped W transactions."
        - "Close" button that closes the modal and invalidates transaction queries

    - id: "5.6"
      task: Handle loading, error, and cost cap states
      status: completed
      details: |
        - Loading: skeleton/spinner during classification API call
        - Error: inline error message with retry option
        - Cost cap: if costTracker says budget exhausted, show message and disable
        - Partial failure: if bulk update fails for some transactions, show which
          failed and allow retry

# =============================================================================
# PHASE 6: Testing & Polish
# =============================================================================
phase_6_testing:
  status: not_started
  description: Manual testing and UX polish.

  tasks:
    - id: "6.1"
      task: Manual testing checklist
      status: not_started
      details: |
        Entry point:
        - [ ] AI Categorize button visible when uncategorized > 0
        - [ ] Button disabled when uncategorized = 0
        - [ ] Badge shows correct uncategorized count

        Classification:
        - [ ] Loading state shows transaction count
        - [ ] Classification completes in < 10s for 50 transactions
        - [ ] Buckets are grouped by category with correct transactions
        - [ ] High confidence suggestions are accurate (>80% acceptance)

        Bucket review:
        - [ ] Each bucket shows correct category name and count
        - [ ] Category dropdowns are pre-selected correctly
        - [ ] User can change individual category selections
        - [ ] "Apply All" saves categories via bulk API
        - [ ] "Skip" advances without changes
        - [ ] Progress indicator updates correctly
        - [ ] Unsure bucket appears last with no pre-selection

        Rule suggestions:
        - [ ] Suggestions don't duplicate existing rules
        - [ ] "Create Rule" creates via API and shows success
        - [ ] "Dismiss" removes suggestion from list
        - [ ] "Skip All" goes to summary

        Summary:
        - [ ] Correct counts for categorized, skipped, rules created
        - [ ] Closing modal refreshes transaction list

        Cost:
        - [ ] Cost tracked in shared chatbot cost tracker
        - [ ] Cost cap prevents classification when budget exhausted

# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Linear implementation. Backend first (types → service → routes),
    then frontend (API client → UI components).
  sequence:
    - phase: 1 — Shared Types
      reason: Types needed by everything else
    - phase: 2 — CategorizationService
      reason: Core classification logic
    - phase: 3 — API Routes
      reason: Backend must be callable before frontend consumes it
    - phase: 4 — API Client
      reason: Frontend needs typed methods
    - phase: 5 — Categorization Flow UI
      reason: Main user-facing deliverable
    - phase: 6 — Testing & Polish
      reason: End-to-end verification
