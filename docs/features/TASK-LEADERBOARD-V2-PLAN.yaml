# =============================================================================
# PHASE 2: Shared derivation utils — 11 new categories + family context + score-based slots
# =============================================================================
phase_2_shared_derivations:
  status: complete
  description: |
    Core stateless compute. Extends `computeEarnedBadges` and rewrites
    `selectBadgeSlots`. Introduces `buildFamilyBadgeContext` for cross-user /
    family-wide derivations.

  tasks:
    - id: "2.1"
      task: Rewrite `selectBadgeSlots` — score-based selection
      details: |
        File: shared/utils/leaderboardBadgeSlots.ts

        New signature:
          export function selectBadgeSlots(
            earned: EarnedBadge[],
            now: Date,
          ): EarnedSlot[]

        Algorithm (D29):
          1. Group earned badges by `def.category`.
          2. For each category, compute per-badge score:
             score = rarity(def.tier) + 10 * exp(-daysSinceEarnedAt / 7)
          3. Representative = highest-scoring earned badge in the category.
          4. Sort representatives by score DESC.
          5. Take top 3. Tie-break `earnedAt` DESC.

        Unit tests (new file or extend existing):
          - empty earned → []
          - 1 earned tier-1 → 1 slot
          - 4 earned categories → 3 slots (best-score wins; Consistency can
            remain if freshest)
          - 16 earned across all 15 categories → 3 slots (all tier-5 earned
            the same day; tie-break picks 3 most recent)
          - Recency test: fresh tier-3 earned today outranks year-old tier-5

    - id: "2.2"
      task: Add `buildFamilyBadgeContext` to leaderboardBadges.ts
      details: |
        New shape (see D23 for full definition):
          export interface FamilyBadgeContext {
            zeroInboxEvents: Array<{ userId: string; completedAt: string }>;
            dayUserIndex: Map<string, { users: Set<string>; sharedAt: string | null }>;
            monthlyTallies: Map<string, { mid: Map<string, number>; end: Map<string, number> }>;
          }

          export function buildFamilyBadgeContext(
            tasks: Task[],                    // all family-scope tasks currently in the system
            perUserEvents: Map<string, CreditEvent[]>,
            timezone: string,
            now: Date,
          ): FamilyBadgeContext

        Algorithm:

        ZERO INBOX (D24):
          1. For each currently-non-closed task, it was "open" from createdAt
             onward; counts forever toward open-count.
          2. For each currently-closed task (done or cancelled), it was
             "open" from createdAt until the cancellation/completion ISO.
          3. Skip tasks currently snoozed to future (snoozedUntil > now) —
             they are hidden, not open, per BRD §4.1 Clean Sweep.
          4. Build a list of (timestamp, delta) where each task contributes
             (+1, createdAt) and (-1, closedAt) if currently closed.
          5. Sort ascending. Run the counter. Every step where counter hits 0,
             record the close event's {userId, completedAt} (attributed via
             the same assignee-else-completer rule already in taskService).
          6. Return chronologically sorted zeroInboxEvents.

        DAY-USER INDEX (D28):
          1. For each user's CreditEvent, bucket by localDayKey.
          2. For each day, maintain Set<userId> + firstSharedAt.
          3. When the 2nd user's first event for a day arrives (in
             chronological order over ALL events merged), stamp `sharedAt` =
             that event's completedAt.

        MONTHLY TALLIES (D27):
          1. For each calendar month (local TZ) with ≥1 credit:
             - mid: cumulative count per user up to end-of-day-15
               (2026-04-15 23:59:59.999 local)
             - end: cumulative count per user at end-of-month
          2. Skip the current (in-progress) month.

        Pure function; heavy but O(n log n) where n = task count + event count.

    - id: "2.3"
      task: Extend `computeEarnedBadges` signature with family context + now
      details: |
        File: shared/utils/leaderboardBadges.ts

        New signature:
          export function computeEarnedBadges(
            events: CreditEvent[],
            streakMilestones: Partial<Record<7 | 30 | 100, string>>,
            timezone: string,
            familyContext: FamilyBadgeContext,
            userId: string,
            now: Date,
          ): EarnedBadge[]

        Keep existing Volume / Consistency / Streak / Lifetime derivations
        unchanged.

    - id: "2.4"
      task: Add Weekday Warrior derivation
      details: |
        `weekday_warrior_10` — 10 credited completions within any single
        Mon-Fri calendar workweek (in viewer TZ). "Workweek" = Mon 00:00 to
        Fri 23:59:59.999 in that week's ISO week.

        `weekday_warrior_25` / `_50` — across workdays (Mon-Fri) within any
        single calendar MONTH (viewer TZ). Note: "calendar month" not
        "ISO week" for tiers 2-3.

        `earnedAt` = the `completedAt` of the tipping event within the
        earliest qualifying window.

    - id: "2.5"
      task: Add Night Owl + Early Bird derivations
      details: |
        Both are all-time cumulative.

        Night Owl: count credit events where the viewer-TZ local hour
        (0-23) is ≥ 21 (i.e., >= 9 PM). `earnedAt` for each tier = the
        completedAt of the 10th / 25th / 50th qualifying event in chronological
        order.

        Early Bird: count credit events where viewer-TZ local hour < 7
        (before 7 AM). Mirror earnedAt semantics.

    - id: "2.6"
      task: Add Power Hour derivation (D26)
      details: |
        Two-pointer sliding window over `sorted[i].completedAt` (ms):
          for each i:
            while sorted[j].completedAt + 60*60*1000 < sorted[i].completedAt: j++
            windowSize = i - j + 1
            track max; record tipping index for each threshold

        Tip events for 5 / 10 / 15 → earnedAt = sorted[i].completedAt where
        windowSize first reached threshold.

    - id: "2.7"
      task: Add Clean Sweep derivation
      details: |
        Straightforward given `familyContext.zeroInboxEvents`:

          const myZeros = familyContext.zeroInboxEvents.filter(e => e.userId === userId);
          if (myZeros.length >= 1)  earned.set('clean_sweep_1',  myZeros[0].completedAt);
          if (myZeros.length >= 5)  earned.set('clean_sweep_5',  myZeros[4].completedAt);
          if (myZeros.length >= 10) earned.set('clean_sweep_10', myZeros[9].completedAt);
          if (myZeros.length >= 25) earned.set('clean_sweep_25', myZeros[24].completedAt);

    - id: "2.8"
      task: Add Spring Cleaner + Holiday Hero derivations
      details: |
        Spring Cleaner: filter events to March 1 — April 30 of each year in
        viewer TZ. Count per year. If any year reaches threshold, earn.

        Holiday Hero: filter events to December 1 — December 31 of each year.

        `earnedAt` = completedAt of the tipping event within the earliest
        qualifying season.

    - id: "2.9"
      task: Add Phoenix derivation (D25)
      details: |
        Iterate sorted events. For each event (after the first), compute
        days between `localDayKey(prev)` and `localDayKey(current)`. If ≥14,
        count this as a phoenix event.

        Earn 1 / 5 / 10 cumulatively. `earnedAt` = completedAt of the 1st /
        5th / 10th phoenix event.

    - id: "2.10"
      task: Add Clutch derivation
      details: |
        CreditEvent currently has `{ userId, completedAt }`. We need to know
        the task's `dueDate` too. Options:
          A. Extend CreditEvent to `{ userId, completedAt, dueDate?: string }`.
          B. Pass tasks through separately.

        Choose A — minimal change, already threaded through
        buildFamilyBadgeContext. Backend populates `dueDate` when available;
        subtask events omit it (subtasks don't have their own dueDate).

        Derivation:
          const overdue = events.filter(e => e.dueDate && e.completedAt >= e.dueDate);
          if (overdue.length >= 5)  earned.set('clutch_5',  overdue[4].completedAt);
          if (overdue.length >= 25) earned.set('clutch_25', overdue[24].completedAt);
          if (overdue.length >= 50) earned.set('clutch_50', overdue[49].completedAt);

        Comparison: compare ISO strings lexicographically ONLY when both
        are same-format UTC. Safer: compare via Date.parse. A task due
        "2026-04-22" (date-only) should be considered overdue at end of
        day in viewer TZ, but BRD §4.1 Clutch says "on or after its
        dueDate" — accept the simple comparison; task dueDate is typically
        stored as either ISO datetime or YYYY-MM-DD.

        If dueDate is date-only (YYYY-MM-DD), convert to end-of-day in
        viewer TZ before comparing.

    - id: "2.11"
      task: Add Partner in Crime derivation
      details: |
        Already prepared by `familyContext.dayUserIndex`:

          const sharedDays = [...familyContext.dayUserIndex.values()]
            .filter(entry => entry.users.size === 2)
            .map(entry => entry.sharedAt!)
            .sort();

          // Both users earn Partner in Crime on the SAME set of days.
          if (sharedDays.length >= 5)  earned.set('partner_in_crime_5',  sharedDays[4]);
          if (sharedDays.length >= 25) earned.set('partner_in_crime_25', sharedDays[24]);
          if (sharedDays.length >= 50) earned.set('partner_in_crime_50', sharedDays[49]);

    - id: "2.12"
      task: Add Comeback Kid derivation (D27)
      details: |
        Uses `familyContext.monthlyTallies`. For each month:
          const mid = monthlyTallies.mid.get(userId) ?? 0;
          const end = monthlyTallies.end.get(userId) ?? 0;
          // viewer was behind at mid if another user was strictly ahead
          const behindMid = [...monthlyTallies.mid.entries()]
            .some(([otherId, n]) => otherId !== userId && n > mid);
          const aheadEnd = [...monthlyTallies.end.entries()]
            .every(([otherId, n]) => otherId === userId || end >= n + 1);
          if (behindMid && aheadEnd) {
            // earn; earnedAt = last day of month 23:59:59.999 local → ISO
          }

        Count earned months chronologically; earn tier 1/2/3 at counts 1/3/5.

        Two-user assumption: in a family of 1 user, skip entirely.

    - id: "2.13"
      task: Unit tests for all 11 new derivations
      details: |
        File: shared/utils/__tests__/leaderboardBadges.test.ts (extend)

        Per-category test coverage (at least 3 cases each):
          - below threshold → not earned
          - at exact threshold → earned with correct earnedAt
          - multi-tier cumulative → all lower tiers earned + correct earnedAts
          - boundary cases (TZ, DST, year boundary where applicable)

        Cross-category tests:
          - one user hitting 10 different categories in a single week
          - both users hitting Partner in Crime independently
          - Clean Sweep: open counter correctly replays for tasks completed
            in different orders
          - Comeback Kid: current month is skipped; closed months counted

        Risk-based prioritization: Clean Sweep, Partner in Crime, and
        Comeback Kid are highest risk (cross-user / replay logic). Volume-
        style derivations are low risk (same pattern as v1.0).

    - id: "2.14"
      task: Performance spike — 48-badge derivation at family scale
      details: |
        Goal: confirm that recomputing 48 badges per leaderboard request is
        acceptable at ~2 users * ~1000 tasks each.

        Test harness: unit test that seeds 2000 family tasks with randomized
        completedAt across 3 years, calls buildFamilyBadgeContext +
        computeEarnedBadges for both users, and asserts total runtime < 50ms
        on the dev machine. If it's >100ms, add a memoization layer keyed on
        task mtime.

        Expected: ~5-15ms at family scale (BRD §7 Assumption 3). If the
        Clean Sweep replay dominates, spike an index of already-computed
        zeroInboxEvents keyed by tasks-hash.

