            finish: Finish,
            isFinal: boolean,
            origin?: { x: number; y: number },
          ): void;

        Drop audio + notification side effects (those move to the queue hook).
        Use the per-finish palette lookup (D38). `isFinal` doubles particle
        count + spread.

        Caller: useBadgeHeroQueue.

    - id: "6.5"
      task: Rewrite `BadgeHeroModal` — hero for every tier, entry animation, ambient loops
      details: |
        File: frontend/src/components/tasks/BadgeHeroModal.tsx

        Props:
          interface BadgeHeroModalProps {
            opened: boolean;
            onClose: () => void;
            unlock: QueuedHeroUnlock | null;
            displayName: string;
          }

        Render:
          ```tsx
          <ResponsiveModal opened={opened} onClose={onClose} withCloseButton={false}
            closeOnClickOutside={false} closeOnEscape centered size="sm"
            overlayProps={{ blur: 4, backgroundOpacity: 0.7 }}
            transitionProps={{ transition: 'pop', duration: 250 }}
          >
            <Stack align="center" gap="md" py="md">
              <MedalBadge
                tier={unlock.def.tier}
                emblem={unlock.def.category}
                size={240}
                halo={unlock.def.tier >= 3 ? 'auto' : 'none'}
                animate="hero"
              />
              <Stack align="center" gap={4}>
                <Title order={2} ta="center">
                  {displayName}, you've earned {getAutoLabel(unlock.def)}!
                </Title>
                <Text ta="center" c="dimmed">
                  {interpolateCelebrationCopy(unlock.def.celebrationCopy, displayName)}
                </Text>
              </Stack>
              <Button fullWidth variant="gradient" onClick={onClose}>
                {unlock.def.tier === 5 ? 'Heck YES!' : 'Heck yeah!'}
              </Button>
            </Stack>
          </ResponsiveModal>
          ```

        `interpolateCelebrationCopy` replaces `{displayName}` token. Note
        that celebrationCopy strings in the BRD already start with the
        display name, so the Title + copy will overlap slightly — the BRD
        template in §4.5 explicitly says the title is "{displayName}, you've
        earned {badgeLabel}!" AND the body is the celebrationCopy, which
        itself starts with "{displayName}, …". Accept the mild redundancy;
        the emphasis is intentional.

    - id: "6.6"
      task: Wire the queue hook + modal in Tasks.tsx (replace pendingHero)
      details: |
        File: frontend/src/pages/Tasks.tsx

        Before:
          const { pendingHero, dismissHero } = useNewBadgeCelebrations(leaderboard, userId);
          <BadgeHeroModal opened={!!pendingHero} onClose={dismissHero} badge={pendingHero} displayName={displayName} />

        After:
          const { current, dismiss } = useNewBadgeCelebrations(leaderboard, userId);
          <BadgeHeroModal opened={!!current} onClose={dismiss} unlock={current} displayName={displayName} />

    - id: "6.7"
      task: Manual testing — celebration queue behavior
      details: |
        Seed scenarios via the dev panel (Phase 7):
          - Single unlock tier-1 → Big triumphant (single-load rule) +
            confetti
          - Single unlock tier-5 → Legendary stinger + larger confetti +
