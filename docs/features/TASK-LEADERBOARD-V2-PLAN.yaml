# =============================================================================
# Task Leaderboard v2.0 — Implementation Plan
# =============================================================================
# BRD: docs/features/TASK-LEADERBOARD-BRD.md (v2.0 — 2026-04-22)
# Supersedes: docs/features/TASK-LEADERBOARD-PLAN.yaml (v1.0, shipped)
# Status: Implementation complete — all 8 phases shipped. Manual UAT/visual QA pending.
# Last Updated: 2026-04-22
# =============================================================================

overview:
  description: |
    v1.0 is shipped: 14 badges across 4 categories (Volume/Consistency/Streak/
    Lifetime), streak columns (Current/Best), badge slot area (up to 3 per row),
    detail modal, final-tier hero modal, toast+fanfare+confetti for tier 1-2,
    localStorage `lastSeenBadgeEarnedAt` marker, day-1 seed suppressing the
    historical cascade.

    v2.0 is a delta on top of v1.0. The shipped streak math, attribution rules,
    family-scope filter, per-user `CreditEvent` stream, response shape
    (additive-only), and the localStorage seed pattern are all UNCHANGED.

    What changes:

    1. Catalog expands from 14 → 48 badges across 4 → 15 categories. Every
       badge gains required `tier: 1..5`, `shippedAt: ISO`, and
       `celebrationCopy: string` fields.

    2. "Final-tier" / capstone concept is deleted. Polish is driven purely by
       tier index. `isFinalTierBadge()` is replaced with `getBadgeTier()` /
       `getBadgeFinish()`. Every unlock gets a hero modal (no toast-tier path).

    3. Hero modal becomes a queue: de-duplicate by category on a single load
       (highest tier wins); sort ascending by rarity so the biggest lands last;
       ~400ms transition between modals; each dismissed independently.

    4. Three audio cues instead of one: Small triumphant (non-last), Big
       triumphant (last), Legendary stinger (last+tier5). Single-modal loads
       always get the "final" cue.

    5. Eleven new categories require computation that crosses the v1.0 per-user
       boundary: Clean Sweep needs family-wide open-task-count transitions;
       Partner in Crime needs both members' events zipped by day; Comeback Kid
       needs per-month running comparison between members. `computeEarnedBadges`
       is refactored to accept optional family-wide context.

    6. Visual: flat emoji glyphs in `<ThemeIcon>` are replaced by a CSS-sculpted
       metallic disc (radial gradient + beveled rim + highlight crescent) with
       a centered SVG emblem. Finish palette per tier: Bronze / Silver / Gold /
       Platinum / Legendary. Hero-modal motion: scale+360°-rotate entry (~800ms),
       ambient shimmer sweep, glow-pulse halo, sparkle particles on tier 5.
       Reduced-motion replaces entry with fade and pauses ambient loops.

    7. Row slot selection changes from "highest tier per category, drop
       Consistency first if 4 earned" to score-based:
         rarity = [1,2,4,8,16][tier-1]
         recencyBoost = 10 * exp(-daysSinceEarnedAt / 7)
         slot = top 3 by (rarity + recencyBoost), tie-break earnedAt DESC.

    8. Detail modal becomes full-screen on all viewports (`fullScreen` prop on
       `ResponsiveModal`, which already supports it). Adds two-level `????`
       obfuscation: untouched categories hide the heading AND collapse to a
       single-row placeholder (tier count hidden because it varies). Earned-in
       categories show heading + full tier grid with `????` ghost tiles for
       unearned tiers. Footer shows `N of M hidden categories`.

    9. `shippedAt` per-badge gate prevents retroactive celebration cascades
       when new categories or tiers land in later deploys. v1.0 day-1 seed
       still covers the initial 14 badges; the `shippedAt` gate covers v2.0
       and beyond.

    10. Dev-only panel (`import.meta.env.DEV`) in the detail modal footer:
        reveal-all, per-badge trigger, cascade simulation, reset marker, audio
        preview, reduced-motion override, view-as-partner, animation replay.
        Tree-shaken from prod.

  key_files:
    brd: docs/features/TASK-LEADERBOARD-BRD.md
    v1_plan: docs/features/TASK-LEADERBOARD-PLAN.yaml
    shared_types: shared/types/index.ts                    # extend BadgeId, BadgeCategory, BadgeDefinition; rewrite BADGE_CATALOG
    shared_badges_util: shared/utils/leaderboardBadges.ts  # add 11 new derivations + family-wide context param
    shared_badge_slots_util: shared/utils/leaderboardBadgeSlots.ts  # rewrite selectBadgeSlots; delete isFinalTierBadge; add getBadgeTier + rarity helper
    backend_service: backend/src/services/taskService.ts   # getLeaderboard: pass family-wide context + now
    frontend_medal: frontend/src/components/tasks/MedalBadge.tsx       # new — replaces BadgeIcon
    frontend_emblems: frontend/src/components/tasks/medalEmblems.tsx   # new — 15 SVG emblems
    frontend_badge_icon: frontend/src/components/tasks/BadgeIcon.tsx   # delete
    frontend_badge_catalog: frontend/src/components/tasks/badgeCatalog.ts  # repurpose: map BadgeCategory -> emblem + label; drop per-badge glyph map
    frontend_slot_area: frontend/src/components/tasks/BadgeSlotArea.tsx        # rewrite — score-based
    frontend_detail_modal: frontend/src/components/tasks/BadgeDetailModal.tsx  # rewrite — full-screen, 15-cat, ???? obfuscation, footer, dev panel
    frontend_hero_modal: frontend/src/components/tasks/BadgeHeroModal.tsx      # rewrite — every tier; scale+rotate entry; ambient loops; sparkles on t5
    frontend_hero_queue_hook: frontend/src/hooks/useBadgeHeroQueue.ts          # new — queue state machine for sequential hero modals
    frontend_celebrations_hook: frontend/src/hooks/useNewBadgeCelebrations.ts  # rewrite — build queue, gate by shippedAt, dispatch to hook
    frontend_completion_sound: frontend/src/utils/completionSound.ts           # add playBadgeSmallTriumphant + playBadgeLegendaryStinger; keep playBadgeFanfare as "Big"
    frontend_celebrate_util: frontend/src/utils/celebrateBadgeUnlock.ts        # rewrite — confetti-only variant; audio selected by queue hook
    frontend_dev_panel: frontend/src/components/tasks/BadgeDevPanel.tsx        # new — dev-build-only panel

# =============================================================================
# DECISIONS LOG — v2.0 additions (numbering continues from v1.0's D15)
# =============================================================================
decisions:
  - id: D20
    date: 2026-04-22
    decision: Keep v1 BadgeDefinition fields (id, category, threshold, order, label, description) AND add required `tier`, `shippedAt`, `celebrationCopy`; optional `displayName`
    rationale: |
      `threshold` still drives single-number derivations (Volume, Consistency,
      Lifetime, Night Owl, Early Bird, Power Hour, Phoenix, Clutch, Partner in
      Crime, Comeback Kid, Clean Sweep, Spring Cleaner, Holiday Hero, Streak).
      `order` still drives in-category grid ordering. `tier` is new and is the
      SOLE axis of visual polish. `label` falls back to `"{categoryName}
      {finishName}"` when `displayName` is absent — BRD §4.1 explicitly allows
      the label to come from either source. v2.0 ships with all `displayName`
      unset so the auto-generated label ("Night Owl Bronze") applies.

  - id: D21
    date: 2026-04-22
    decision: Delete `isFinalTierBadge`; replace with `getBadgeTier(id): 1..5` and derived helpers
    rationale: |
      BRD §4.6 explicitly dissolves the capstone concept. Every consumer of
      `isFinalTierBadge` — `useNewBadgeCelebrations`, `BadgeIcon` — is
      refactored in this plan (Phase 1.3). Keeping the old API around
      "for backwards compat" would re-introduce the two-path design the BRD
      rejects. Delete cleanly.

  - id: D22
    date: 2026-04-22
    decision: `computeEarnedBadges` gains a `familyContext` param covering cross-user + family-wide badges
    rationale: |
      Clean Sweep needs the chronological family-wide open-task-count stream
      (per-user events are not enough). Partner in Crime needs BOTH users'
      credit-event day sets zipped. Comeback Kid needs per-month running
      comparisons between the two users. Rather than threading five separate
      inputs, the backend builds a single `FamilyBadgeContext` object once
      and passes it to each user's `computeEarnedBadges` call. Per-user badges
      ignore it; family-aware badges read from it. Keeps the function pure
      and tree-shakable by category.

  - id: D23
    date: 2026-04-22
    decision: `FamilyBadgeContext` built by a new `buildFamilyBadgeContext` helper co-located in leaderboardBadges.ts
    rationale: |
      Consolidates the cross-user / family-wide bookkeeping in one pure
      function that the backend calls once before the per-user compute loop.
      Shape:
        interface FamilyBadgeContext {
          // Clean Sweep: timestamps at which the family open-task count
          // transitioned from >0 to 0, paired with the crediting event
          // that caused the transition. Order: ascending by timestamp.
          zeroInboxEvents: Array<{ userId: string; completedAt: string }>;
          // Partner in Crime: for each calendar day, the set of userIds
          // with ≥1 credit that day. Map<dayKey, Set<userId>>.
          dayUserIndex: Map<string, Set<string>>;
          // Comeback Kid: for each calendar month, running running tally
          // per user captured at end-of-day-15 and end-of-month.
          // Map<monthKey, { mid: Map<userId, count>, end: Map<userId, count> }>.
          monthlyTallies: Map<string, { mid: Map<string, number>; end: Map<string, number> }>;
        }

  - id: D24
    date: 2026-04-22
    decision: Clean Sweep uses the CURRENT task list's open count as the baseline, and replays task completion events to find transitions to 0
    rationale: |
      The authoritative "open task" signal is the live task set. But naive
      replay doesn't work — tasks that are currently done weren't always done.
      Approach:
        1. Build the set of all family tasks currently in the system.
        2. For each task, determine whether it is CURRENTLY open (non-done,
           non-cancelled, `snoozedUntil` in past or absent).
        3. For every task CURRENTLY open, its existence always counted toward
           open-count.
        4. For every task CURRENTLY closed, the open-count treated that task
           as "open" from its `createdAt` until its latest `completedAt` (or
           cancellation).
        5. Sort all open→close transitions (the `completedAt` timestamps of
           currently-closed tasks) AND all open→create events ascending; run
           the counter. Each step where the counter drops to 0 is a zero-inbox
           moment. Credit the user who caused that specific `completedAt`.

      Caveat: this ignores history of tasks that were re-opened then re-closed
      (done → started → done). The final `completedAt` is what matters for the
      live count, consistent with the "transition log is not scanned" rule in
      §3.3 for best-streak math. Same principle here — keeps math stateless.

      Snoozed tasks are treated as open if `snoozedUntil <= now`, open (not
      counted) if snoozed into future. Consistent with "ignoring
      snoozed-until-future" in BRD §4.1 Clean Sweep definition.

  - id: D25
    date: 2026-04-22
    decision: Phoenix "≥14 days ago" is measured by calendar days in viewer's timezone, not 14*86400 seconds
    rationale: |
      Consistent with how streaks and day-of-week bucketing already work.
      Implementation: for each credited completion, compute the day key and
      count days between this day's key and the previous credited event's day
      key. ≥14 qualifies. Edge case: the very first credit ever does not
      qualify (no previous event).

  - id: D26
    date: 2026-04-22
    decision: Power Hour uses a per-user rolling 60-minute window; sliding by actual completedAt timestamps (not bucketed)
    rationale: |
      BRD says "N completions within any single rolling 60-minute window."
      Implementation is a two-pointer scan over sorted `completedAt` timestamps:
      for each event, count the number of events within the 60-min window ending
      at (or starting at; pick starting-at for consistency) this event. Track
      the all-time max. Earn when max hits 5 / 10 / 15. `earnedAt` = the
      tipping event.

      Do NOT re-bucket per calendar hour — BRD explicitly says "rolling." Two-
      pointer is O(n).

  - id: D27
    date: 2026-04-22
    decision: Comeback Kid is evaluated only for CLOSED months (month strictly before the current month)
    rationale: |
      "In a single calendar month, be behind at end-of-day-15 and finish ≥1
      ahead." The month must be complete to know the final count. For the
      in-progress current month, the badge cannot be evaluated — the user
      might still catch up or fall back. Decision: skip the current month.
      Earned months are counted in ascending order; `earnedAt` for
      comeback_kid_N is the last day of the Nth qualifying month
      (23:59:59.999 local, converted to ISO).

      Two-user app: a "comeback" in a family of one person is meaningless;
      skip the badge entirely if the family has <2 members.

  - id: D28
    date: 2026-04-22
    decision: Partner in Crime `earnedAt` for the Nth shared-completion day is the later of the two users' first completedAt on that day
    rationale: |
      The day is "shared" only once BOTH users have a completion. The tipping
      moment is the second user's first completedAt. Natural and intuitive —
      that's the moment the day became shared. Implementation: in
      `FamilyBadgeContext.dayUserIndex`, also record the per-day timestamp at
      which the day first flipped to "both users present." Use it as
      `earnedAt` for whichever user the badge belongs to (both users earn
      Partner in Crime on the same days, with the same `earnedAt`).

  - id: D29
    date: 2026-04-22
    decision: Row slot selection rewrite — score-based, no Consistency-drop carve-out
    rationale: |
      BRD §5.1 explicit. Remove the hardcoded `slots.filter((s) => s.def.category !== 'consistency')`
      step. New algorithm:
        1. For each category with ≥1 earned, pick the highest-scoring earned
           badge as the representative (score defined below).
        2. Sort representatives by score DESC.
        3. Take top 3; tie-break `earnedAt` DESC.

        score = rarity + recencyBoost
        rarity = [1, 2, 4, 8, 16][tier - 1]
        recencyBoost = 10 * exp(-daysSinceEarnedAt / 7)
        daysSinceEarnedAt = (now - earnedAt) / 86_400_000

      `now` must be passed in for determinism in tests.

  - id: D30
    date: 2026-04-22
    decision: Ghost `????` placeholders live ONLY in the detail modal; row renders fewer badges when user has fewer earned categories
    rationale: |
      Matches BRD §5.1 ("No ghost placeholders on the row — fewer earns = fewer
      badges"). v1.0 row currently fills with ghosts in category order — that
      behavior is deleted. Simplifies score-based selection: the slot area is
      literally `selectBadgeSlots(earned).map(renderMedal)`.

  - id: D31
    date: 2026-04-22
    decision: Untouched-category obfuscation — heading itself is `????` + single-row collapsed placeholder (NOT per-tier tiles)
    rationale: |
      BRD §4.7 explicit. Tier count varies across categories (3, 4, or 5);
      rendering per-tier `????` tiles would leak the count. A single row
      with the heading `????` preserves the "something is there, but you
      don't know what or how big" vibe. The footer `N of M hidden categories`
      quantifies the unknown at the aggregate level.

  - id: D32
    date: 2026-04-22
    decision: Detail modal uses `<ResponsiveModal fullScreen>` on all viewports
    rationale: |
      `ResponsiveModal` already supports `fullScreen` (line 18-ish of
      frontend/src/components/ResponsiveModal.tsx — mobile forces it; desktop
      respects caller-passed value). Pass `fullScreen` explicitly. 48 tiles
      across 15 categories need the canvas.

  - id: D33
    date: 2026-04-22
    decision: Hero modal queue is component-level state with `useBadgeHeroQueue` hook managing ordering, transitions, and per-modal audio selection
    rationale: |
      `useNewBadgeCelebrations` currently holds a single `pendingHero`
      useState. Extending that to a queue muddles two concerns:
        1. Detection (diff earnedAt vs. marker)
        2. Presentation (render current + schedule next + audio choice)

      New split:
        - `useNewBadgeCelebrations` still does detection; returns an array of
          `QueuedHeroUnlock` objects after de-dup + sort rules.
        - `useBadgeHeroQueue` consumes that array, owns the "current modal"
          state + dismiss handler + ~400ms inter-modal transition + audio cue
          selection (small vs. big vs. legendary stinger).

      Tasks.tsx renders `<BadgeHeroModal opened={queue.currentOpen} badge={queue.current} ... onClose={queue.dismiss} />` and is otherwise unchanged.

  - id: D34
    date: 2026-04-22
    decision: Tier-1/2 no longer use the toast-notification path — every tier gets a hero modal
    rationale: |
      BRD §4.5 + REQ-L-015 explicit: "Every newly earned badge triggers a
      hero modal (no toast tier)." Delete the Mantine `notifications.show`
      branch in `celebrateBadgeUnlock`. `celebrateBadgeUnlock` is repurposed
      to a confetti-only helper; audio is selected by the queue hook based
      on queue position + tier.

      Consequence: the `@mantine/notifications` import can be removed from
      this code path — but keep the package installed (other features use it).

  - id: D35
    date: 2026-04-22
    decision: Three audio cues live in completionSound.ts with Web Audio synthesis — no runtime assets
    rationale: |
      v1.0 `playBadgeFanfare` is the Big triumphant cue — keep it, rename in
      docs only. Add:
        - `playBadgeSmallTriumphant()` — ~1.5s punchy. Shorter arpeggio than
          Big; lighter harmonics; fundamental 0.10 vs. 0.14.
        - `playBadgeLegendaryStinger()` — distinct ~3s cue. Stacked-triad
          intro + bell-like sustained top note with vibrato + low sub-octave
          support for weight. Intended as the single most memorable cue in
          the app.

      Silent-fail safe like the others. No `<audio>` tags, no mp3 files.

  - id: D36
    date: 2026-04-22
    decision: `MedalBadge` is one parameterized React component — `<MedalBadge tier={1..5} emblem={EmblemKey} size={number} halo={'none' | 'halo' | 'legendary'} animate={'none' | 'hero'} />`
    rationale: |
      BRD §4.8. The CSS chassis (radial gradient + inset shadow rim +
      highlight crescent) is parameterized by `--finish-*` CSS custom
      properties set per tier. Emblem is a key into a static SVG map
      (`medalEmblems.tsx`). The component renders identically in the row slot,
      detail modal, and hero modal — hero adds entry animation + ambient loops
      via `animate='hero'`. Prefers-reduced-motion is handled inside the
      component via CSS media query.

      No per-badge asset files. Swapping to real designed artwork in a future
      iteration = swap the emblem SVG; chassis stays.

  - id: D37
    date: 2026-04-22
    decision: Emblem library is hand-authored inline SVGs in `medalEmblems.tsx`, keyed by `BadgeCategory`
    rationale: |
      BRD §4.1 Assumption 4 — library-first. 15 emblems is small enough to
      hand-author; commissioning is a future polish pass. Use Tabler/Phosphor
      as visual reference but inline the paths so the emblem inherits
      `currentColor` and scales cleanly from 32px → 240px. Keying by
      category (not per-badge) halves the work and matches the BRD's "all
      tiers in a category share one emblem" implicit model.

      Categories → emblem:
        volume            → bolt / lightning
        consistency       → calendar-check
        streak            → flame
        lifetime          → trophy
        weekday_warrior   → briefcase
        night_owl         → moon
        early_bird        → sunrise
        power_hour        → stopwatch
        clean_sweep       → broom
        spring_cleaner    → sprout / leaf
        holiday_hero      → evergreen / star
        phoenix           → feather / flame-rising
        clutch            → hourglass
        partner_in_crime  → handshake / two-people
        comeback_kid      → comeback-arrow / rocket

  - id: D38
    date: 2026-04-22
    decision: Confetti color tinted by the final modal's finish (not always the same palette)
    rationale: |
      BRD §9 Q2 proposed; accept. `celebrateBadgeUnlock` takes a `finish`
      param and picks a color array from a per-finish lookup:
        bronze     → warm coppers
        silver     → cool neutrals
        gold       → warm yellows
        platinum   → pale cool whites + blues
        legendary  → iridescent rainbow
      Final modal of queue gets 2× particle count + longer spread +
      finish-tinted palette. Non-final modals get a smaller burst in the same
      palette.

  - id: D39
    date: 2026-04-22
    decision: Ambient motion (shimmer + glow pulse) is CSS-only; sparkle particles are SVG-sprite child nodes animated via CSS transforms
    rationale: |
      CSS is GPU-accelerated, interruptible by `@media (prefers-reduced-motion:
      reduce)`, and requires zero JS. Sparkle particles are a small SVG
      `<g>` child with N static circles offset around the disc; each has its
      own `animation-delay` + `@keyframes` pulse. No JS animation loop.

      Entry animation (scale 0→1 + ~360° rotate over ~800ms) fires once when
      the modal mounts — trigger via a short-lived `.entering` class + CSS
      transition. Replay for dev panel = toggle the class off and back on with
      a forced reflow.

  - id: D40
    date: 2026-04-22
    decision: `shippedAt` guard applies to EVERY badge unconditionally, even v1.0 ones
    rationale: |
      BRD §4.5 is explicit. v1.0 badges get `shippedAt = 2026-04-19T00:00:00Z`
      (the v1.0 deploy date). v2.0 badges get `shippedAt = <v2.0 deploy date>`.
      Subsequent deploys set `shippedAt` to deploy time. This means future
      category rollouts do not trigger retroactive celebration cascades.

      The v1.0 day-1 `lastSeenBadgeEarnedAt = now` seed is preserved —
      redundant but harmless. A fresh install after v2.0 ship will seed the
      marker AND have `shippedAt > earnedAt` guards — belt and suspenders.

  - id: D41
    date: 2026-04-22
    decision: Dev panel uses `import.meta.env.DEV` guard; tree-shaken in prod
    rationale: |
      Vite tree-shakes dead branches behind `import.meta.env.DEV`. Verify
      via `npm run build` + check that `BadgeDevPanel` identifiers are absent
      from the output bundle. If unexpectedly retained, wrap the import
      itself in a dynamic `await import(...)` gated by the flag.

# =============================================================================
# PHASE 1: Shared types + catalog expansion + BadgeDefinition extensions
# =============================================================================
phase_1_shared_types:
  status: complete
  description: |
    Extend types, rewrite BADGE_CATALOG to 48 entries with tier/shippedAt/
    celebrationCopy, delete `isFinalTierBadge`, replace with tier helpers.
    Does NOT change derivation or backend yet — this is type-only prep.

  tasks:
    - id: "1.1"
      task: Extend BadgeCategory and BadgeId in shared/types/index.ts
      details: |
        Add 11 new categories to `BadgeCategory`:
          'weekday_warrior' | 'night_owl' | 'early_bird' | 'power_hour'
          | 'clean_sweep' | 'spring_cleaner' | 'holiday_hero' | 'phoenix'
          | 'clutch' | 'partner_in_crime' | 'comeback_kid'

        Add 34 new badge IDs to `BadgeId` — see BRD §4.1 for the full list.
        Keep v1.0 IDs unchanged.

    - id: "1.2"
      task: Extend BadgeDefinition with tier, shippedAt, celebrationCopy, optional displayName
      details: |
        ```ts
        export interface BadgeDefinition {
          id: BadgeId;
          category: BadgeCategory;
          threshold: number;
          order: number;
          tier: 1 | 2 | 3 | 4 | 5;            // NEW — required
          shippedAt: string;                    // NEW — required ISO
          celebrationCopy: string;              // NEW — required ({displayName} token)
          displayName?: string;                 // NEW — optional artistic override
          label: string;                        // kept; may be replaced by "{categoryName} {finishName}" auto-label at render
          description: string;                  // kept
        }
        ```
        `tier` and `order` will overlap in some cases; keep both — `order`
        is for grid layout within a category, `tier` is for polish. For v2.0
        catalog they're equal (tier 1 = order 1, etc.) but leaving them
        separate costs nothing and future-proofs against re-ordering.

    - id: "1.3"
      task: Rewrite BADGE_CATALOG — 48 entries
      details: |
        All 48 entries with id, category, tier, threshold, order, shippedAt,
        label, description, celebrationCopy. v1.0 entries keep their
        `shippedAt = '2026-04-19T00:00:00.000Z'`. v2.0 entries use the deploy
        date (TBD; set to `2026-04-22T00:00:00.000Z` as a placeholder and
        override at deploy time via a codemod if needed).

        Use BRD §4.1 for thresholds + §4.10 for celebrationCopy. Every copy
        string must include `{displayName}` token.

        Verify in a test that `BADGE_CATALOG.length === 48` and that every
        BadgeId in the type union has a corresponding catalog entry (and
        vice-versa). Zod is heavy here; a simple test file is enough.

    - id: "1.4"
      task: Delete `isFinalTierBadge`; add tier helpers
      details: |
        File: shared/utils/leaderboardBadgeSlots.ts

        Delete:
          export function isFinalTierBadge(id: BadgeId): boolean

        Delete:
          const MAX_THRESHOLD_BY_CATEGORY = ...

        Add:
          export function getBadgeTier(id: BadgeId): 1 | 2 | 3 | 4 | 5
          export function getBadgeFinish(tier: 1..5): 'bronze' | 'silver' | 'gold' | 'platinum' | 'legendary'
          export function getBadgeRarity(tier: 1..5): number  // [1,2,4,8,16]
          export function getFinishName(finish: Finish): 'Bronze' | 'Silver' | 'Gold' | 'Platinum' | 'Legendary'
          export function getCategoryName(cat: BadgeCategory): string  // "Night Owl", "Weekday Warrior", etc.
          export function getAutoLabel(def: BadgeDefinition): string   // "{categoryName} {finishName}" or def.displayName

        Keep `EarnedSlot` and `selectBadgeSlots` — those are rewritten in 2.x.

    - id: "1.5"
      task: Type-level assertion — every BadgeId appears exactly once in BADGE_CATALOG; every category has ≥1 badge
      details: |
        Adds a compile-time guard via a mapped type or a runtime test
        (simpler). Prevents dropping an entry mid-refactor.

        File: shared/types/__tests__/badgeCatalog.test.ts (new)

    - id: "1.6"
      task: Callsite audit — update everything that reads BadgeDefinition/BadgeId
      details: |
        Grep for:
          BADGE_CATALOG
          BadgeDefinition
          BadgeId
          isFinalTierBadge
          final tier

