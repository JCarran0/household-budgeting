      task: Rewrite `useNewBadgeCelebrations` — build queue with de-dup + rarity sort + shippedAt gate
      details: |
        File: frontend/src/hooks/useNewBadgeCelebrations.ts (rewrite)

        Signature (retaining hook name for consumer compatibility):
          export function useNewBadgeCelebrations(
            leaderboard: LeaderboardResponse | undefined,
            currentUserId: string | undefined,
          ): { current: QueuedHeroUnlock | null; dismiss: () => void };

        Behavior:
          1. Detect new earnedAt > marker (unchanged from v1.0).
          2. For each candidate, check `earnedAt >= def.shippedAt`. If not,
             silently advance marker past it (REQ-L-019).
          3. De-dup by category: for each category, keep only the highest-
             tier earn.
          4. Sort ascending by rarity (getBadgeRarity(tier)). Tie-break
             `earnedAt` ASC.
          5. Mark the last entry as `isFinal = true`; rest `false`.
             Single-item queues: the only item is isFinal = true (D35).
          6. Delegate to `useBadgeHeroQueue.enqueue(items)`.
          7. Advance marker to max(earnedAt) across all candidates processed.

        Internally instantiate `useBadgeHeroQueue` and return its
        `{current, dismiss}` so Tasks.tsx consumers keep the same surface.

    - id: "6.4"
      task: Rewrite `celebrateBadgeUnlock` — confetti-only helper taking a finish param
      details: |
        File: frontend/src/utils/celebrateBadgeUnlock.ts (rewrite)

        New signature:
