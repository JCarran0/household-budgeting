# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Slice the deploy to minimize UX surprises. v1.0 is live — we cannot regress
    the existing experience at any point.

    SLICE A — Backend + derivation (Phases 1, 2, 3).
      Returns 48 `earnedBadges` from the server; historical earns appear in the
      response. v1.0 UI still renders whatever subset it knows how to display;
      since v1.0 UI keys off BADGE_CATALOG via shared types, the new catalog
      entries render as ghosts on the row + detail modal (pre-rewrite).
      This is temporary — the next slice replaces the UI — but it's safe
      because no celebration UX changes yet.
      Alternative if this intermediate state looks bad: ship Slices A + B
      together (no prod deploy between them).

    SLICE B — Frontend visual + structural rewrite (Phases 4, 5).
      Ships MedalBadge, rewrites BadgeSlotArea + BadgeDetailModal. Full-screen
      modal, score-based row, 15-cat grid, ???? obfuscation. No hero-modal
      changes yet — v1.0's hero-modal-only-for-final-tier + toast-for-others
      stays in place temporarily. New tier-1/2 unlocks still go through toast
      path; tier-3 unlocks ALSO go through toast (no hero); only v1.0
      "final" (now tier-3 for 3-tier categories, tier-5 for Lifetime) get the
      old hero modal. Intermediate state is ugly but not broken.

    SLICE C — Celebration UX (Phases 6, 7).
      Replaces the toast-for-tiers-1-2 path with every-tier hero modals +
      queue + three audio cues + shippedAt guard. At this point the v2.0
      experience is complete. `shippedAt` guard + existing day-1 marker seed
      jointly suppress any retroactive cascade.

      Phase 7 (dev panel) lands with Slice C so QA can exercise the cascade
      without lucky real data.

    Slice A must deploy behind Slices B+C by no more than 1 deploy cycle —
    backend returning 48 badges with v1.0 UI renders as ghosts, which is
    confusing if left too long.

  sequence:
    - slice: A
      phases:
        - phase: 1 — Shared types + catalog (48 entries with tier/shippedAt/celebrationCopy)
        - phase: 2 — Shared derivations (11 new + family context + score-based slots)
        - phase: 3 — Backend getLeaderboard wiring
      gate: All unit + integration tests green; response shape backwards-compatible (existing frontend still renders)
    - slice: B
      phases:
        - phase: 4 — MedalBadge + emblem library
        - phase: 5 — BadgeSlotArea + BadgeDetailModal rewrites
      gate: Manual visual QA on row + full-screen detail; ???? obfuscation works; no regressions to v1.0 celebration (still toast-based at this point)
    - slice: C
      phases:
        - phase: 6 — Hero modal queue + audio expansion + celebration rewrite
        - phase: 7 — Dev panel
        - phase: 8 — Regression + bundle + UAT sign-off
      gate: Post-deploy, verify retroactive-silence for users with historical earns; verify cascade scenarios via dev panel

# =============================================================================
# RISKS & MITIGATIONS
# =============================================================================
risks:
  - id: R1
    risk: Retroactive celebration cascade on v2.0 deploy — 2 users suddenly get 20+ hero modals each
    likelihood: high-if-not-careful
    mitigation: |
      Two independent guards:
        1. v1.0 day-1 seed already set `lastSeenBadgeEarnedAt` to v1.0-deploy `now`.
           For existing users, this means any v2.0 earn with `earnedAt < v1.0-deploy`
           is already below the marker. But v2.0 derivations for NEW categories
           will assign `earnedAt` = historical task timestamps, which ARE before
           the v1.0-deploy marker only if the tasks are that old.
        2. `shippedAt` guard: every new-category badge has `shippedAt =
           v2.0-deploy-time`. Even if `earnedAt` > marker, the shippedAt gate
           catches it: `earnedAt < shippedAt` → silent marker advance.

      Verification in UAT: clear marker on a user with long task history, load
      page, assert ZERO hero modals fired, marker advanced silently.

  - id: R2
    risk: Clean Sweep replay semantics are subtle — easy to compute wrong open-task count
    likelihood: medium
    mitigation: |
      D24 is explicit about the algorithm. Unit-test heavily with edge cases:
        - Tasks created, completed, re-opened, re-completed (only final
          state matters per D24)
        - Tasks snoozed to future vs. to past
        - Tasks cancelled
        - Concurrent completions at same `completedAt` (stable ordering: by
          task id)

  - id: R3
    risk: Power Hour two-pointer scan + Phoenix day-gap computation can be off-by-one
    likelihood: medium
    mitigation: |
      Explicit unit tests: exactly 60-min window boundary; exactly 14-day gap
      boundary (both inclusive per BRD).

  - id: R4
    risk: Reduced-motion path misses a CSS rule; user with vestibular sensitivity sees full motion
    likelihood: medium
    mitigation: |
      Single CSS media query in MedalBadge covers entry, shimmer, glow,
      sparkles. Dev panel's reduced-motion override forces the path for QA
      without touching OS settings. Manual test on Mac (Settings → Display →
      Reduce Motion) + Windows (Ease of Access).

  - id: R5
    risk: 48-badge compute per leaderboard request is slow at family scale
    likelihood: low (per BRD Assumption 3)
    mitigation: |
      Phase 2.14 spike test establishes perf baseline. If >100ms at 2000-task
      scale, add memoization keyed on tasks-hash (cheap since taskService
      already loads tasks).

  - id: R6
    risk: Tree-shaking fails for BadgeDevPanel; ships to production
    likelihood: low
    mitigation: |
      Phase 7.2 explicit bundle audit. If Vite fails to shake, fall back to
      dynamic import() behind the env flag (guaranteed to not execute).

  - id: R7
    risk: Cross-user cadence — Partner in Crime + Comeback Kid require BOTH users' event streams
    likelihood: ship-time (not a risk if followed correctly)
    mitigation: |
      `buildFamilyBadgeContext` consumes the full `eventsByUser` map. The
      context is pre-computed BEFORE the per-user compute loop in taskService.
      Tests cover the symmetry guarantee (Partner in Crime earnedAt is
      identical on both users' entries).

  - id: R8
    risk: celebrationCopy strings contain apostrophes and template tokens that may break if stored in TS as single-quoted strings
    likelihood: low
    mitigation: |
      Use double-quoted strings in BADGE_CATALOG for all copy entries. 48
      strings total; manual eyeball pass + lint catches stray quotes.

