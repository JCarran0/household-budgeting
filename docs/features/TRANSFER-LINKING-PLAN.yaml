# =============================================================================
# PHASE 5: Frontend — Linking UI in Edit Modal
# =============================================================================
phase_5_linking_ui:
  status: not_started
  description: |
    Add the transfer linking workflow to the transaction edit modal. This is
    the core UX — when a user categorizes as transfer, they can select a
    counterpart from a candidate list.

  tasks:
    - id: "5.1"
      task: Add transfer linking section to TransactionEditModal
      status: not_started
      details: |
        File: frontend/src/components/transactions/TransactionEditModal.tsx

        When the transaction's categoryId is a transfer category (use
        isTransferCategory from shared utils), show a new section below
        the category picker:

        IF linked (transferGroupId is set):
          Show "Linked Transfer" card with counterpart summary:
            - Account name, date, amount, transaction name
            - "Unlink" button to break the pair

        IF unlinked (transfer category but no transferGroupId):
          Show "Link Transfer" section:
            - Explanatory text: "Select the matching transaction"
            - Candidate list fetched from GET /transfer-candidates
            - Each candidate row shows: account name, date, amount, name
            - Clicking a candidate calls POST /transfer-link
            - "Skip" or dismiss to leave unlinked

        Use React Query:
          queryKey: ['transfer-candidates', transactionId]
          enabled: only when transaction is unlinked transfer

    - id: "5.2"
      task: Auto-open edit modal on inline category change to transfer
      status: not_started
      details: |
        File: frontend/src/pages/EnhancedTransactions.tsx (lines 754-767)

        Modify the handleCategorySelect function:
        - After the category update mutation succeeds, check if the new
          category is a transfer category (isTransferCategory)
        - If so, set the transaction as the active edit modal transaction
          and open the modal (setEditingTransaction + open modal state)
        - The modal will render with the linking section visible since
          the transaction now has a transfer category

    - id: "5.3"
      task: Create TransferCandidateList component
      status: not_started
      details: |
        File: frontend/src/components/transactions/TransferCandidateList.tsx

        Reusable component for displaying candidate matches:

        Props:
          transactionId: string
          onLink: (counterpartId: string) => void
          onSkip: () => void

        Fetches candidates via useQuery, displays as a scrollable list.
        Each row: account name, date, amount (with sign), transaction name.
        Sorted by date closest to source transaction.
        Clicking a row calls onLink with the candidate's id.
        Empty state: "No matching transactions found" with explanation.

        Use Mantine List or Table component. Keep it compact — this sits
        inside the edit modal.

    - id: "5.4"
      task: Add unlink mutation and UI
      status: not_started
      details: |
        In TransactionEditModal, when a linked transfer is displayed:
        - "Unlink" button triggers DELETE /transfer-link mutation
        - On success: invalidate transaction queries, update local state
        - Both transactions revert to unlinked transfer state
        - Show brief notification: "Transfer unlinked"

