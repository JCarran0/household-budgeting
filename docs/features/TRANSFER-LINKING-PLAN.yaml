# =============================================================================
# PHASE 7: Plaid Suggestion Hints
# =============================================================================
phase_7_plaid_hints:
  status: not_started
  description: |
    Surface Plaid's transfer suggestions as non-authoritative hints on
    uncategorized transactions. This helps users identify potential transfers
    without requiring them to manually scan every transaction.

  tasks:
    - id: "7.1"
      task: Add Plaid transfer hint to transaction list rows
      status: not_started
      details: |
        File: frontend/src/pages/EnhancedTransactions.tsx

        For transactions where:
          - categoryId is null (uncategorized)
          - plaidCategoryId starts with 'TRANSFER_IN' or 'TRANSFER_OUT'

        Show a subtle hint, e.g.:
          - Small text below the transaction name: "Plaid suggests: transfer"
          - Or a faint transfer icon with tooltip

        The hint is passive — clicking it does nothing special. The user
        categorizes the transaction normally (which may involve selecting
        a transfer category, triggering the linking flow).

    - id: "7.2"
      task: Ensure Plaid-suggested transfers are excluded from unlinked count
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts

        The unlinked transfer count and filter must only include transactions
        where categoryId is a transfer category (user-confirmed). Transactions
        where only plaidCategoryId is a transfer (but categoryId is null) must
        NOT appear in unlinked transfer results.

        This should already be the case since the filter checks categoryId,
        not plaidCategoryId. Verify and add a test to confirm.

# =============================================================================
# PHASE 8: Testing
# =============================================================================
phase_8_testing:
  status: not_started
  description: |
    Follow risk-based testing strategy. Focus on invariant enforcement,
    linking/unlinking correctness, and the auto-unlink on recategorization.

  tasks:
    - id: "8.1"
      task: Integration tests for transfer linking logic
      status: not_started
      details: |
        File: backend/src/__tests__/integration/transferLinking.test.ts

        Critical test cases:
        - Link two transactions with matching amounts succeeds
        - Both transactions get transferGroupId and linkedTransactionId
        - Counterpart auto-categorized as TRANSFER_IN or TRANSFER_OUT
        - Reject link when amounts differ
        - Reject link when same account
        - Reject link when same sign
        - Reject link when one is already linked
        - Unlink clears both transactions, preserves categories
        - Recategorize linked transfer to non-transfer breaks the link
        - Recategorize linked transfer to different transfer subcategory
          does NOT break the link (still a transfer)

    - id: "8.2"
      task: Integration tests for candidate query
      status: not_started
      details: |
        File: backend/src/__tests__/integration/transferLinking.test.ts

        Test cases:
        - Returns transactions with matching absolute amount and opposite sign
        - Excludes same-account transactions
        - Excludes already-linked transactions
        - Excludes the source transaction itself
        - Returns empty array when no candidates exist
        - Results sorted by date proximity

    - id: "8.3"
      task: Route-level tests for transfer API endpoints
      status: not_started
      details: |
        File: backend/src/__tests__/integration/transferRoutes.test.ts

        Test CRUD via supertest:
        - POST /transfer-link with valid counterpart succeeds
        - POST /transfer-link with invalid counterpart returns 400
        - DELETE /transfer-link on linked transaction succeeds
        - DELETE /transfer-link on non-linked transaction returns 400
        - GET /transfer-candidates returns filtered list
        - GET /unlinked-transfers/count returns correct count
        - All endpoints require auth

    - id: "8.4"
      task: Verify existing transfer behavior unchanged
      status: not_started
      details: |
        Run existing test suite:
        - backend/src/__tests__/critical/transfer-filter.test.ts
        - backend/src/__tests__/unit/budgetCalculations.test.ts

        All existing tests must pass without modification. This confirms
        the feature is truly additive and non-breaking.

    - id: "8.5"
      task: Manual testing checklist
      status: not_started
      details: |
        - [ ] Categorize transaction as transfer via edit modal → linking section appears
        - [ ] Select candidate from list → both transactions linked
        - [ ] Counterpart auto-categorized as correct TRANSFER_IN/OUT
        - [ ] Linked transactions show link icon in list
        - [ ] Click link icon → see counterpart summary
        - [ ] Unlink via edit modal → both become unlinked transfers
        - [ ] Recategorize linked transfer to non-transfer → link broken
        - [ ] Inline category change to transfer → edit modal auto-opens
        - [ ] Dismiss modal → transaction stays as unlinked transfer
        - [ ] Filter by "Unlinked Transfers" → shows only unlinked
        - [ ] Unlinked transfer badge shows correct count
        - [ ] Click badge → activates unlinked transfer filter
        - [ ] Plaid hint visible on uncategorized transactions with transfer plaidCategoryId
        - [ ] Plaid-hinted transactions NOT counted in unlinked transfer count
        - [ ] Budgets and reports still exclude transfers correctly
        - [ ] Existing transfer filter still shows all transfers (linked + unlinked)

# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Recommended sequence. Phases 1-3 are backend foundation.
    Phase 4 bridges backend to frontend. Phases 5-6 are the core UX.
    Phase 7 is a polish layer. Phase 8 runs alongside development.
  sequence:
    - phase: 1 — Data Model Extension
      reason: Fields are needed by everything else. No migration, just additive.
    - phase: 2 — Backend Service Logic
      reason: Linking/unlinking logic must exist before routes or UI.
    - phase: 3 — Backend API Routes
      reason: API must exist before frontend can consume it.
    - phase: 4 — Frontend API Client
      reason: Frontend methods needed for UI development.
    - phase: 5 — Linking UI in Edit Modal
      reason: Core UX deliverable. Depends on phases 1-4.
    - phase: 6 — Transaction List Visual Linking
      reason: Display layer. Depends on linking being functional.
    - phase: 7 — Plaid Suggestion Hints
      reason: Polish / discovery layer. Independent of linking logic.
    - phase: 8 — Testing
      reason: Write integration tests alongside phases 2-3. Manual testing at end.
