        frontend has access to linking state.

    - id: "1.3"
      task: Add transfer linking fields to chatbot data service type
      status: not_started
      details: |
        File: backend/src/services/chatbotDataService.ts (line 53 area)

        Add transferGroupId and linkedTransactionId to the chatbot's
        transaction type so the chatbot can answer questions about
        linked/unlinked transfers (BRD REQ-027).

    - id: "1.4"
      task: Ensure new fields are included in transaction creation defaults
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts (around line 300)

        In the createStoredTransaction method (or equivalent), set:
          transferGroupId: null,
