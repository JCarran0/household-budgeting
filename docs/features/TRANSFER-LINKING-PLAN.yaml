# =============================================================================
# Transfer Linking — Implementation Plan
# =============================================================================
# BRD: docs/features/TRANSFER-LINKING-BRD.md
# Status: Not Started
# Last Updated: 2026-04-06
# =============================================================================

overview:
  description: |
    Implementation plan for the Transfer Linking feature. Adds the ability to
    pair two transfer-categorized transactions into a single logical transfer
    via a shared transferGroupId. Linking is user-initiated — the system never
    auto-links. Unlinked transfers are surfaced through a dedicated filter.

    The feature is fully additive: two nullable fields on StoredTransaction,
    no data migration, and all existing transfer detection / budget exclusion
    logic remains unchanged.
  key_files:
    brd: docs/features/TRANSFER-LINKING-BRD.md
    stored_transaction: backend/src/services/transactionService.ts
    category_helpers: backend/src/shared/utils/categoryHelpers.ts
    transaction_routes: backend/src/routes/transactions.ts
    transaction_edit_modal: frontend/src/components/transactions/TransactionEditModal.tsx
    enhanced_transactions: frontend/src/pages/EnhancedTransactions.tsx
    filter_store: frontend/src/stores/filterStore.ts
    api_client: frontend/src/lib/api.ts
    budget_calculations: shared/utils/budgetCalculations.ts
    transaction_calculations: shared/utils/transactionCalculations.ts

# =============================================================================
# DECISIONS LOG — Capture key decisions as they're made during implementation
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-06
    decision: Linking prompt lives inside the existing transaction edit modal
    rationale: |
      The edit modal is already where categorization happens. Adding a linking
      step there keeps the flow in a single, familiar place. No new modals needed.

  - id: D2
    date: 2026-04-06
    decision: Inline category change to transfer auto-opens the edit modal
    rationale: |
      When a user changes a category to a transfer type via the inline picker
      on the transaction list, the edit modal opens automatically so they can
      link immediately. Dismissing the modal leaves the transfer unlinked.
      This avoids a separate linking step while keeping the inline picker fast.

  - id: D3
    date: 2026-04-06
    decision: Matching is by exact absolute amount only — no date proximity
    rationale: |
      Transfers between accounts can post days apart. Filtering candidates
      by date would hide valid matches. Amount + different account + opposite
      sign is sufficient. Candidate list is sorted by date proximity as a
      convenience, not a filter.

  - id: D4
    date: 2026-04-06
    decision: No automatic linking of historical data
    rationale: |
      Users work through historical unlinked transfers at their own pace via
      the unlinked transfer filter. Auto-linking risks false positives (e.g.,
      two unrelated $50 transactions). The filter-and-link workflow is the
      primary mechanism.

  - id: D5
    date: 2026-04-06
    decision: Plaid suggestions are surfaced as hints, never auto-applied
    rationale: |
      Plaid's transfer classification is useful but not trusted. When a
      transaction has plaidCategoryId starting with TRANSFER_IN/OUT and
      categoryId is null, the UI shows a subtle hint. User must confirm
      by explicitly categorizing as a transfer.

