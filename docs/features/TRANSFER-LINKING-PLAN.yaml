# =============================================================================
# PHASE 2: Backend — Linking Service Logic
# =============================================================================
phase_2_backend_service:
  status: not_started
  description: |
    Add transfer linking and unlinking methods to TransactionService.
    These enforce the invariants from the BRD (exact amount, different
    accounts, opposite signs).

  tasks:
    - id: "2.1"
      task: Add linkTransferPair method to TransactionService
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts

        Method signature:
          linkTransferPair(userId: string, transactionId: string, counterpartId: string): Promise<void>

        Logic:
        1. Load both transactions, verify they belong to userId
        2. Validate invariants:
           - Same absolute amount (Math.abs)
           - Different accountId
           - Opposite signs (one positive, one negative)
           - Neither is already linked (transferGroupId is null)
        3. Generate a transferGroupId (uuid)
        4. Set transferGroupId and linkedTransactionId on both transactions
        5. Auto-assign transfer categories:
           - Negative amount → TRANSFER_IN
           - Positive amount → TRANSFER_OUT
        6. Save both transactions

        Throw descriptive errors for each validation failure.

    - id: "2.2"
      task: Add unlinkTransferPair method to TransactionService
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts

        Method signature:
          unlinkTransferPair(userId: string, transactionId: string): Promise<void>

        Logic:
        1. Load the transaction, verify it belongs to userId
        2. Verify it has a linkedTransactionId (is part of a pair)
        3. Load the counterpart transaction
        4. Clear transferGroupId and linkedTransactionId on both
        5. Do NOT change categoryId on either — both remain as transfers (unlinked)
        6. Save both transactions

    - id: "2.3"
      task: Add auto-unlink on recategorization
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts

        Modify the existing updateTransactionCategory method:
        - After setting the new categoryId, check if the transaction was
          previously linked (transferGroupId is not null)
        - If the new category is NOT a transfer category (use isTransferCategory()),
          call unlinkTransferPair logic to clear linking on both sides
        - This enforces BRD REQ-009: recategorizing away from transfer breaks the link

    - id: "2.4"
      task: Add getCandidateTransfers query method
      status: not_started
      details: |
        File: backend/src/services/transactionService.ts

        Method signature:
          getCandidateTransfers(
            userId: string,
            transactionId: string,
            amount: number,
            accountId: string
          ): Promise<StoredTransaction[]>

        Logic:
        1. Find all user transactions where:
           - Math.abs(amount) === Math.abs(provided amount)
           - accountId !== provided accountId
           - Sign is opposite to the provided amount
           - transferGroupId is null (not already linked)
           - id !== transactionId (not self)
        2. Sort by date proximity to the source transaction
        3. Return the list

        This powers the candidate picker in the linking UI.

# =============================================================================
# PHASE 3: Backend — API Routes
# =============================================================================
phase_3_backend_routes:
  status: not_started
  description: |
    Add API endpoints for transfer linking operations and candidate lookup.

  tasks:
    - id: "3.1"
      task: Add transfer link endpoint
      status: not_started
      details: |
        File: backend/src/routes/transactions.ts

        POST /api/v1/transactions/:transactionId/transfer-link

        Request body (Zod validated):
          { counterpartId: string }

        Calls transactionService.linkTransferPair(userId, transactionId, counterpartId)
        Returns: { success: true, transferGroupId: string }

    - id: "3.2"
      task: Add transfer unlink endpoint
      status: not_started
      details: |
        File: backend/src/routes/transactions.ts

        DELETE /api/v1/transactions/:transactionId/transfer-link

        No request body needed — the service finds the counterpart from
        the transaction's linkedTransactionId.

        Calls transactionService.unlinkTransferPair(userId, transactionId)
        Returns: { success: true }

    - id: "3.3"
      task: Add candidate transfers endpoint
      status: not_started
      details: |
        File: backend/src/routes/transactions.ts

        GET /api/v1/transactions/:transactionId/transfer-candidates

        No query params needed — amount and accountId are read from the
        transaction itself.

        Calls transactionService.getCandidateTransfers(userId, transactionId, amount, accountId)
        Returns: { candidates: StoredTransaction[] }

    - id: "3.4"
      task: Add unlinked transfer count endpoint
      status: not_started
      details: |
        File: backend/src/routes/transactions.ts

        GET /api/v1/transactions/unlinked-transfers/count

        Returns the count of transactions where categoryId is a transfer
        category AND transferGroupId is null.

        Returns: { count: number }

        This powers the unlinked transfer badge in the UI (BRD REQ-015).

    - id: "3.5"
      task: Extend transaction filter for unlinked transfers
      status: not_started
      details: |
        File: backend/src/routes/transactions.ts (line 65 area)
        File: backend/src/services/transactionService.ts (TransactionFilter interface)

        Add 'unlinked_transfer' to the transactionType enum:
          z.enum(['income', 'expense', 'transfer', 'unlinked_transfer', 'all'])

        In the filter logic (transactionService.ts lines 499-519), add:
          if (filter.transactionType === 'unlinked_transfer') {
            return isTransfer && !txn.transferGroupId;
          }

