# =============================================================================
# PHASE 7: AutocompleteService → AutocompleteSuggestion Migration
# =============================================================================
# Added 2026-04-20 after the Phase 2 fetchFields migration surfaced the
# AutocompleteService deprecation warning in the console. See D9.
phase_7_autocomplete_migration:
  status: completed
  description: |
    Replace the remaining legacy autocomplete call in LocationInput with the
    post-2025-03-01 API. No contract change visible to callers: StopLocation
    is still emitted from the same onChange path; only the typeahead's
    internal prediction fetch and the Place construction change.

  tasks:
    - id: "7.1"
      task: Swap AutocompleteService.getPlacePredictions for AutocompleteSuggestion.fetchAutocompleteSuggestions
      status: completed
      details: |
        In frontend/src/components/trips/agenda/LocationInput.tsx:

        - Remove autocompleteServiceRef and its init effect; the new API
          is a static class method, so there's no service instance to hold.
        - Replace the `predictions` state (AutocompletePrediction[]) with a
          `suggestions` state (AutocompleteSuggestion[]). The prediction
          fetch effect becomes:

            const { suggestions: next } =
              await places.google.maps.places.AutocompleteSuggestion
                .fetchAutocompleteSuggestions({
                  input: debouncedQuery,
                  sessionToken: sessionTokenRef.current ?? undefined,
                });
            setSuggestions(next);

        - `autocompleteData` maps each suggestion's placePrediction:
            value: placePrediction.placeId
            label: placePrediction.text.text   // FormattableText -> string

        - handlePredictionSelect receives a placeId from the Autocomplete's
          onOptionSubmit. Look up the matching suggestion in state, then:

            const place = suggestion.placePrediction.toPlace();
            await place.fetchFields({ fields: [...] });

          This preserves the session-token auto-link (AutocompleteRequest doc):
          "When a session token is provided... the same token will
          automatically be included in the first call to fetchFields on a
          Place returned by calling toPlace on one of the resulting
          AutocompleteSuggestions."

          Net: one billing session per stop instead of two.

        - Rotate sessionTokenRef after the select path (session is consumed
          on the first fetchFields call).

    - id: "7.2"
      task: Manual verification — no more deprecation warning
      status: pending_user_qa
      details: |
        - DevTools console on /trips/:tripId with LocationInput open: no
          "AutocompleteService is not available to new customers" warning
        - Typing a query still shows dropdown options with correct labels
        - Selecting an option still captures displayName, formattedAddress,
          lat/lng, and photoName (when available)
        - Rapid consecutive selections each produce a new session token
          (manually observable by logging sessionTokenRef.current)
