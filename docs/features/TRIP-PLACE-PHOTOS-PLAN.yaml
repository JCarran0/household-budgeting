open_questions:
  - id: Q1
    from_brd: true
    question: Capture photos for all verified locations in PR 1, or only Stays?
    proposed: Capture everywhere; render only Stay banner in PR 1
    status: resolved
    resolution: |
      Resolved in D4. Single code path (handlePredictionSelect); gating
      capture by downstream stop type adds complexity at the wrong layer.
      PR 2 gets ready data without re-touching saved records.

  - id: Q2
    from_brd: true
    question: Stay banner thumbnail size — 48px, 56px, or 64px?
    proposed: 48px (matches banner vertical rhythm)
    status: pending
    resolution: |
      Finalize during Phase 4 manual QA. Adjustable without schema or
      capture changes — render-layer decision only.

  - id: Q3
    from_brd: true
    question: Null-attribution handling — store null (fallback to "Photo via Google") or literal "Google"?
    proposed: Store null; render helper picks the fallback label
    status: resolved
    resolution: |
      Accepted proposed default (D6 kinship). Separates data from
      presentation; evolves without a schema change if policy shifts.

  - id: Q4
    from_brd: true
    question: Backend photo proxy to keep API key server-side?
    proposed: No — referrer restriction is sufficient at current scale
    status: resolved
    resolution: |
