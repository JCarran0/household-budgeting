      actual: |
        Dev project enabled 2026-04-20 after the typeahead returned 403
        on first test. Production project still needs verification
        pre-deploy (reuse the same URL pattern with the prod projectId);
        folded into 6.3's preflight checklist.
      details: |
        Pre-requisite discovered during Phase 7 local verification: the
        new endpoints (fetchAutocompleteSuggestions, fetchFields, photo
        v1/media) all live under a separate GCP product from the legacy
        Places API the app currently uses. Without it, typeahead and
        photo capture return 403.

        Steps (per-environment — dev project first, then prod project):
        - Open https://console.developers.google.com/apis/api/places.googleapis.com/overview?project={projectId}
        - Click Enable, wait ~30–60 seconds
        - Reload dev app; confirm Stay form address typeahead returns
          results and a Stay save succeeds with photoName populated

        Billing and referrer restrictions from A-01 continue to apply;
        no new API key is needed on the same project.

    - id: "6.3"
      task: Production deploy validation
      status: pending_post_deploy
      details: |
        Preflight (before first post-merge prod release):
        - Enable "Places API (New)" on the prod GCP project (see 6.0).
        - Confirm VITE_GOOGLE_PLACES_API_KEY referrer allowlist includes
          budget.jaredcarrano.com.

        Post-deploy:
        - Create a new trip on production with a well-known hotel stay →
          strip of candidate tiles visible, click another to swap
        - Save and reload → banner renders with chosen photo
        - Click banner thumbnail → hero modal opens at maxWidthPx=1600
        - Existing trips with pre-feature stays → IconBed appears as before
        - Monitor GCP billing dashboard for 1 week post-deploy — confirm
          Places API (New) "Place Details" + "Photos" SKUs stay within
          expected range (<$1/mo at current usage).

