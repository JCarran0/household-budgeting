# =============================================================================
# Trip Place Photos — Implementation Plan
# =============================================================================
# BRD: docs/features/TRIP-PLACE-PHOTOS-BRD.md
# Extends: docs/features/TRIP-ITINERARIES-PLAN.yaml (shipped)
# Status: Draft
# Last Updated: 2026-04-20
# =============================================================================

overview:
  description: |
    Implementation plan for Trip Place Photos — small thumbnail images of
    places (sourced from Google Places API) alongside verified stops in Trip
    Itineraries.

    The feature is strictly additive. `VerifiedLocation` in shared/types
    gains two optional string fields (photoName, photoAttribution). No
    backend, no service, no route, no Zod schema change. The single
    capture-side change is swapping one legacy `PlacesService.getDetails`
    call for the newer `google.maps.places.Place.fetchFields` — same data,
    just now includes the stable `photos[].name` strings the legacy API
    doesn't expose.

    The feature ships in two PRs:
      PR 1 — schema + capture (all verified locations) + Stay banner
             thumbnail + Stay form preview.
      PR 2 — Map popup photo header + Eat/Play stop card avatar (pending
             PR 1 quality outcome in real usage).

  key_files:
    brd: docs/features/TRIP-PLACE-PHOTOS-BRD.md
    extends_plan: docs/features/TRIP-ITINERARIES-PLAN.yaml
    shared_types: shared/types/index.ts
    location_input: frontend/src/components/trips/agenda/LocationInput.tsx
    stay_banner: frontend/src/components/trips/agenda/StayBanner.tsx
    stay_form: frontend/src/components/trips/agenda/forms/StayForm.tsx
    add_stop_sheet: frontend/src/components/trips/agenda/AddStopSheet.tsx
    places_hook: frontend/src/hooks/useGooglePlaces.ts
    # PR 2 only:
    stop_card: frontend/src/components/trips/agenda/StopCard.tsx
    stop_popup: frontend/src/components/trips/map/StopPopup.tsx

# =============================================================================
# DECISIONS LOG — Captured from BRD refinement; update as implementation unfolds
# =============================================================================
decisions:
  - id: D1
    date: 2026-04-20
    decision: Photos come from Google Places API (not Google Photos, not user uploads)
    rationale: |
      Google Places API is already integrated in V1 for autocomplete and
      address verification, loaded via the same Maps JS bundle. The `photos`
      field on the Place resource is the lowest-friction path to
      place-identifying imagery: one existing billing relationship, one
      existing API key, one existing loader, one existing session-token flow.

      User uploads or Google Photos integration would dwarf this release's
      scope and chase a different product idea (trip memories, not place
      identity). Those remain viable as future features; they don't compete.

  - id: D2
    date: 2026-04-20
    decision: Persist photoName + photoAttribution on VerifiedLocation; never cache binaries
    rationale: |
      Google ToS prohibits caching photo binaries beyond session scope but
      explicitly allows persisting photo resource names and attribution text.
      Storing the name on VerifiedLocation means capture happens once (at
      place selection) and every future render is a direct CDN image fetch —
      no repeated API calls, no quota risk, no backend cache to invalidate.

      VerifiedLocation is the correct owner (not Stop): the location is the
      "what is this place" concept; the photo represents the place, not the
      event. The same location shape is reused across Stay, Eat, Play, and
      Transit endpoints — one schema change enables all downstream renders.

  - id: D3
    date: 2026-04-20
    decision: Migrate the single getDetails call in LocationInput to the new Place.fetchFields API
    rationale: |
      The legacy PlacesService.getDetails returns photos as PlacePhoto
      instances with an opaque getUrl() method — no persistable string.
      The newer google.maps.places.Place class (same Maps JS loader, same
      API key, same Places library) exposes photos[].name as a stable
      resource name that survives persistence and reconstruction.

      The migration is isolated to handlePredictionSelect in one file. The
      autocomplete prediction flow (AutocompleteService) is untouched —
      autocomplete and details are independent SDK surfaces. Risk surface:
      one callback's shape changes from callback-style to Promise-style;
      tests and manual QA cover.

  - id: D4
    date: 2026-04-20
    decision: Capture photos for all verified locations in PR 1; render only on Stay banner
    rationale: |
      Capture happens in a single code path (handlePredictionSelect). Gating
      capture by stop type adds conditional logic at the wrong layer — the
      LocationInput doesn't know (and shouldn't know) whether the location
      will end up on a Stay, Eat, Play, or Transit. Rendering is the natural
      decision point: PR 1 renders only on Stay banners and the form preview;
      PR 2 lights up the map popup and stop card avatars without re-touching
      saved records or re-fetching photos.

      Cost: one extra Places "photos" SKU per stop create regardless of
      whether PR 1 renders it (~$0.007 per stop, ~$1/year at family scale).
      Negligible tradeoff against the alternative complexity.

  - id: D5
    date: 2026-04-20
    decision: Thumbnail URL constructed client-side; no backend proxy
    rationale: |
      The API key is already referrer-restricted in GCP to
      budget.jaredcarrano.com and localhost:5183 — a scraper can't drain it.
      The bundled key is standard for client-side Places integrations. A
      backend proxy would add a route, a rate-limit surface, and server-side
      GCP billing indirection for no net security improvement under the
      referrer restriction.

      Revisit only if a GCP audit flags abuse or if the referrer restriction
      is lifted for some future reason.

  - id: D6
    date: 2026-04-20
    decision: Attribution rendered as tooltip on hover, not always-visible caption
    rationale: |
      Google's attribution policy accepts in-app attribution proximate to
      the photo; tooltip-on-hover meets this bar. An always-visible caption
      competes with the stop name for visual weight on a 48px thumbnail and
      clutters the banner. If Google policy tightens, we convert the
      tooltip to a caption without a schema change — render decision only.

  - id: D7
    date: 2026-04-20
    decision: No backfill for stops created before this feature ships
    rationale: |
      Backfill would require iterating every stop in every trip for every
      user, issuing a fetchFields call per verified location — moderate
      billing cost and no user-initiated trigger. Release notes document
      the re-select pathway ("edit the stay's address and re-confirm to
      capture a photo") which is discoverable and zero-cost.

      At 2-user scale, the historical stop count is small; if backfill
      turns out to be wanted, a one-shot admin script is trivial to write
      and easier to reason about than a background job.

  - id: D8
    date: 2026-04-20
    decision: Two-PR rollout gated on PR 1 visual quality
    rationale: |
      Photo quality from Google Places is uneven — a famous hotel returns
      great shots, a small restaurant returns the sidewalk, some addresses
      return nothing. PR 1 on the Stay banner is the highest-leverage,
      lowest-risk surface: Stays skew toward well-photographed venues,
      banner real estate accommodates imperfect photos.

      After PR 1 has been in use for ~2 weeks on real trips, PR 2 makes
      a data-informed decision about whether Eat/Play avatars and map
      popup photos are improvements or clutter. Capture in PR 1 means
      PR 2 has no dependency beyond render-layer changes.

  - id: D11
    date: 2026-04-20
    decision: Stay form shows a candidate-photo picker strip, replacing the single preview
    rationale: |
      Place.fetchFields already returns up to 10 photos in one billing event
      — today we discard nine of them. Google's index-0 photo is usually
      good but occasionally bad (sidewalk shot, bad angle, blurry). A
      picker lets users fix bad defaults without a second fetch.

      Design:
      - Replaces the single 96px preview with a 72px horizontal strip of
        candidate tiles in the Stay form.
      - Selected tile has a visible ring; click swaps form-local
        photoName/photoAttribution.
      - Candidates live in form state only (never persisted).
      - Edit-an-existing-stay falls back to the 96px preview when no
        candidates are in memory; user re-selects via "Change" to repopulate.

      Cost: zero. fetchFields already pays for all returned photos.
      Storage: zero new persisted fields — we still persist only the chosen
      photoName + photoAttribution on VerifiedLocation.

      Tradeoff: form gets busier vertically when the strip is visible.
      Bounded by Google's 10-photo cap; 10 × 72px + gaps fits in the Stay
      form width with horizontal scroll as a safety net.

      Candidate tiles do NOT open the hero modal — click is reserved for
      select. The hero modal stays available on the Stay banner after save.

  - id: D10
    date: 2026-04-20
    decision: Hero modal always-on, built into PlacePhotoThumb (not per-caller opt-in)
    rationale: |
      Every surface where we render a place photo has the same payoff for a
      click-to-enlarge interaction — a user who sees a hotel shot on a Stay
      banner and wants a better look shouldn't have to care whether the
      surface happens to support it.

      Building the modal into PlacePhotoThumb means:
      - One place to wire it (no prop drilling or per-caller opt-in).
      - PR 2's Eat/Play card avatars and Map popup photos get it for free.
      - Uniform behavior (same keyboard shortcuts, same attribution layout,
        same image quality) across every photo surface in the app.

      Tradeoff: slightly larger PlacePhotoThumb component. Mitigated by the
      modal being a small self-contained block (<40 lines) using Mantine's
      Modal + useDisclosure primitives already used elsewhere in the app.

      Cost: one extra v1/.../media fetch per modal open (~$0.007). At family
      scale, negligible (A-09).

  - id: D9
    date: 2026-04-20
    decision: Bundle AutocompleteService → AutocompleteSuggestion migration into PR 1
    rationale: |
      Google deprecated AutocompleteService for new customers on 2025-03-01.
      The console warning surfaced during Phase 2 manual testing of the
      fetchFields migration:

        "As of March 1st, 2025, google.maps.places.AutocompleteService is not
         available to new customers. Please use AutocompleteSuggestion instead."

      Bundling is strictly additive — the two APIs share one file
      (LocationInput.tsx) and one SDK surface, so one test pass covers both.
      There is also a billing win: when a session token is passed to
      AutocompleteSuggestion.fetchAutocompleteSuggestions and the selected
      Place is produced via PlacePrediction.toPlace(), the token automatically
      rides the first fetchFields call, collapsing what Phase 2 left as two
      billing sessions per stop into one.

      Tradeoff: larger diff than "pure photo capture." Mitigation: all changes
      remain in LocationInput.tsx; the outward contract (StopLocation produced,
      callers unchanged) is unchanged.

# =============================================================================
# PHASE 1: Shared Types
# =============================================================================
phase_1_schema:
  status: completed
  description: |
    Add two optional string fields to VerifiedLocation in shared/types/index.ts.
    No backend work, no Zod change, no migration.

  tasks:
    - id: "1.1"
      task: Extend VerifiedLocation with photoName and photoAttribution
      status: completed

    - id: "1.2"
      task: Verify no Zod schema regression
      status: completed
      actual: |
        The backend DOES carry a strict Zod discriminated-union for stop
        locations (backend/src/validators/stopValidators.ts). By default
        Zod strips unknown keys on `z.object()` — so photoName and
        photoAttribution would have been silently dropped by the
        create/update endpoints without a schema extension. Added both
        as optional fields (photoName 500 char cap, photoAttribution 300
        char cap) to the verifiedLocationSchema. Integration tests
        (tripStops.test.ts) continue to pass.

# =============================================================================
# PHASE 2: Capture — LocationInput Migration to Place.fetchFields
# =============================================================================
phase_2_capture:
  status: completed
  description: |
    Replace the single legacy PlacesService.getDetails call in LocationInput
    with google.maps.places.Place.fetchFields. Preserves the autocomplete
    flow unchanged; only the details-fetch code path migrates.

  tasks:
    - id: "2.1"
      task: Migrate handlePredictionSelect to Place.fetchFields
      status: completed
      details: |
        In frontend/src/components/trips/agenda/LocationInput.tsx:126,
        replace the PlacesService.getDetails callback shape with:

        const handlePredictionSelect = async (placeId: string) => {
          if (places.status !== 'ready') return;
          const place = new places.google.maps.places.Place({ id: placeId });
          try {
            await place.fetchFields({
              fields: ['displayName', 'formattedAddress', 'location', 'photos'],
            });
          } catch (err) {
            console.warn('Place.fetchFields failed', err);
            return;
          }
          if (!place.location) return;

          const photo = place.photos?.[0];
          const attribution = photo?.authorAttributions?.[0]?.displayName ?? undefined;

          const verified: VerifiedLocation = {
            kind: 'verified',
            label: place.displayName ?? place.formattedAddress ?? '',
            address: place.formattedAddress ?? '',
            lat: place.location.lat(),
            lng: place.location.lng(),
            placeId,
            photoName: photo?.name,
            photoAttribution: attribution,
          };
          onChange(verified);
          setQuery(verified.label);
          sessionTokenRef.current =
            new places.google.maps.places.AutocompleteSessionToken();
        };

        The placesServiceRef (legacy PlacesService) becomes unused in this
        file — delete its ref, init, and type import.

        Autocomplete flow (AutocompleteService) is unchanged.

    - id: "2.2"
      task: Verify SDK type coverage for google.maps.places.Place
      status: completed
      actual: |
        @types/google.maps 3.64.0 (current latest) covers Place and
        fetchFields. It does NOT expose Photo.name — that resource-name
        string is present at runtime on v=weekly but absent from the types.
        Worked around with a narrow `unknown` cast + string guard; no
        `any`, and a comment explains the gap. No dependency bump needed.

    - id: "2.3"
      task: Manual verification — photo name captured end-to-end
      status: pending_user_qa
      details: |
        Local dev, with real Places API key:
        - Open "Add Stay", search "Hotel Arts Barcelona", select
        - Confirm the saved Stay's location.photoName looks like
          `places/ChIJ.../photos/ATJ...`
        - Confirm location.photoAttribution is populated (hotel-class
          venues have attributions; residential addresses may not)
        - Search "1600 Pennsylvania Ave, Washington, DC" — verify photoName
          present (high-profile public building)
        - Search a random residential address — verify photoName absent
          without errors

# =============================================================================
# PHASE 3: Render — PlacePhotoThumb Helper Component
# =============================================================================
phase_3_thumb_component:
  status: completed
  description: |
    A shared, size-agnostic photo thumbnail component used by Stay banner,
    Stay form preview, and (in PR 2) Map popup and Stop card avatar.

  tasks:
    - id: "3.1"
      task: Create PlacePhotoThumb.tsx
      status: completed
      details: |
        New file: frontend/src/components/trips/agenda/PlacePhotoThumb.tsx

        interface Props {
          photoName: string;
          attribution: string | null;
          size: number;         // px, square
          alt: string;
          radius?: MantineRadius;  // default 'sm'
        }

        export function PlacePhotoThumb({
          photoName, attribution, size, alt, radius = 'sm'
        }: Props) {
          const key = import.meta.env.VITE_GOOGLE_PLACES_API_KEY as string | undefined;
          if (!key) return null;
          const src = `https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=${size * 2}&key=${key}`;
          const tooltip = attribution ? `Photo: ${attribution}` : 'Photo via Google';
          return (
            <Tooltip label={tooltip} withArrow>
              <Image
                src={src}
                alt={alt}
                w={size}
                h={size}
                radius={radius}
                fit="cover"
              />
            </Tooltip>
          );
        }

        - maxWidthPx = size * 2 for retina.
        - Tooltip satisfies Google's attribution display requirement.
        - Returns null when key is absent — caller falls back to icon.

    - id: "3.2"
      task: Unit test for PlacePhotoThumb
      status: deferred
      actual: |
        Frontend has no vitest / testing-library setup today; the plan
        explicitly allowed "skip this test and cover via PR 1 manual QA
        (thumbnail render is not a money/auth path)". Taking that path.
        Revisit if frontend test infrastructure lands.
      details: |
        New file: frontend/src/components/trips/agenda/__tests__/PlacePhotoThumb.test.tsx

        Assertions:
        - URL construction: photoName "places/abc/photos/xyz", size 48
          produces src matching /maxWidthPx=96.*&key=.+/
        - Null attribution renders tooltip text "Photo via Google"
        - Non-null attribution renders tooltip text "Photo: Hotel Arts Barcelona"
        - Undefined key (mock import.meta.env) returns null from render

        Use vitest + @testing-library/react — matches existing frontend test
        infrastructure if any; otherwise skip this test and cover via PR 1
        manual QA (per project's risk-based testing philosophy; thumbnail
        render is not a money/auth path).

    - id: "3.3"
      task: Add hero modal (REQ-016/017/018/019, D10)
      status: completed
      details: |
        Wrap the thumbnail Image in an UnstyledButton so it's keyboard- and
        mouse-clickable. On click, open a Mantine Modal that renders the
        same photo at maxWidthPx=1600.

        State: useDisclosure() from @mantine/hooks (already used elsewhere
        in the app — see BadgeDetailModal.tsx, ProjectFormModal.tsx).

        Modal structure:
          <Modal opened={opened} onClose={close} size="xl" centered title={alt}>
            <Stack>
              <Image
                src={largeSrc}
                alt={alt}
                fit="contain"
                style={{ maxHeight: '80vh' }}
              />
              <Text size="xs" c="dimmed" ta="right">
                {captionText}
              </Text>
            </Stack>
          </Modal>

        - largeSrc reuses the same photoName; only maxWidthPx differs.
        - Modal title = alt gives context ("Hotel Arts Barcelona").
        - Attribution caption is always visible below the image (REQ-018)
          — stricter than the tooltip-only bar on thumbnails, preemptively
          compliant with any Google policy tightening.
        - No new schema, no backend, no additional persistent state.

        Accessibility: UnstyledButton gives the role=button + keyboard
        affordance. aria-label="View {alt} photo full size". Modal gets
        ESC + click-outside + close button for dismissal (Mantine defaults).

