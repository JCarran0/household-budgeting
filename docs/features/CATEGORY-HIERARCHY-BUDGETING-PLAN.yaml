feature: Category Hierarchy in Budgeting & Reports
brd: docs/features/CATEGORY-HIERARCHY-BUDGETING-BRD.md
status: shipped
created: 2026-04-17
last_updated: 2026-04-19
shipped_summary: |
  Canonical rollup helpers (buildCategoryTreeAggregation, classifyTreeBudgetState,
  isTreeUnused, isTreeOverBudget) live in shared/utils/budgetCalculations.ts.
  Reports → Budget Performance refactored to max-rule rollup; Spending Composition
  widget added. Chatbot tools (get_spending_by_category, get_budget_summary)
  apply rollup with aggregation_level field. BudgetComparison.tsx migrated from
  additive to max. calculateEnhancedParentTotals deprecated/deleted.
  See CLAUDE.md architecture decisions table (2026-04 entry).

overview: |
  Codify parent/child budget rollup semantics in shared utilities and apply them
  consistently across Reports → Budget Performance, the chatbot data tools, and
  the dashboard. Fix the bug where parent-budgeted / child-categorized spending
  appears as both "Unused Budget" and "Unbudgeted Spending". Add a Spending
  Composition widget to serve the leaf-level forensic intent without polluting
  variance widgets.

  Adopt max(parent, sum(children)) as the canonical effective-budget rule for
  both income and expense parents (BRD REQ-002 v1.3). This is a behavior change
  from what BudgetComparison.tsx currently ships (additive); a migration check
  is included in Phase 2 to surface affected trees in user data.

phases:

  - phase: 1
    name: Canonical Rollup Utilities
    status: pending
    goals:
      - Land canonical, single-source-of-truth rollup helpers in shared/utils
      - Implement max-rule rollup (BRD REQ-002) uniformly for income and expense
    tasks:
      - Add buildCategoryTreeAggregation(categories, budgets, actuals, options) to shared/utils/budgetCalculations.ts — returns Map<parentId, { effectiveBudget, effectiveActual, directBudget, directActual, childBudgetSum, children: ChildAgg[] }>. effectiveBudget = max(directBudget, childBudgetSum) per REQ-002. effectiveActual = directActual + sum(child actuals) per REQ-004. Options include excludeSavings, excludeTransfers, excludeHidden.
      - Add classifyTreeBudgetState(tree) returning 'parent_budgeted' | 'child_budgeted_only' | 'unbudgeted' to support REQ-010's three-case rule. Note: under max rule, "parent_budgeted" means directBudget > 0 regardless of child budgets.
      - Add isTreeUnused(tree, threshold) and isTreeOverBudget(tree) classification helpers for the variance widgets
      - Mark calculateEnhancedParentTotals as @deprecated in JSDoc — its additive logic now contradicts the max rule. Currently has zero UI callers; only unit tests reference it. Slated for deletion in Phase 8.
      - Unit tests for each new helper covering: parent-only budget, child-only budgets, both levels (must equal max, NOT sum), no budgets, savings exclusion, transfer exclusion, income vs expense parents (math identical, only variance display differs)
      - Drift-prevention test asserting effectiveBudget never exceeds max(directBudget, childBudgetSum) — guards against accidental regression to additive

  - phase: 1.5
