decisions_log:
  - date: 2026-04-17
    decision: Unbudgeted Spending uses three-case rule (parent-budgeted / child-budgeted-only / unbudgeted)
    rationale: Parent-level budget signals "treat as a pool" — covers whole tree. Child-level budget signals deliberate granularity — unbudgeted siblings should surface. Single-rule approaches lose this signal. (Resolves OQ-001)
  - date: 2026-04-17
    decision: No "view leaves" toggle on variance widgets
    rationale: Variance and forensic intents are served by separate widgets (variance per §2.2, Spending Composition per §2.3) rather than one widget in two modes. Avoids deferring the design decision onto the user every visit. (Resolves OQ-002)
  - date: 2026-04-17
    decision: Consistently Over-Budget uses effective_actual(M) > effective_budget(M) at parent level
    rationale: Single-child overspends inside an otherwise-under tree will no longer flag — correct behavior since the user's plan was the parent total. Acknowledged as an intentional behavior change. (Resolves OQ-003)
  - date: 2026-04-17
    decision: Chatbot tool responses get an aggregation_level field AND a system prompt update
    rationale: System prompts degrade on long contexts; structural field is cheap, self-documenting, and gives a hook for a future level=leaf tool variant. (Resolves OQ-004)
  - date: 2026-04-17
    decision: Drill-down defaults to non-zero children with "show all" affordance
    rationale: Default forensic intent ("where did the money go?") wants signal, not noise. Show-all covers the planning intent. (Resolves OQ-005)
  - date: 2026-04-17
    decision: SUPERSEDED — initially adopted additive rollup (v1.2)
    rationale: |
      Spike findings: (a) BudgetComparison.tsx ships inline additive rollup for both types since at least commit a6e8a21; (b) shared util calculateEnhancedParentTotals also additive but has zero UI callers; (c) AI-USER-STORIES.md §"Hierarchical Budget Display" documents max-for-expense but never matched shipped code; (d) the Travel bug doesn't depend on this resolution. Original recommendation was pragmatic (least-disruption) — see superseding decision below for the principled outcome.

  - date: 2026-04-17
    decision: Adopt max(parent, sum(children)) rollup uniformly for income and expense parents (BRD REQ-002 v1.3)
    rationale: |
      User pushback prompted re-examination. The cap mental model — "parent budget is the umbrella for the tree; children are subdivisions within it" — matches user intent for both income and expense. Concrete test cases:
        Expense: $5k Travel + $2k Flights → max gives $5k cap (correct); additive gives $7k phantom budget.
        Income: $80k Salary parent + $70k Base + $10k Bonus → max gives $80k target (correct); additive gives $160k nonsense.
      The original income/expense split in AI-USER-STORIES.md conflated variance interpretation (income: under = bad; expense: over = bad — REQ-002a, orthogonal) with aggregation math (should be uniform). Every comparable budgeting app (YNAB, Monarch, Copilot, Lunch Money) treats parent as cap, not as additional bucket. The "no complaints on additive" pragmatic argument is weak given the app has 2 users and one of them just complained about exactly this surface.
    behavior_change_note: |
      BudgetComparison.tsx currently ships additive. Any tree where the user has both a parent budget and at least one child budget in the same month will see its effective parent total shrink from (parent + sum(children)) to max(parent, sum(children)). Phase 1.5 (migration audit) surfaces these trees before the change ships so the user can confirm intent.
    spike_artifacts:
      - shared/utils/budgetCalculations.ts:361 — current additive comment "additive approach for both income and expense" (to be replaced)
      - frontend/src/components/budgets/BudgetComparison.tsx:197-205 — current inline additive rollup (to be migrated in Phase 8)
      - git commit a6e8a21 — origin of the additive implementation
      - AI-USER-STORIES.md §"Hierarchical Budget Display" — partially aligned with v1.3 (max-for-expense); superseded entirely; cleanup task in Phase 8
