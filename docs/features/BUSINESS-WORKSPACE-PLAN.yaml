# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Layered: ship and verify the switcher (empty business workspace) before
    any statement logic exists. Each phase is independently demoable.
  sequence:
    - phase: 0 — Shared Types
      reason: Imported everywhere
    - phase: 1 — Workspace backend
      reason: Membership/switch/create; verifiable via API + tests
    - phase: 2 — Workspace frontend
      reason: Switch into an empty business workspace end-to-end
    - phase: 3 — Business seed
      reason: Business workspace now has its trust-ledger categories
    - phase: 4 — Plaid + transactions (reuse)
      reason: Real Chase data flowing + tagged in the business workspace
    - phase: 5 — Statement service
      reason: The new domain logic; golden-fixture tested in isolation
    - phase: 6 — Statement routes
      reason: HTTP surface + workspace gating
    - phase: 7 — Statement UI + PDF/CSV
      reason: The user-facing deliverable; depends on all above
    - phase: 8 — Isolation fixes
      reason: Can land anytime after Phase 1; grouped here to close REQ-007
    - phase: 9 — Docs & manual validation
      reason: Index + real-data money validation against payment 068

# =============================================================================
# RELEASE GROUPING (PRs)
# =============================================================================
release_grouping:
  principle: |
    Every push to main auto-releases. This feature is DARK-LAUNCHABLE: the
    only thing that makes any of it user-visible is a business workspace
    EXISTING. Until one is created (the deliberate Activation step), the
    switcher auto-hides (REQ-004 ≤1 workspace), the create-workspace endpoint
    stays admin-only and unsurfaced, and all business code is dormant and
    unreachable. So each PR below is independently releasable to production
    with zero half-exposed UI and no behavior change for the personal app.
    "Go live" is a DATA operation (create the OoT workspace), not a deploy.

  prs:
    - id: PR1
      title: Workspace foundation (backend, dark)
      phases: [0, 1, 3]
      releasable_because: |
        Backend-only and behavior-preserving. The backfill keeps existing
        auth identical (workspaceIds=[familyId]); new endpoints exist but the
        create-workspace endpoint is admin-only and unsurfaced, so no second
        workspace appears. Fully dormant.
      intra_pr_ordering: |
        3.1/3.2 (business seed fn) MUST precede 1.4 (createWorkspace calls it).
        Backfill (1.1) MUST land atomically with the membership-check change
        (1.2) — they cannot deploy separately or auth breaks for all users.
      risk: HIGHEST — modifies authMiddleware/JWT for every existing user.
        Give it its own deploy + verification window; do not stack with PR2.

    - id: PR2
      title: Switcher + nav/route gating (frontend, dark)
      phases: [2]
      releasable_because: |
        Switcher is hidden at ≤1 workspace; personal nav/routes unchanged.
        Dormant until a business workspace exists. Requires PR1 deployed
        (calls /workspaces and /auth/switch-workspace).

    - id: PR3
      title: Business Plaid + transactions (reuse)
      phases: [4]
      status: done
      releasable_because: |
        No production code change — a test + plan/decision update only. The
        auto-cat rule seed was DROPPED as unsafe (D12); reuse is proven by an
        automated partitioning test (4.4). Manual Plaid/UI smoke checks (4.1,
        4.3) move to the Activation step. Trivially releasable.

    - id: PR4
      title: Statement engine + API (backend, dark)
      phases: [5, 6]
      releasable_because: |
        Routes are gated to business workspaces and no UI calls them yet.
        Pure generator is golden-fixture tested. Dormant.

    - id: PR5
      title: Statement UI + PDF/CSV (frontend)
      phases: [7]
      releasable_because: |
        Only reachable inside a business workspace, which has not been
        activated. Adds @react-pdf/renderer (lazy-loaded). The deliverable.

    - id: PR6
      title: Isolation fixes (REQ-007)
      phases: [8]
      releasable_because: |
        Independent; can land any time after PR1.
      behavior_change_to_call_out: |
        8.1 changes the chatbot cost key (chatbot_costs_{month} →
        chatbot_costs_{familyId}_{month}), orphaning the current global
        counter so the family's running monthly chatbot total resets to $0
        once on deploy. Harmless for a 2-user app but do it intentionally.

    - id: ACTIVATION
      title: Go live (data operation, NOT a code PR)
      phases: [9]
      action: |
        After PR5 is in production: create the OoT business workspace
        (Admin action per D10 or the seed script), enter the static
        client/business header, connect the Chase business account, and
        validate a generated statement against the real payment 068 numbers.
        This is the only step that makes the feature visible.

  release_sequence: [PR1, PR2, PR3, PR4, PR5, PR6, ACTIVATION]
  notes: |
    PR6 may be slotted anywhere after PR1. PR3 is optional-merge into PR1.
    Hold ACTIVATION until PR5 ships — creating the workspace before the
    statement UI exists would expose a business workspace that can tag
    transactions but cannot produce its one deliverable.

# =============================================================================
# NOTES & FOLLOW-UPS
# =============================================================================
notes:
  brd_open_questions_resolved_in_plan:
    - PDF fidelity → D9 + 7.3: @react-pdf/renderer document mirroring page 1
    - Billable sub-types fixed vs configurable → fixed set in the seed (3.1);
      revisit if a second charge family appears
    - Workspace switcher mechanics → D2: active workspace in JWT, re-issued
      on switch (no server session)
    - Provisioning UX → D10: backend endpoint surfaced on Admin (or script)
  still_open_for_implementation:
    - Disbursement date vs. bank-posted date — confirm Plaid transaction date
      is an acceptable "KDP Disbursement Date"; if not, capture a separate
      field during tagging
    - Plaid item billing — confirm incremental cost of the second item before
      connecting in production
    - Statement editing/voiding — none in v1 (immutable); revisit if a
      correction is ever needed (would consume/skip a payment number)
  explicitly_excluded_carried_from_brd:
    - Payment automation (Stripe/ACH origination) — fiduciary risk; not built
    - Multi-client sub-ledgers — single optional clientId tag seam only
    - Manual transactions, revenue-sweep redesign, tax/accountant export —
      Phase 2 of the product, specced separately
