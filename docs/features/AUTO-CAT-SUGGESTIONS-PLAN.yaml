# =============================================================================
# Auto-Categorization Rule Suggestions — Implementation Plan
# =============================================================================
# BRD: docs/features/AUTO-CAT-SUGGESTIONS-BRD.md
# Status: Not Started
# Last Updated: 2026-05-04
# =============================================================================

overview:
  description: |
    Implementation plan for the deterministic auto-categorization rule
    suggestion feature. Adds a "Suggested Rules" section to the top of
    the Auto Cat tab on the Categories page. Backend scans active
    transactions, clusters them by a normalized merchant key, and surfaces
    suggestions when the user has consistently categorized the same
    cluster ≥80% of the time. One-click rule creation applies the rule
    to matching uncategorized transactions immediately.

    No LLM, no Anthropic dependency, no new infrastructure.

  key_files:
    brd: docs/features/AUTO-CAT-SUGGESTIONS-BRD.md
    shared_types: shared/types/index.ts
    transaction_reader: backend/src/services/transactionReader.ts
    auto_categorize_service: backend/src/services/autoCategorizeService.ts
    auto_categorize_routes: backend/src/routes/autoCategorize.ts
    auto_categorization_component: frontend/src/components/categories/AutoCategorization.tsx
    api_client: frontend/src/lib/api/autoCategorize.ts
    categories_page: frontend/src/pages/Categories.tsx

# =============================================================================
# DECISIONS LOG
# =============================================================================
decisions:
  - id: D1
    date: 2026-05-04
    decision: Deterministic clustering — no LLM
    rationale: |
      The rule that gets created is a string-pattern auto-cat rule. Smarter
      LLM-based clustering would be lost on serialization. Determinism is
      cheap, instant, explainable, and uses the same matching shape as
      the rule itself, so suggestion previews equal real match counts.

  - id: D2
    date: 2026-05-04
    decision: Match the auto-cat rule field set — userDescription, merchantName, name
    rationale: |
      autoCategorizeService.ts (post-dce0615) tests rule patterns against
      these three fields in this order. The suggestion engine uses the same
      three fields when computing pending-uncategorized-match counts, so
      "Preview matches: 3" today equals "Categorized 3 transactions" on
      Create. NOTE: the BRD currently lists "name / originalDescription /
      merchantName" — the implementation truth is the three fields named
      here, and the BRD should be updated for accuracy when convenient.

  - id: D3
    date: 2026-05-04
    decision: Thresholds — 3 categorized matches, 80% agreement, 180-day window
    rationale: |
      For a 2-user app, 2 matches is too noisy (one impulse-buy session
      copy-pasted). 3 + 80% means near-unanimous at small N. 180 days
      catches monthly/quarterly recurrers without being haunted by stale
      categories from years past.

  - id: D4
    date: 2026-05-04
    decision: Synchronous on-demand scan, no cache
    rationale: |
      ~10K transactions across 2 users = sub-100ms work. Pre-computation
      adds invalidation complexity for negligible UX gain. Add a cache
      layer only if scans exceed ~200ms.

  - id: D5
    date: 2026-05-04
    decision: Per-user localStorage dismissals
    rationale: |
      Same pattern as useDismissedParentIds in BvA. Dismissal is a UI
      preference; the rule that results from a Create is server-side and
      shared. Avoids a schema migration for low-stakes state.

  - id: D6
    date: 2026-05-04
    decision: Include transfers in clustering
    rationale: |
      User redirect during design (Q7). Uncategorized transfers ARE valid
      cleanup targets; "Transfer - In" / "Transfer - Out" are exactly the
      kind of recurring high-confidence cluster the feature should catch.
      Transfers' exclusion from spending/income aggregations is orthogonal.

  - id: D7
    date: 2026-05-04
    decision: Auto-apply on rule creation
    rationale: |
      The user's stated intent in clicking "Create rule" is to clean up
      the pending matches. Splitting into "create rule" and "now click to
      apply" would be hostile UX. The toast count reflects actual work
      done, not a projection.

  - id: D8
    date: 2026-05-04
    decision: Confirm dialog on category-conflict, no-op on exact duplicate
    rationale: |
      Exact-duplicate (same pattern, same categoryId) means a race; silent
      no-op is right. Different categoryId is a real conflict and surfaces
      a Replace/Cancel dialog so we never silently shadow the user's
      existing rule.

# =============================================================================
# PHASE 1: Shared Types
# =============================================================================
phase_1_types:
  status: not_started
  description: |
    Define the suggestion DTO in shared/types/index.ts. Single new
    interface, no enums or discriminated unions needed.

  tasks:
    - id: "1.1"
      task: Add AutoCatSuggestion + response types to shared/types/index.ts
      status: not_started
      details: |
        interface AutoCatSuggestion {
          normalizedKey: string;          // also the proposed rule pattern
          displayLabel: string;           // human-friendly, e.g. "Lola Pizza"
          topCategoryId: string;
          topCategoryName: string;
          agreementPct: number;           // integer 0–100
          clusterSize: number;            // total categorized matches in window
          topCategoryCount: number;       // matches voting for top category
          pendingMatchCount: number;      // active uncategorized matches
          sampleCategorizedTxnIds: string[]; // up to 5
          pendingTxnIds: string[];        // unbounded (used for preview)
        }

        interface AutoCatSuggestionsResponse {
          suggestions: AutoCatSuggestion[];
          truncated: boolean;             // true if > 10 suggestions exist
          totalSuggestions: number;
        }

# =============================================================================
# PHASE 2: Backend — Merchant Normalization Utility
# =============================================================================
phase_2_normalization:
  status: not_started
  description: |
    Pure function module that derives the normalized merchant key for a
    transaction. Lives in shared/utils so both backend (suggestion engine)
    and tests can use it; no React or DB dependencies.

  tasks:
    - id: "2.1"
      task: Create shared/utils/merchantNormalization.ts
      status: not_started
      details: |
        export function normalizeMerchantKey(
          tx: Pick<Transaction, 'merchantName' | 'name'>
        ): string | null {
          // Returns null when the transaction can't yield a usable key
          // (key < 4 chars, purely numeric, or all source fields empty).
        }

        Algorithm (priority order):
        1. If tx.merchantName is non-empty, lowercase + trim it.
        2. Else fall back to tx.name and apply strips:
           - Leading processor prefixes (case-insensitive):
             SQ *, TST*, TST , PAYPAL *, SP *, PP*, CKE*
           - Trailing store/location noise:
             #\d+ tokens, ` \d{3,}` (store numbers),
             trailing 1–2 ALL-CAPS tokens of length ≥2 (city/state)
           - Collapse runs of whitespace to single spaces, trim
           - Lowercase
        3. If resulting string is < 4 chars or matches /^\d+$/, return null.

        Export named regex constants so tests can iterate on them without
        the tests reaching into internals.

    - id: "2.2"
      task: Unit tests for merchantNormalization
      status: not_started
      details: |
        File: shared/utils/__tests__/merchantNormalization.test.ts

        Cover:
        - merchantName preferred over name
        - Lowercasing
        - "SQ *LOLA PIZZA" → "lola pizza"
        - "TST* JOES BAR 4421" → "joes bar"
        - "STARBUCKS #1234 BROOKLYN NY" → "starbucks"
        - "AMZN Mktp US*RT4ABC" → "amzn mktp us" (left intact when name is the source)
        - "1234" → null (purely numeric)
        - "AB" → null (too short)
        - empty merchantName + empty name → null
        - whitespace collapse

# =============================================================================
# PHASE 3: Backend — Suggestion Engine Service
# =============================================================================
phase_3_suggestion_service:
  status: not_started
  description: |
    Pure service that builds suggestions from transactions, categories,
    and existing rules. Stateless; computed per-request.

  tasks:
    - id: "3.1"
      task: Create backend/src/services/autoCatSuggestionService.ts
      status: not_started
      details: |
        Constructor receives:
        - dataService (for getCategories, getTransactions per familyId)
        - autoCategorizeService (for existing rules)

        Public method:

        async getSuggestions(familyId: string): Promise<AutoCatSuggestionsResponse>

        Algorithm:
        1. const categorized = (await transactionReader.getActiveTransactions(familyId))
             .filter(t => !t.pending)
             .filter(t => t.categoryId)
             .filter(t => isWithinDays(t.date, 180));

        2. const uncategorized = (await transactionReader.getActiveTransactions(familyId))
             .filter(t => !t.pending)
             .filter(t => !t.categoryId);
           // No time bound on uncategorized — the rule should sweep up old ones too.

        3. For each transaction, compute normalizeMerchantKey(t). Drop nulls.

        4. Group categorized by normalized key. Drop groups with size < 3.

        5. For each surviving group:
           - Tally categoryId counts.
           - topCategoryCount / clusterSize = agreementPct.
           - Drop if agreementPct < 80.

        6. Build a parallel index of uncategorized by normalized key.
           For each surviving categorized group:
           - pendingMatchCount = uncategorized[key]?.length ?? 0.
           - Drop if pendingMatchCount < 1.

        7. Existing-rule dedup:
           - For each active auto-cat rule, normalize each pattern via
             a lighter "lowercase + trim" pass (rule patterns aren't
             merchant strings, so the processor-prefix strip would be
             wrong; use a dedicated normalizeRulePattern() variant).
           - If any normalized rule pattern includes the cluster's
             normalized key, OR the cluster's key includes any normalized
             rule pattern, drop the cluster. (Either direction means the
             user's existing rule already governs this merchant.)

        8. Sort survivors by pendingMatchCount desc, tie-break by
           clusterSize desc.

        9. Build display label:
           - Take the most common original merchantName among the
             cluster's transactions (or, if all null, the most common
             raw name). Title-case it. This is what shows on the card.

        10. Truncate to 10 results, return totalSuggestions + truncated.

        11. Log structured event auto_cat_suggestions.scan with
            {familyId, totalCategorizedScanned, totalUncategorizedScanned,
             clustersFound, suggestionsReturned, durationMs}.

    - id: "3.2"
      task: Add normalizeRulePattern() helper in merchantNormalization.ts
      status: not_started
      details: |
        Different from normalizeMerchantKey(): rule patterns are
        user-typed and shouldn't have processor-prefix or store-number
        strips applied. Just lowercase + trim + collapse whitespace.
        Reused at suggestion-time and at rule-creation collision check.

    - id: "3.3"
      task: Register the service
      status: not_started
      details: |
        Wire into backend/src/services/index.ts (or wherever the existing
        service singletons are constructed). Inject dataService and
        autoCategorizeService.

    - id: "3.4"
      task: Unit tests for AutoCatSuggestionService
      status: not_started
      details: |
        File: backend/src/services/__tests__/autoCatSuggestionService.test.ts

        Use a fake dataService + fake autoCategorizeService. No mocks
        of the algorithm itself.

        Cases:
        - Empty inputs → empty suggestions
        - 3 Lola Pizza categorized as Restaurants, 1 uncategorized
          → 1 suggestion, agreement 100%
        - 3 Lola Pizza categorized (2 Restaurants, 1 Coffee), 1 pending
          → no suggestion (66% < 80%)
        - 4 categorized (3 Restaurants, 1 Coffee), 1 pending
          → no suggestion (75% < 80%)
        - 5 categorized (4 Restaurants, 1 Coffee), 1 pending
          → suggestion (80% qualifies)
        - 3 categorized but 0 pending → no suggestion
        - Cluster covered by existing rule "lola" → suppressed
        - Transfer cluster (3 Chase->BoA categorized as Transfer-Out,
          1 pending) → surfaces as suggestion
        - Pending transactions in source data → excluded from both sides
        - Transactions older than 180 days excluded from categorized
          side, but old uncategorized still counted on pending side
        - Sort order: 5-pending cluster sorts above 2-pending cluster
        - Truncation: 12 valid clusters → 10 returned, truncated=true,
          totalSuggestions=12

# =============================================================================
# PHASE 4: Backend — API Route
# =============================================================================
phase_4_routes:
  status: not_started
  description: |
    Single GET endpoint exposed under the existing /api/v1/categories
    namespace (sibling to auto-cat rule endpoints).

  tasks:
    - id: "4.1"
      task: Add GET /api/v1/categories/auto-cat/suggestions
      status: not_started
      details: |
        Router file: backend/src/routes/autoCategorize.ts (or wherever the
        existing auto-cat routes live — confirm during impl).

        - Auth middleware: required (familyId from session)
        - No query params
        - Calls autoCatSuggestionService.getSuggestions(familyId)
        - Returns AutoCatSuggestionsResponse
        - Errors: 401 unauthenticated, 500 on internal error (logged)

    - id: "4.2"
      task: Augment rule-creation log line with source field
      status: not_started
      details: |
        Existing POST /api/v1/autocategorize/rules log line should accept
        an optional source: 'manual' | 'suggestion' field (default
        'manual'). Frontend passes 'suggestion' when the create comes
        from a suggestion card (see Phase 6.4).

        Body shape addition:
          { source?: 'manual' | 'suggestion' }
        — accepted but not stored on the rule itself; only used for
        logging. Validate via Zod with a default.

    - id: "4.3"
      task: Route-level integration test
      status: not_started
      details: |
        File: backend/src/routes/__tests__/autoCategorize.suggestions.test.ts

        - 401 when unauthenticated
        - 200 + empty list when no eligible clusters
        - 200 + populated list with seeded data exercising one happy path

# =============================================================================
