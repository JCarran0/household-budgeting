# =============================================================================
# PHASE 6: Frontend — Suggested Rules Section UI
# =============================================================================
phase_6_ui:
  status: not_started
  description: |
    All UI lives inside or above frontend/src/components/categories/
    AutoCategorization.tsx. Keep it modular — new files for the section,
    card, preview, and dismissal hook so AutoCategorization.tsx doesn't
    bloat past its size budget.

  tasks:
    - id: "6.1"
      task: Create useDismissedAutoCatSuggestions hook
      status: not_started
      details: |
        File: frontend/src/components/categories/useDismissedAutoCatSuggestions.ts

        - localStorage key: 'autoCatSuggestionsDismissed'
        - Stores Set<string> of normalized keys
        - API: { dismissed: Set<string>, dismiss(key), undismiss(key) }
        - Mirror the shape of useDismissedParentIds from BvA.
        - Add a JSDoc note: "Per-user, NOT shared. See SECURITY note in
          BvA's useDismissedParentIds for the same rationale."

    - id: "6.2"
      task: Create SuggestedRulesSection component
      status: not_started
      details: |
        File: frontend/src/components/categories/SuggestedRulesSection.tsx

        - Calls useQuery(['autoCatSuggestions'], api.getAutoCatSuggestions)
          with staleTime 5 * 60 * 1000, refetchOnWindowFocus: true.
        - Filters out dismissed keys client-side.
        - If filtered list is empty → render nothing (no empty state).
        - Else: section header "Suggested Rules" + "Refresh" icon button
          that calls queryClient.invalidateQueries(['autoCatSuggestions']).
        - Renders up to 10 SuggestedRuleCard components.
        - "Show N more" button if filteredCount > 10 — expands to all.
        - Sorts by pendingMatchCount desc (server already does this; just
          preserve order).

    - id: "6.3"
      task: Create SuggestedRuleCard component
      status: not_started
      details: |
        File: frontend/src/components/categories/SuggestedRuleCard.tsx

        Props: AutoCatSuggestion, onCreate, onDismiss.

        Layout (Mantine Card):
        - Title: displayLabel
        - Body line 1: "You categorize this as {topCategoryName}
          {agreementPct}% of the time ({topCategoryCount} of {clusterSize}
          past matches in the last 180 days)"
        - Body line 2: "Would categorize {pendingMatchCount} pending
          uncategorized {pluralize('transaction', pendingMatchCount)}"
        - Actions row: [Preview matches] (toggles inline expansion),
          [Create rule] (primary), [Dismiss ✕] (subtle/icon, top-right)
        - Preview expansion: collapsible panel listing pending
          transactions (date, name, amount) and a sample of categorized
          transactions for confirmation. Fetched via existing
          api.getTransactions({ ids: [...] }) call.

    - id: "6.4"
      task: Wire the Create rule action with collision handling
      status: not_started
      details: |
        Mutation flow on Create click:

        1. Look up active rules (already in cache via existing
           AutoCategorization queries — reuse).
        2. For each active rule, normalize patterns via shared
           normalizeRulePattern() helper. Find any rule whose normalized
           pattern equals the suggestion's normalizedKey.
        3. Branch:
           a. No match → call api.createAutoCategorizeRule({
                patterns: [normalizedKey],
                categoryId: topCategoryId,
                matchType: 'contains',
                source: 'suggestion'
              }), then call api.applyAutoCategorizeRules(false,
                pendingTxnIds).
              On success: toast "Rule created. Categorized N transactions.",
              invalidate ['autoCatSuggestions'] and transaction queries.
           b. Match with same categoryId → toast "Rule already exists",
              invalidate ['autoCatSuggestions'] (the suggestion will
              vanish on refetch via dedup).
           c. Match with different categoryId → open Mantine confirm
              modal: "A rule for '{normalizedKey}' already maps to
              {OldCategoryName}. Replace with {topCategoryName}?"
              Replace → api.updateAutoCategorizeRule(id,
                { categoryId: topCategoryId }) + apply, then same
                success toast + invalidations.
              Cancel → no-op, suggestion remains visible.

        4. Auto-clear dismissal entry on successful create (open Q-2
           in the BRD; default behavior is to clean up so re-suggested
           variants of the cluster aren't perma-hidden by an old
           dismissal).

    - id: "6.5"
      task: Mount SuggestedRulesSection at top of Auto Cat tab
      status: not_started
      details: |
        Inside AutoCategorization.tsx, render <SuggestedRulesSection />
        directly above the existing rules table.

        Watch the file's size budget (≤600 LOC for frontend pages —
        this is a component, but keep an eye on it). Prefer extracting
        small helpers into co-located files rather than inflating
        AutoCategorization.tsx itself.

    - id: "6.6"
      task: Component tests for SuggestedRuleCard
      status: not_started
      details: |
        File: frontend/src/components/categories/__tests__/
              SuggestedRuleCard.test.tsx

        - Renders display label, agreement, cluster size, pending count
        - "Create rule" calls onCreate with the suggestion
        - "Dismiss" calls onDismiss with the normalizedKey
        - Preview expansion toggles visibility

    - id: "6.7"
      task: Component test for SuggestedRulesSection — empty + populated
      status: not_started
      details: |
        - Empty suggestions array → renders nothing
        - 3 suggestions, 1 dismissed → renders 2 cards
        - 12 suggestions → renders 10 cards + "Show 2 more" button

# =============================================================================
# PHASE 7: Telemetry
# =============================================================================
phase_7_telemetry:
  status: not_started
  description: |
    Lightweight server-side structured logs only (per BRD §7).

  tasks:
    - id: "7.1"
      task: Emit auto_cat_suggestions.scan from suggestion service
      status: not_started
      details: |
        Already specified in 3.1 step 11. Verify it's wired and shows up
        in dev logs with all required fields.

    - id: "7.2"
      task: Emit auto_cat_suggestions.rule_created from rule POST handler
      status: not_started
      details: |
        When the rule POST handler receives source='suggestion', additionally
        log auto_cat_suggestions.rule_created with:
        - familyId, normalizedKey (=pattern), categoryId
        - clusterSize, topCategoryCount, agreementPct, pendingMatchCount —
          these aren't on the rule POST body today; either pipe them
          through (preferred) or recompute via the suggestion service
          on success.
        - appliedToTxnCount (from the apply-rules result)
        - replacedExisting: boolean (true if the user took the Replace
          path in Phase 6.4)

        Decision: pipe the metadata through. Add optional fields to the
        rule POST body schema and log them out — they aren't stored on
        the rule.

    - id: "7.3"
      task: Manual log inspection during testing
      status: not_started
      details: |
        Confirm both events fire with correct payloads in dev. No
        automated test for log emission unless trivially cheap.

# =============================================================================
# PHASE 8: Manual Testing & Polish
# =============================================================================
phase_8_testing:
  status: not_started
  description: |
    Manual validation. Run against real production-shape data via
    AWS-LOCAL-SETUP.

  tasks:
    - id: "8.1"
      task: Manual testing checklist
      status: not_started
      details: |
        Discovery:
        - [ ] Section hidden when zero suggestions
        - [ ] Section appears with seeded clusters meeting the bar
        - [ ] Sort order matches pendingMatchCount desc
        - [ ] Top 10 + "Show N more" works

        Card content:
        - [ ] displayLabel renders correctly (title-case, no SQ * etc.)
        - [ ] Agreement percentage matches the math
        - [ ] Cluster size and pending count match underlying data

        Preview:
        - [ ] Pending transactions shown match the rule's actual matches
        - [ ] Categorized sample is representative (capped at 5)

        Create rule (no collision):
        - [ ] Rule appears in the rules table immediately
        - [ ] Pending transactions get categorized (verify via Transactions
              page)
        - [ ] Toast count matches actually-categorized count
        - [ ] Suggestions list refetches and the card disappears

        Create rule (exact-duplicate collision):
        - [ ] No new rule created
        - [ ] Toast: "Rule already exists"
        - [ ] Suggestion vanishes after refetch (dedup catches it)

        Create rule (different-category collision):
        - [ ] Replace dialog appears with correct old/new category names
        - [ ] Replace updates the existing rule
        - [ ] Cancel leaves the existing rule untouched

        Dismiss:
        - [ ] Card disappears immediately
        - [ ] Reload page → card stays gone
        - [ ] Spouse's session (different localStorage) still sees the card
        - [ ] Creating a rule for the same cluster later cleans up the
              dismissal (if Q-2 default kept)

        Refresh:
        - [ ] Manual refresh button forces a re-scan
        - [ ] Tab focus refetches stale data

        Edge cases:
        - [ ] Transfers cluster correctly when consistent
        - [ ] Pending transactions don't appear in either side
        - [ ] Removed transactions don't appear in either side
        - [ ] Hidden categories still produce suggestions
        - [ ] CUSTOM_AMAZON cluster surfaces if pattern is consistent

    - id: "8.2"
      task: Performance sanity check
      status: not_started
      details: |
        With production-shape data (npm run backup:local first),
        time the suggestions endpoint. Target: < 200ms p50.
        If exceeded, profile the normalization pass and the
        existing-rule dedup loop.

    - id: "8.3"
      task: Update CLAUDE.md docs index
      status: not_started
      details: |
        Add to the "Feature BRDs & Plans" table:
        | Auto-Cat Suggestions | AUTO-CAT-SUGGESTIONS-BRD.md |
        AUTO-CAT-SUGGESTIONS-PLAN.yaml |

        Add to "Architecture Decisions (recent)":
        | 2026-05-04 | Auto-cat rule suggestions — deterministic
        merchant clustering on existing user data; 3/80%/180d bar;
        per-user localStorage dismissals | AUTO-CAT-SUGGESTIONS-BRD.md |

# =============================================================================
# IMPLEMENTATION ORDER
# =============================================================================
implementation_order:
  description: |
    Linear, backend-first. Each phase produces something independently
    verifiable so the work is bisectable.
  sequence:
    - phase: 1 — Shared Types
      reason: Types referenced by all later phases
    - phase: 2 — Merchant Normalization Utility
      reason: Pure, testable, foundational; landing it first means the
        suggestion service has a stable dependency
    - phase: 3 — Suggestion Engine Service
      reason: Build and unit-test the algorithm in isolation before
        wiring to HTTP
    - phase: 4 — API Route
      reason: Expose the service so the frontend can consume it
    - phase: 5 — API Client
      reason: Typed methods unblock UI work
    - phase: 6 — Suggested Rules Section UI
      reason: Main user-facing deliverable; depends on everything above
    - phase: 7 — Telemetry
      reason: Slot in once both sides exist
    - phase: 8 — Manual Testing & Polish
      reason: End-to-end verification on real data

# =============================================================================
# NOTES & FOLLOW-UPS
# =============================================================================
notes:
  brd_field_mismatch: |
    BRD §3.5 / §4.1 say "name / originalDescription / merchantName" but
    autoCategorizeService.ts actually searches userDescription /
    merchantName / name. Plan locks to the implementation truth (D2);
    BRD should be updated for accuracy in a follow-up edit.
  open_brd_questions:
    - Q-1 (preview shows categorized sample too?): default in Phase 6.3
      is YES, capped at 5
    - Q-2 (auto-clear dismissal on rule creation?): default in Phase 6.4
      is YES
    - Q-3 (numeric badge on Auto Cat tab itself?): NOT in v1; revisit
      after the section ships
