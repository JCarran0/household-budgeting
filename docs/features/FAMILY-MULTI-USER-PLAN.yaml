      status: not_started
      details: |
        In authRoutes.ts, add:
        PUT /api/v1/auth/profile
          - Body: { displayName: string }
          - Updates user.displayName in users.json
          - Also updates displayName in family.members array
          - Returns updated user object

    - id: P6-T2
