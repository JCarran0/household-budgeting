# ============================================================================
# Risks & Mitigations
# ============================================================================
risks:
  - id: R1
    risk: "Data loss during migration"
    likelihood: low
    impact: critical
    mitigation: |
      Migration preserves old keys until explicit cleanup step.
      Backup script runs before migration. Both filesystem and S3
      adapters support list() for verification.

  - id: R2
    risk: "Stale JWT tokens after migration"
    likelihood: high
    impact: medium
    mitigation: |
      After migration, tokens without familyId are rejected by middleware.
      Users must re-login to get new tokens. Clear frontend localStorage
      and show a "please log in again" message if 401 received.

  - id: R3
    risk: "Large blast radius of Phase 3 refactor"
    likelihood: medium
    impact: high
    mitigation: |
      Phase 3 is mechanical (find-and-replace userId->familyId in method
      signatures and storage keys). Do it service-by-service, running
      TypeScript compilation after each to catch signature mismatches.
      The compiler will flag every call site that passes the wrong type.

  - id: R4
    risk: "Production S3 migration failure"
    likelihood: low
    impact: critical
    mitigation: |
      Test migration against a copy of production data synced locally
      (existing sync-production-data.ts script). Run migration dry-run
      first. S3 adapter supports list() for enumeration.

