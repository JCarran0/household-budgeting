        POST /auth/change-password already exists and uses userId.
        Verify it works correctly with the new model:
        - Does NOT invalidate other family members' tokens
        - Does NOT affect family data
        - User remains logged in with current token
        No changes expected — just verify and add a test.

# ============================================================================
# PHASE 7: Account Owner Mapping API
# ============================================================================
phase_7_account_owner_mapping:
  status: not_started
  description: |
    Replace the hardcoded frontend account owner mapping with a configurable
    family-level data entity backed by an API.
  tasks:
    - id: P7-T1
      task: "Create AccountOwnerMappingService"
      status: not_started
      details: |
        New file: backend/src/services/accountOwnerMappingService.ts
        Storage key: account_owner_mappings_{familyId}

        Methods:
