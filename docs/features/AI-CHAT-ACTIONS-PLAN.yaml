# =============================================================================
# AI Chat Attachments & Action Cards — Implementation Plan
# =============================================================================
# BRD: docs/features/AI-CHAT-ACTIONS-BRD.md
# Status: Backend + Frontend Complete (Phases 1–9 + security tests 10.1–10.10,
#         Phase 12 docs). Remaining: manual device QA (Phase 11).
# Last Updated: 2026-04-17
# =============================================================================

overview:
  description: |
    Implementation plan for extending the existing chatbot overlay with two
    capabilities:

    1. Attachment intake (photo/PDF upload in chat, analyzed via Claude vision)
    2. Action cards (LLM proposes a single allowlisted action; user confirms
       via inline card with Confirm / Edit / Dismiss controls)

    V1 allowlist: create_task only. The action-card mechanism is designed so
    that future actions (budget edits, categorization, etc.) and a future
    migration of the GitHub-issue confirmation flow (D-15 in BRD) require
    changes in exactly three places: backend registry, Zod schema file, and
    frontend card template.

    Reuses: existing chatbot overlay, ChatbotCostTracker, ChatbotDataService,
    Anthropic SDK, Amazon-receipt multer/magic-byte validation patterns.

  key_files:
    brd: docs/features/AI-CHAT-ACTIONS-BRD.md
    shared_types: shared/types/index.ts
    chatbot_service: backend/src/services/chatbotService.ts
    chatbot_prompt: backend/src/services/chatbotPrompt.ts
    chatbot_cost_tracker: backend/src/services/chatbotCostTracker.ts
    chatbot_routes: backend/src/routes/chatbot.ts
    tasks_routes: backend/src/routes/tasks.ts
    task_service: backend/src/services/taskService.ts
    pdf_upload_middleware: backend/src/middleware/pdfUpload.ts
    chat_overlay: frontend/src/components/chat/ChatOverlay.tsx
    chat_message_bubble: frontend/src/components/chat/ChatMessageBubble.tsx
    chatbot_api_client: frontend/src/lib/api/chatbot.ts

# =============================================================================
# DECISIONS LOG
# =============================================================================
# All V1 decisions are in the BRD (D-1 through D-15). This section captures
# decisions made during implementation that were not in the BRD.
decisions:
  - id: D-IMPL-1
    date: 2026-04-17
    decision: |
      Confirm endpoint mounted at /api/v1/chatbot/actions/confirm, not
      /api/v1/chat/actions/confirm as the BRD §7.2 specified.
    rationale: |
      The existing chatbot router is mounted at /api/v1/chatbot (not /chat).
      Keeping the confirm endpoint under the same namespace preserves one
      authority for chat-related routes, one rate-limiter configuration, and
      one CORS/CSRF posture. BRD §7 will be updated to match. The chat
      message endpoint also stays at its existing path (/api/v1/chatbot/message)
      and accepts multipart when Content-Type is multipart/form-data.

  - id: D-IMPL-2
    date: 2026-04-17
    decision: |
      ChatbotService.chat() gains a required userId parameter.
    rationale: |
      Nonce ownership (SEC-A001, SEC-A005) must bind the proposal to the
      requesting user's identity. The service previously took only familyId;
      adding userId is required so issueProposal can stamp the nonce with
      it. The route handler populates userId from the JWT — the LLM never
      sees or supplies it. Single call site, clean change.

  - id: D-IMPL-3
    date: 2026-04-17
    decision: |
      Zod v4 signature change accommodated — z.record now requires two args.
    rationale: |
      z.record(z.unknown()) is invalid in the project's pinned Zod version;
      must be z.record(z.string(), z.unknown()). Noted so future confirm
      schema edits stay consistent.

  - id: D-IMPL-4
    date: 2026-04-17
    decision: |
      conversationId falls back to `anon_${familyId}` if frontend omits it.
    rationale: |
      Defensive default so proposals never share a conversationId across
      families. The frontend MUST pass a stable client-generated UUID per
      conversation session to get correct supersession and one-active-card
      semantics — the fallback is a safety net, not a supported mode.

  - id: D-IMPL-5
    date: 2026-04-17
    decision: |
      Full ActionProposal (with nonce) stored in a parallel Map<messageId,
      ActionProposal>, not attached to ChatMessage.
    rationale: |
      An early implementation attached the full proposal to each
      ChatMessage under a non-standard `__fullProposal` key and stripped
      it during history serialization. That forced `any` casts at both
      read and write sites, violating the project's strict-typing rule.
      Replaced with a typed Map in ChatOverlay state (persisted to
      sessionStorage for refresh resilience). The ChatMessage.proposal
      field carries only the sanitized Pick<ActionProposal, ...> shape —
      the nonce is structurally unreachable from history serialization
      (SEC-A009) rather than being stripped defensively.

  - id: D-IMPL-6
    date: 2026-04-17
    decision: |
      `failed` is a frontend-only display state; ChatMessage.proposalStatus
      stays `'pending'` when a confirm call fails.
    rationale: |
      A failed confirmation surfaces the error via a parallel
      `actionErrors: Record<messageId, string>` map and keeps the card
      interactive (user can edit and retry). Adding `'failed'` to the
      shared `proposalStatus` enum would couple the shared type to a
      transient UI concept. The ActionCard derives the `'failed'` visual
      variant locally from `(proposalStatus === 'pending' &&
      actionErrorMessage)`.

  - id: D-IMPL-7
    date: 2026-04-17
    decision: |
      Security tests 10.6, 10.7, 10.9, 10.10 mock the Anthropic client via
      jest.spyOn on the private `client` field of the chatbotService singleton,
      accessed through an `unknown` cast.
    rationale: |
      The chatbotService singleton is constructed at module load time (before
      any test runs), so jest.mock('@anthropic-ai/sdk') would not affect the
      already-constructed instance. The alternative — exposing the client as
      public — would compromise encapsulation. The `unknown` cast is contained
      in a single `spyOnAnthropicMessages` helper function in the test file and
      does not introduce `any` into production code. This is the standard
      pattern for spying on private class members when the class is a
      pre-constructed singleton.

# =============================================================================
# PHASE 1: Shared Types & Action Registry Contract
# =============================================================================
phase_1_types:
  status: completed
  description: |
    Define all types for attachment upload, action proposals, confirmation
    requests, and the action registry contract. The registry contract is the
    critical design point — it must be extensible to new actions without
    touching interception or validation logic.

  tasks:
    - id: "1.1"
      task: Define action registry types in shared/types/index.ts
      status: completed
      details: |
        // V1 allowlist — extensible enum
        export type ChatActionId = 'create_task';

        // DisplayField — drives card rendering
        export type DisplayFieldType =
          | 'text' | 'textarea' | 'date' | 'select' | 'tags';

        export interface DisplayField {
          key: string;                  // Maps to a field in params
          label: string;                // Human-readable label
          value: string;                // Formatted value for display
          editable: boolean;            // Whether Edit mode allows changes
          type: DisplayFieldType;
          options?: { value: string; label: string }[]; // for 'select'
        }

        // What the LLM produces via propose_action tool
        export interface ActionProposalInput {
          actionId: ChatActionId;
          params: Record<string, unknown>;
          displaySummary: string;
          displayFields: DisplayField[];
          reasoning: string;
        }

        // What the backend returns to the frontend after interception
        export interface ActionProposal {
          proposalId: string;           // nonce
          actionId: ChatActionId;
          params: Record<string, unknown>; // Server-validated, may be re-shaped
          displaySummary: string;
          displayFields: DisplayField[];
          reasoning: string;
          expiresAt: string;            // ISO, nonce expiry
        }

        // Confirmation request body
        export interface ActionConfirmRequest {
          proposalId: string;
          confirmedParams: Record<string, unknown>;
        }

        // Confirmation response
        export type ActionConfirmResponse =
          | { success: true; resource: ActionResource }
          | { success: false; error: string; errorCode: ActionConfirmErrorCode };

        export interface ActionResource {
          type: 'task';                 // V1
          id: string;
          url?: string;                 // Frontend-resolvable deep link
          label: string;                // Human-readable name of the resource
        }

        export type ActionConfirmErrorCode =
          | 'nonce_not_found'
          | 'nonce_expired'
          | 'nonce_already_used'
          | 'validation_failed'
          | 'action_not_allowed'
          | 'internal_error';

    - id: "1.2"
      task: Extend ChatResponse discriminated union with action_proposal type
      status: completed
      details: |
        Existing shape in shared/types/index.ts (ChatResponse) is:
          { type: 'message' | 'issue_confirmation' | 'error'; ... }

        Add a new variant:
          | {
              type: 'action_proposal';
              message: ChatMessage;       // assistant's narration before the card
              proposal: ActionProposal;
              usage: ChatUsage;
            }

        ChatMessage itself needs a new optional `proposal` field so that when
        history is round-tripped (e.g., refinement turn), the LLM can see that
        a proposal was previously made. The nonce is NOT sent to the LLM —
        only the actionId, displaySummary, and params. See SEC-A009.

        export interface ChatMessage {
          // ...existing fields
          proposal?: Pick<ActionProposal,
            'actionId' | 'displaySummary' | 'params' | 'displayFields'>;
          proposalStatus?: 'pending' | 'confirmed' | 'dismissed' | 'superseded' | 'expired';
          resource?: ActionResource;   // populated after confirm success
        }

    - id: "1.3"
      task: Define create_task action schema (shared)
      status: completed
      details: |
        Mirror the existing createTaskSchema in backend/src/routes/tasks.ts
        so that the backend action handler can re-use it. Export a shared
        type alias:

          export type CreateTaskActionParams = CreateTaskDto;

        The CreateTaskDto already exists in shared/types (line 822). Re-use
        directly — do not duplicate.

    - id: "1.4"
      task: Define ChatAttachment metadata type
      status: completed
      details: |
        // Represents an attachment in the composer / on an outbound message.
        // Attachments themselves are transient; this type carries metadata only.
        export interface ChatAttachmentMeta {
          filename: string;
          mimeType: 'image/jpeg' | 'image/png' | 'image/webp' | 'application/pdf';
          sizeBytes: number;
          // No data URL persisted — frontend holds a blob URL during composition
          // and discards it after send.
        }

        // Extend ChatMessage to carry attachment metadata when the user
        // sent an attachment with that turn.
        export interface ChatMessage {
          // ...existing fields
          attachment?: ChatAttachmentMeta;
        }

# =============================================================================
# PHASE 2: Backend — Action Registry & Handler Infrastructure
# =============================================================================
phase_2_action_registry:
  status: completed
  description: |
    Build the central action registry. This is the structural backbone that
    ensures (a) only known actions can be proposed, (b) params are always
    server-validated, and (c) execution happens through the user's existing
    auth context via internal calls to existing endpoints.

  tasks:
    - id: "2.1"
      task: Create chatActionRegistry in backend/src/services/chatActions/registry.ts
      status: completed
      details: |
        New directory: backend/src/services/chatActions/
        New file: registry.ts

        Defines:

        import { z } from 'zod';
        import type { ChatActionId, ActionResource, ChatActionHandlerContext } from '../../shared/types';

        export interface ChatActionDefinition<TParams> {
          actionId: ChatActionId;
          label: string;                 // "Create a task"
          paramsSchema: z.ZodType<TParams>;
          execute: (
            params: TParams,
            ctx: ChatActionHandlerContext
          ) => Promise<ActionResource>;
        }

        const registry = new Map<ChatActionId, ChatActionDefinition<any>>();

        export function registerChatAction<T>(def: ChatActionDefinition<T>): void {
          if (registry.has(def.actionId)) {
            throw new Error(`Duplicate chat action: ${def.actionId}`);
          }
          registry.set(def.actionId, def);
        }

        export function getChatAction(
          actionId: string
        ): ChatActionDefinition<unknown> | null {
          if (!registry.has(actionId as ChatActionId)) return null;
          return registry.get(actionId as ChatActionId) ?? null;
        }

        export function listChatActionIds(): ChatActionId[] {
          return Array.from(registry.keys());
        }

        // ChatActionHandlerContext — what handlers get to execute
        export interface ChatActionHandlerContext {
          userId: string;
          familyId: string;
          // Intentionally does NOT include: LLM output, proposal metadata,
          // attachment data, or any elevated privileges.
        }

        SECURITY: The registry is a Map, not an object literal — this prevents
        prototype pollution if an attacker somehow supplied an actionId like
        '__proto__' (unlikely given Zod validation, but defense-in-depth).

    - id: "2.2"
      task: Create create_task handler in backend/src/services/chatActions/createTaskAction.ts
      status: completed
      details: |
        import { registerChatAction } from './registry';
        import { taskService } from '../index';  // existing singleton
        import type { CreateTaskDto } from '../../shared/types';

        // Re-use the EXACT same schema as backend/src/routes/tasks.ts createTaskSchema.
        // Export that schema from tasks.ts so we don't duplicate it — one source
        // of truth for task validation whether the caller is HTTP or chat.
        import { createTaskSchema } from '../../routes/tasks';

        registerChatAction<CreateTaskDto>({
          actionId: 'create_task',
          label: 'Create a task',
          paramsSchema: createTaskSchema,
          async execute(params, ctx) {
            const task = await taskService.createTask(
              params,
              ctx.userId,
              ctx.familyId,
            );
            return {
              type: 'task',
              id: task.id,
              url: `/tasks?taskId=${task.id}`,
              label: task.title,
            };
          },
        });

        SECURITY (SEC-A001, SEC-A002): The handler does NOT accept userId or
        familyId from the LLM or from params. It receives them from the
        ChatActionHandlerContext, which is populated from the JWT on the
        incoming HTTP request — the same source all other authenticated
        endpoints use.

        SECURITY (SEC-A003, SEC-A004): The handler's only job is to call
        taskService.createTask. All validation is the paramsSchema (re-used
        from the tasks route). Business rules like "dueDate must be parseable"
        or "assigneeId must be a household member" are enforced inside
        taskService.createTask — the same place they're enforced for HTTP
        callers.

    - id: "2.3"
      task: Export createTaskSchema from backend/src/routes/tasks.ts
      status: completed
      details: |
        The schema at tasks.ts:21-30 is currently module-local. Export it so
        the chat action handler can re-use it:

          export const createTaskSchema = z.object({ ... });

        Update the route's .parse call to still use the same const. No
        behavioral change — only scope widening.

        SECURITY NOTE: This is the "one source of truth" requirement in
        SEC-A004. If a future change tightens task validation (e.g., stricter
        character limits), both HTTP and chat paths pick it up automatically.

    - id: "2.4"
      task: Create chatActionProposals nonce store in backend/src/services/chatActions/proposalStore.ts
      status: completed
      details: |
        In-memory, TTL-based proposal store. No persistence (proposals are
        short-lived and session-scoped). Use a Map keyed by nonce.

        import { randomUUID } from 'crypto';
        import type { ActionProposal } from '../../shared/types';

        interface StoredProposal {
          proposal: ActionProposal;
          userId: string;
          familyId: string;
          conversationId: string;  // Scopes "one active card per conversation"
          createdAt: number;
          used: boolean;
          result?: import('../../shared/types').ActionConfirmResponse;
        }

        const TTL_MS = 15 * 60 * 1000;  // SEC-A006
        const store = new Map<string, StoredProposal>();

        // Active-per-conversation tracking — enforces D-2, SEC-A007
        const activeByConversation = new Map<string, string>(); // convoId → nonce

        export function issueProposal(args: {
          userId: string;
          familyId: string;
          conversationId: string;
          proposalInput: Omit<ActionProposal, 'proposalId' | 'expiresAt'>;
        }): ActionProposal {
          // Invalidate any prior active proposal for this conversation
          const priorNonce = activeByConversation.get(args.conversationId);
          if (priorNonce) {
            const prior = store.get(priorNonce);
            if (prior && !prior.used) {
              prior.used = true;
              prior.result = { success: false, error: 'Superseded', errorCode: 'nonce_already_used' };
            }
          }

          const nonce = randomUUID();
          const expiresAt = new Date(Date.now() + TTL_MS).toISOString();
          const proposal: ActionProposal = {
            ...args.proposalInput,
            proposalId: nonce,
            expiresAt,
          };

          store.set(nonce, {
            proposal,
            userId: args.userId,
            familyId: args.familyId,
            conversationId: args.conversationId,
            createdAt: Date.now(),
            used: false,
          });
          activeByConversation.set(args.conversationId, nonce);
          return proposal;
        }

        export function consumeProposal(args: {
          nonce: string;
          userId: string;
        }): { ok: true; stored: StoredProposal } | { ok: false; errorCode: import('../../shared/types').ActionConfirmErrorCode } {
          const stored = store.get(args.nonce);
          if (!stored) return { ok: false, errorCode: 'nonce_not_found' };
          // SEC-A001 — ownership check
          if (stored.userId !== args.userId) return { ok: false, errorCode: 'nonce_not_found' };
          if (Date.now() - stored.createdAt > TTL_MS) return { ok: false, errorCode: 'nonce_expired' };
          if (stored.used) return { ok: false, errorCode: 'nonce_already_used' };
          stored.used = true;
          return { ok: true, stored };
        }

        // Periodic sweep to avoid unbounded memory (leak defense)
        setInterval(() => {
          const now = Date.now();
          for (const [nonce, s] of store.entries()) {
            if (s.used && now - s.createdAt > TTL_MS) {
              store.delete(nonce);
            } else if (!s.used && now - s.createdAt > TTL_MS) {
              store.delete(nonce);
              if (activeByConversation.get(s.conversationId) === nonce) {
                activeByConversation.delete(s.conversationId);
              }
            }
          }
        }, 60 * 1000).unref();

        SECURITY (SEC-A005, SEC-A006, SEC-A007): Nonces are single-use,
        15-minute TTL, userId-scoped, and conversation-scoped. Supersession
        invalidates the prior nonce atomically.

        SECURITY note on multi-instance deployments: This in-memory store
        works for the current single-PM2-process deployment. If we ever scale
        to multiple nodes, nonces must move to Redis or a shared store. Flag
        this in the code with a comment.

    - id: "2.5"
      task: Bootstrap the registry at service init
      status: completed
      details: |
        In backend/src/services/chatActions/index.ts:

          import './createTaskAction';  // registers via side-effect
          export * from './registry';
          export * from './proposalStore';

        In backend/src/services/index.ts, add:

          import './chatActions';  // ensure registry is populated at startup

        Verify registration at boot by logging the action IDs once on startup:

          console.log('[chatActions] Registered:', listChatActionIds());

        This gives us a deployment-time sanity check that the registry is
        populated before any chat request arrives.

# =============================================================================
# PHASE 3: Backend — Image & PDF Upload Infrastructure
# =============================================================================
phase_3_upload:
  status: completed
  description: |
    Extend the chat endpoint to accept a single image OR PDF attachment
    alongside a text message. Reuse the multer + magic-byte pattern from
    Amazon receipts, tightened for chat-attachment use.

  tasks:
    - id: "3.1"
      task: Create chat attachment upload middleware in backend/src/middleware/chatAttachmentUpload.ts
      status: completed
      details: |
        import multer from 'multer';
        import { ValidationError } from '../errors';

        const JPEG_MAGIC = Buffer.from([0xff, 0xd8, 0xff]);
        const PNG_MAGIC = Buffer.from([0x89, 0x50, 0x4e, 0x47]);
        const WEBP_MAGIC_RIFF = Buffer.from('RIFF');
        const WEBP_MAGIC_WEBP = Buffer.from('WEBP');
        const PDF_MAGIC = Buffer.from('%PDF-');

        const ALLOWED_MIMES = new Set([
          'image/jpeg', 'image/png', 'image/webp', 'application/pdf',
        ]);

        export const uploadChatAttachment = multer({
          storage: multer.memoryStorage(),
          limits: { fileSize: 10 * 1024 * 1024 },  // 10 MB (BRD §3.1, SEC-A013)
          fileFilter: (_req, file, cb) => {
            if (!ALLOWED_MIMES.has(file.mimetype)) {
              cb(new Error(`Unsupported file type: ${file.mimetype}`));
              return;
            }
            cb(null, true);
          },
        }).single('attachment');

        export function validateAttachmentMagicBytes(
          file: Express.Multer.File,
        ): void {
          const head = file.buffer.subarray(0, 16);
          const matches =
            (file.mimetype === 'image/jpeg' && head.subarray(0, 3).equals(JPEG_MAGIC)) ||
            (file.mimetype === 'image/png' && head.subarray(0, 4).equals(PNG_MAGIC)) ||
            (file.mimetype === 'image/webp'
              && head.subarray(0, 4).equals(WEBP_MAGIC_RIFF)
              && head.subarray(8, 12).equals(WEBP_MAGIC_WEBP))
            || (file.mimetype === 'application/pdf' && head.subarray(0, 5).equals(PDF_MAGIC));
          if (!matches) {
            throw new ValidationError('Uploaded file content does not match declared type');
          }
        }

        // PDF page count cap (SEC-A013) — 20 pages.
        // For images, no page-count concept. For PDFs, a cheap check using
        // a regex over the buffer is sufficient (counts /Type /Page objects).
        // This is coarse but safe — generous upper bound is what we care about.
        export function enforcePdfPageLimit(file: Express.Multer.File): void {
          if (file.mimetype !== 'application/pdf') return;
          // /Type /Page (but not /Pages) — rough page count
          const text = file.buffer.toString('latin1');
          const matches = text.match(/\/Type\s*\/Page[^s]/g) || [];
          if (matches.length > 20) {
            throw new ValidationError('PDF exceeds 20-page limit');
          }
        }

        SECURITY (SEC-A013): Magic byte validation defeats MIME spoofing. The
        regex-based PDF page count is intentionally coarse; if it produces
        false negatives, the real bound is the 10 MB file size cap + Claude's
        context handling. The goal is not precise page counting, just
        defense against adversarially large PDFs.

    - id: "3.2"
      task: Extend chat endpoint to accept multipart form-data
      status: completed
      details: |
        In backend/src/routes/chatbot.ts, current chat endpoint accepts JSON
        body only. Extend to dual-mode:

          POST /api/v1/chat

          Content-Type: application/json       → existing path (text-only)
          Content-Type: multipart/form-data    → new path (text + attachment)

        Implementation approach: use a single conditional middleware.

        router.post(
          '/',
          authenticateToken,
          chatRateLimiter,  // existing 5 req/min limiter
          (req, res, next) => {
            const contentType = req.headers['content-type'] || '';
            if (contentType.includes('multipart/form-data')) {
              uploadChatAttachment(req, res, (err) => {
                if (err) {
                  if (err instanceof multer.MulterError) {
                    return res.status(400).json({
                      error: err.code === 'LIMIT_FILE_SIZE'
                        ? 'File too large (max 10 MB)'
                        : 'Invalid upload',
                    });
                  }
                  return res.status(400).json({ error: err.message });
                }
                if (req.file) {
                  try {
                    validateAttachmentMagicBytes(req.file);
                    enforcePdfPageLimit(req.file);
                  } catch (e) {
                    return res.status(400).json({
                      error: e instanceof Error ? e.message : 'Invalid file'
                    });
                  }
                }
                // Parse JSON fields from form-data
                try {
                  if (typeof req.body.conversationHistory === 'string') {
                    req.body.conversationHistory = JSON.parse(req.body.conversationHistory);
                  }
                  if (typeof req.body.pageContext === 'string') {
                    req.body.pageContext = JSON.parse(req.body.pageContext);
                  }
                } catch {
                  return res.status(400).json({ error: 'Invalid JSON fields in form data' });
                }
                next();
              });
            } else {
              next();
            }
          },
          chatHandler,
        );

        SECURITY: The 5 req/min rate limiter (SEC-016 from chatbot BRD) applies
        to multipart uploads identically — no bypass for attachment requests.

        SECURITY (SEC-A020): Cost-cap check must happen AFTER upload but
        BEFORE Claude is called. If the cap is reached, reject with the
        existing cap-reached response; the multer upload has already consumed
        the bandwidth at that point but no Claude tokens.

    - id: "3.3"
      task: Add CSRF guard reminder for multipart endpoints
      status: completed
      details: |
        Multipart form uploads are a classic CSRF vector in browser contexts.
        The existing chat endpoint uses JWT via Authorization header (bearer
        token). Verify this is unchanged for the multipart path — specifically
        that auth is NOT sourced from cookies. If auth ever moves to cookies,
        the chat upload endpoint needs a CSRF token.

        Action: add a code comment in chatbot.ts at the route handler:

          // SECURITY: This endpoint accepts multipart uploads. Auth MUST
          // come from the Authorization header (JWT), not cookies. If auth
          // moves to cookies, add CSRF token validation before allowing
          // multipart POSTs.

# =============================================================================
# PHASE 4: Backend — Claude Tool Wiring (propose_action)
# =============================================================================
