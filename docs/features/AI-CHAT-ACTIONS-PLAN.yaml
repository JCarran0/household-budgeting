phase_8_action_card:
  status: completed
  description: |
    The inline card rendered below the assistant's message when a proposal
    is issued. Handles Confirm / Edit / Dismiss / Superseded / Confirmed /
    Expired states.

  tasks:
    - id: "8.1"
      task: Create frontend/src/components/chat/ActionCard.tsx
      status: completed
      details: |
        Props:

          interface ActionCardProps {
            proposal: ActionProposal;
            status: 'pending' | 'confirmed' | 'dismissed' | 'superseded' | 'expired' | 'failed';
            resource?: ActionResource;        // after successful confirm
            errorMessage?: string;             // after failed confirm
            onConfirm: (params: Record<string, unknown>) => Promise<void>;
            onDismiss: () => void;
          }

        States:

        - pending: shows displaySummary, collapsed "Why?", displayFields list
          (only LLM-proposed fields per D-11 collapsed view), buttons
          [Confirm] [Edit] [Dismiss]
        - edit-mode (local substate of pending): full form for the action
          (create_task in V1), prefilled with proposal.params. Submit button
          becomes [Confirm] on the edited params.
        - confirmed: greyed card with ✅ and "Created task: {label} —
          [View →]" link to /tasks?taskId={id}
        - dismissed: collapsed muted state "Dismissed"
        - superseded: struck-through muted "Superseded by a newer proposal"
        - expired: muted "This proposal expired. Ask me again if you still
          want to create it."
        - failed: red-tinted card showing errorMessage + [Try Again] button
          (which re-opens edit mode with the last confirmedParams)

        Confirm button flow:
          setLoading(true);
          try {
            const resp = await confirmChatAction({
              proposalId: proposal.proposalId,
              confirmedParams: editedParams ?? proposal.params,
            });
            if (resp.success) updateMessageStatus('confirmed', resp.resource);
            else updateMessageStatus('failed', undefined, resp.error);
          } finally { setLoading(false); }

