# =============================================================================
# SEQUENCING NOTES
# =============================================================================
sequencing:
  critical_path: |
    Phase 1 → Phase 2 → Phase 4 → Phase 5 establishes the full server-side
    security boundary (types → registry → tool interception → confirmation).
    Phase 3 (upload infrastructure) can be built in parallel with 2+4 since
    it's an isolated middleware.

    Frontend Phase 6 depends on Phase 3 (multipart endpoint exists).
    Frontend Phase 7–9 depend on Phase 1 (types) and Phases 4+5 (endpoints).

    Phase 10 (security tests) should be written AS each backend phase lands,
    not batched at the end. Phase 11 (manual QA) is post-integration.

  recommended_order:
    - Phase 1 (types)
    - Phase 2 (registry + create_task handler)
    - Phase 3 (upload middleware) — can be parallel to 4
    - Phase 4 (tool wiring + interception)
    - Phase 5 (confirm endpoint + audit)
    - Phase 10.1–10.5, 10.8 (backend security tests — write alongside 2/4/5)
    - Phase 6 (composer)
    - Phase 7 (API client)
    - Phase 8 (action card)
    - Phase 9 (conversation state)
    - Phase 10.6, 10.7, 10.9, 10.10 (end-to-end security tests)
    - Phase 11 (manual QA on real devices)
    - Phase 12 (docs)
