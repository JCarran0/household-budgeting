phase_7_api_client:
  status: completed
  description: |
    Extend the chatbot API client to send multipart form data when an
    attachment is present, and to POST confirmations.

  tasks:
    - id: "7.1"
      task: Update sendChatMessage to accept optional attachment
      status: completed
      details: |
        In frontend/src/lib/api/chatbot.ts:

          export async function sendChatMessage(params: {
            message: string;
            conversationId: string;
            conversationHistory: ChatMessage[];
            pageContext: PageContext;
            model: ChatModel;
            attachment?: File;
          }): Promise<ChatResponse> {
            if (params.attachment) {
              const form = new FormData();
              form.append('attachment', params.attachment);
              form.append('message', params.message);
              form.append('conversationId', params.conversationId);
              form.append('conversationHistory', JSON.stringify(params.conversationHistory));
              form.append('pageContext', JSON.stringify(params.pageContext));
              form.append('model', params.model);
              return authedFetch('/api/v1/chat', {
                method: 'POST',
                body: form,
                // NOTE: Do NOT set Content-Type — browser sets multipart boundary
              });
            }
            // Existing JSON path unchanged
            return authedFetch('/api/v1/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...params }),
            });
          }

    - id: "7.2"
