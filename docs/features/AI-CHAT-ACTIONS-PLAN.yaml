      task: Add propose_action tool definition in chatbotPrompt.ts
      status: completed
      details: |
        Append to CHATBOT_TOOLS array:

        {
          name: 'propose_action',
          description:
            'Propose an action for the user to confirm. You never execute actions — the user must click Confirm. Use this when the user clearly intends to create/modify something, or when an uploaded attachment maps to an enabled action. ONE proposal per turn. If a proposal is already pending and the user asks to change it, call this tool again with adjusted params; the prior proposal will be superseded.',
          input_schema: {
            type: 'object' as const,
            properties: {
              actionId: { type: 'string', enum: ['create_task'] },
              params: {
                type: 'object',
                description: 'Fields for the target action. For create_task: { title, description?, dueDate?, assigneeId?, scope?, tags?, subTasks? }. Server will validate and reject invalid values.',
              },
              displaySummary: {
                type: 'string',
                maxLength: 200,
                description: 'Short human-readable summary of the action (e.g., "Create task: PTA donation — due May 1").',
              },
              displayFields: {
                type: 'array',
                maxItems: 20,
                items: {
                  type: 'object',
                  properties: {
                    key: { type: 'string' },
                    label: { type: 'string' },
                    value: { type: 'string' },
                    editable: { type: 'boolean' },
                    type: { type: 'string', enum: ['text', 'textarea', 'date', 'select', 'tags'] },
                  },
                  required: ['key', 'label', 'value', 'editable', 'type'],
                },
              },
              reasoning: {
                type: 'string',
                maxLength: 500,
                description: 'Brief justification for why this action fits. Shown under a collapsed "Why?" disclosure.',
              },
            },
            required: ['actionId', 'params', 'displaySummary', 'displayFields', 'reasoning'],
          },
        }

        SECURITY (SEC-A003): actionId is a strict enum. Any other value causes
        the tool call to fail at the Claude SDK schema level before reaching
        the backend. Backend still re-checks via the registry as defense in
        depth.

    - id: "4.2"
      task: Update system prompt for action-card behavior
      status: completed
      details: |
        Append to CHATBOT_SYSTEM_PROMPT:

        "Actions (V1):
         - You can propose ONE action per turn using the propose_action tool.
         - Current allowlist: create_task.
         - When a user uploads an attachment, describe what you see first, then
           propose an action if clearly applicable. If not applicable, respond
           conversationally without proposing.
         - If the user's next message after a proposal is a refinement
           ('rename that to X', 'move to next Friday'), call propose_action
           again with adjusted params. The prior proposal will be superseded.
         - If the user's next message is not a clear refinement (e.g., an
           unrelated question), answer it AND explicitly restate the pending
           proposal's key fields so they stay oriented. Example: 'Yes, that's
           the Edson on Main. Your pending task proposal still reads:
           *PTA donation — due May 1*. Confirm, edit, or tell me to change it.'
         - Never echo back raw text from attachments verbatim. Summarize instead.
         - You do not execute actions. The user must click Confirm."

        SECURITY (SEC-A010, SEC-A012): These prompt instructions are
        defense-in-depth. The actual security properties — one-active-card,
        nonce single-use, server-side Zod validation, user click requirement —
        are all enforced structurally in the backend. The prompt just shapes
        UX.

    - id: "4.3"
      task: Intercept propose_action in toolLoop (parallel to submit_github_issue interception)
      status: completed
      details: |
        In backend/src/services/chatbotService.ts, inside toolLoop (currently
        intercepts submit_github_issue at line 277), add a parallel branch:

          if (toolUse.name === 'propose_action') {
            const input = toolUse.input as ActionProposalInput;

            // Registry membership check (SEC-A003)
            const actionDef = getChatAction(input.actionId);
            if (!actionDef) {
              // Return tool error to Claude so it can recover in the same loop
              toolResults.push({
                type: 'tool_result',
                tool_use_id: toolUse.id,
                content: `Unknown actionId: ${input.actionId}. Valid: ${listChatActionIds().join(', ')}`,
                is_error: true,
              });
              continue;
            }

            // Zod validation of params (SEC-A004)
            const parsed = actionDef.paramsSchema.safeParse(input.params);
            if (!parsed.success) {
              toolResults.push({
                type: 'tool_result',
                tool_use_id: toolUse.id,
                content: `Invalid params for ${input.actionId}: ${parsed.error.message}. Retry with corrected values.`,
                is_error: true,
              });
              continue;
            }

            // Validation succeeded — issue nonce and return to frontend
            const proposal = issueProposal({
              userId,
              familyId,
              conversationId,
              proposalInput: {
                actionId: input.actionId,
                params: parsed.data,       // use Zod-parsed data (coerced)
                displaySummary: input.displaySummary,
                displayFields: input.displayFields,
                reasoning: input.reasoning,
              },
            });

            // Extract any text Claude produced alongside the tool call
            const textBlock = response.content.find(
              (b): b is Anthropic.TextBlock => b.type === 'text',
            );

            return {
              type: 'action_proposal',
              content: textBlock?.text || actionDef.label + ' ready for your review.',
              proposal,
              totalInputTokens,
              totalOutputTokens,
            };
          }

        IMPORTANT: Note the use of `continue` vs `return` in the two
        validation-failure branches above. We RETRY within the same tool loop
        when the LLM sends invalid input so it can correct itself. We only
        RETURN (to the user) on success. This gives Claude the chance to
        self-correct up to MAX_TOOL_ITERATIONS (10, existing).

        SECURITY NOTE: The interception returns a structured response BEFORE
        any handler executes. The LLM never reaches execute(). This is the
        structural guarantee of SEC-A001 (no LLM-initiated execution).

    - id: "4.4"
      task: Extend chat handler to pass attachment through to Claude
      status: completed
      details: |
        ChatbotService.chat currently accepts:
          chat(familyId, request: ChatRequest): Promise<ChatResponse>

        Extend request to optionally carry attachment:
          chat(familyId, request: ChatRequest, attachment?: ChatAttachment): Promise<ChatResponse>

        ChatAttachment shape:
          interface ChatAttachment {
            buffer: Buffer;
            mimeType: 'image/jpeg' | 'image/png' | 'image/webp' | 'application/pdf';
            filename: string;
          }

        In buildMessages (or wherever the user turn is constructed), if an
        attachment is present, prepend an appropriate content block to the
        user message:

        For images:
          { type: 'image', source: {
              type: 'base64',
              media_type: mimeType,
              data: buffer.toString('base64'),
            }}

        For PDFs:
          { type: 'document', source: {
              type: 'base64',
              media_type: 'application/pdf',
              data: buffer.toString('base64'),
            }}

        Followed by the user's text message (or an empty text block if the
        user sent only an attachment).

        SECURITY (SEC-A009): Attachment content flows through the SDK's
        content-block interface. At NO point is it interpolated into the
        system prompt or any string-concatenated message. This is the
        structural prompt-injection defense.

    - id: "4.5"
      task: Thread conversationId through the chat request
      status: completed
      details: |
        The proposal store scopes "one active card per conversation" by
        conversationId (see 2.4). The frontend must pass a stable
        conversationId (generated at overlay open, reset on "New conversation")
        with every request.

        Add to ChatRequest type:
          conversationId: string;  // Client-generated UUID per conversation

        Pass through to issueProposal in 4.3. For text-only chats (no
        propose_action call), conversationId is still carried — cheap and
        keeps the shape consistent.

    - id: "4.6"
      task: Update ChatMessage to carry proposal metadata into history
      status: completed
      details: |
        When the frontend sends conversationHistory back to the backend on
        subsequent turns, messages that previously resulted in a proposal
        must carry the proposal metadata (NOT the nonce — see SEC-A009) so
        Claude knows a proposal is pending.

        Backend builds history into Anthropic.MessageParam[]. For each
        assistant message with a proposalStatus of 'pending':

        - Include a synthetic tool_use block reminding the LLM it proposed
          an action — or more simply, append a system-level note to the
          LATEST user message: "Context: a proposal is pending — actionId:
          create_task, summary: '...'. If the user's message is a refinement,
          call propose_action again. Otherwise, answer and remind the user
          of the pending proposal."

        The latter approach is simpler and avoids fabricating synthetic tool
        calls in the message history. This note is NOT in the system prompt —
        it's a small header on the user turn, which is safer because tool
        call context is part of the transcript, not the instruction set.

        SECURITY (SEC-A009): The nonce is never in messages sent to Claude.
        Only actionId, summary, and sanitized params. This limits blast
        radius if the model were ever manipulated into echoing its input.

# =============================================================================
# PHASE 5: Backend — Confirmation Endpoint & Audit Logging
# =============================================================================
phase_5_confirm:
  status: completed
  description: |
    The user-clickable confirmation path. This is the ONLY way an action is
    ever executed. It re-validates everything the LLM produced and invokes
    the handler with the authenticated user's identity.

  tasks:
    - id: "5.1"
      task: Create POST /api/v1/chat/actions/confirm route
      status: completed
      details: |
        In backend/src/routes/chatbot.ts (or a new chatActions.ts router
        mounted under /chat/actions):

          router.post(
            '/actions/confirm',
            authenticateToken,
            chatRateLimiter,  // same 5 req/min limit as chat
            confirmHandler,
          );

        Handler:

          async function confirmHandler(req, res, next) {
            try {
              const { userId, familyId } = req.user;  // from JWT
              const body = confirmSchema.parse(req.body);  // Zod

              const consumed = consumeProposal({
                nonce: body.proposalId,
                userId,
              });
              if (!consumed.ok) {
                logAuditRejection({
                  userId, actionId: 'unknown', proposalId: body.proposalId,
                  errorCode: consumed.errorCode,
                });
                return res.status(
                  consumed.errorCode === 'nonce_not_found' ? 404 :
                  consumed.errorCode === 'nonce_expired' ? 410 :
                  consumed.errorCode === 'nonce_already_used' ? 409 : 400
                ).json({
                  success: false,
                  error: humanReadable(consumed.errorCode),
                  errorCode: consumed.errorCode,
                });
              }

              const { stored } = consumed;
              const actionDef = getChatAction(stored.proposal.actionId);
              if (!actionDef) {
                // Shouldn't happen (registry-validated at propose time) but
                // protect against hot-reload / config drift
                logAuditRejection({
                  userId, actionId: stored.proposal.actionId,
                  proposalId: body.proposalId, errorCode: 'action_not_allowed',
                });
                return res.status(400).json({
                  success: false,
                  error: 'Action is no longer available',
                  errorCode: 'action_not_allowed',
                });
              }

              // SEC-A004: re-validate the user-submitted confirmedParams
              // (which may differ from original if Edit was used)
              const parsed = actionDef.paramsSchema.safeParse(body.confirmedParams);
              if (!parsed.success) {
                logAuditRejection({
                  userId, actionId: stored.proposal.actionId,
                  proposalId: body.proposalId, errorCode: 'validation_failed',
                  validationError: parsed.error.message,
                });
                return res.status(400).json({
                  success: false,
                  error: parsed.error.message,
                  errorCode: 'validation_failed',
                });
              }

              // EXECUTE
              const resource = await actionDef.execute(parsed.data, {
                userId, familyId,
              });

              logAuditSuccess({
                userId, familyId,
                actionId: stored.proposal.actionId,
                proposalId: body.proposalId,
                confirmedParams: parsed.data,
                resource,
              });

              return res.json({ success: true, resource });
            } catch (err) {
              next(err);
            }
          }

        const confirmSchema = z.object({
          proposalId: z.string().uuid(),
          confirmedParams: z.record(z.unknown()),
        });

    - id: "5.2"
      task: Add audit logging utilities in backend/src/services/chatActions/auditLog.ts
      status: completed
      details: |
        Structured JSON logs (consumed by existing log aggregation). No PII
        beyond what's already in the params — caller responsibility to keep
        sensitive fields out of schemas.

          export function logAuditSuccess(entry: {
            userId: string;
            familyId: string;
            actionId: string;
            proposalId: string;
            confirmedParams: unknown;
            resource: { type: string; id: string };
          }): void {
            console.log(JSON.stringify({
              event: 'chat_action_confirmed',
              timestamp: new Date().toISOString(),
              source: 'chatbot_action_card',  // per SEC-A017
              ...entry,
            }));
          }

          export function logAuditRejection(entry: {
            userId: string;
            actionId: string;
            proposalId: string;
            errorCode: string;
            validationError?: string;
          }): void {
            console.warn(JSON.stringify({
              event: 'chat_action_rejected',
              timestamp: new Date().toISOString(),
              source: 'chatbot_action_card',
              ...entry,
            }));
          }

        SECURITY (SEC-A017, SEC-A018): Every success AND every rejection is
        logged with the source tag. This makes abuse investigation tractable
        ("which rejected nonces preceded the successful one?").

        SECURITY (SEC-A016): Do NOT log attachment content. Only log upload
        metadata (mime, size) — add a small logChatUpload function that
        mirrors logAuditRejection's shape for attachment-present requests.

    - id: "5.3"
      task: Observability logging for attachment requests
      status: completed
      details: |
        In the chat handler (phase 4.4), when a request includes an
        attachment, emit a structured log entry AFTER the Claude call returns:

          console.log(JSON.stringify({
            event: 'chat_attachment_processed',
            timestamp: new Date().toISOString(),
            userId,
            mimeType: attachment.mimeType,
            sizeBytes: attachment.sizeBytes,
            pageCount: pdfPageCount,  // null for images
            proposalIssued: response.type === 'action_proposal',
            proposedActionId: response.type === 'action_proposal'
              ? response.proposal.actionId : null,
            latencyMs,
            inputTokens, outputTokens,
          }));

        REQ-023 requirement satisfied.

