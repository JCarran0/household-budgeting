<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#A07820" />
    <title>Offline — Household Budget</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #F2D9C4;
        color: #3D3520;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
        color: #A07820;
      }
      p {
        font-size: 16px;
        line-height: 1.5;
        color: #564D35;
        margin-bottom: 24px;
      }
      button {
        background: #A07820;
        color: #FEF4E2;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #8A6818; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#x1F4F6;</div>
      <h1>You're offline</h1>
      <p>Connect to the internet to access your budget data.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
